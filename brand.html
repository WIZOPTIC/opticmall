<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTICMALL | 브랜드사 상품관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--sky:#1B9FD8;--sky-lt:#E6F5FB;--navy:#1A2D4A;--white:#fff;--g1:#F2F4F6;--g2:#E0E4E8;--g3:#9BA5B0;--g4:#5A6472;--black:#111318;--red:#FF4444;--green:#2ECC71;--orange:#F39C12;--purple:#8E44AD;--sidebar:220px;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--g1);color:var(--black);display:flex;min-height:100vh;}

/* 로그인 화면 */
.login-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:1000;}
.login-box{background:var(--white);border-radius:12px;padding:40px;width:360px;text-align:center;}
.login-logo{font-family:'Inter',sans-serif;font-size:24px;font-weight:800;color:var(--navy);margin-bottom:4px;}
.login-logo span{color:var(--sky);}
.login-sub{font-size:12px;color:var(--g3);margin-bottom:24px;}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--g2);border-radius:8px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;transition:border-color 0.2s;}
.login-input:focus{border-color:var(--sky);}
.login-btn{width:100%;padding:13px;background:var(--sky);color:var(--white);border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background 0.2s;}
.login-btn:hover{background:#1480B0;}
.login-error{font-size:12px;color:var(--red);margin-top:8px;display:none;}

/* 권한없음 화면 */
.denied-screen{position:fixed;inset:0;background:var(--g1);display:none;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px;text-align:center;}
.denied-screen .icon{font-size:48px;}
.denied-screen .msg{font-size:15px;color:var(--g4);font-weight:600;}
.denied-screen .btn-home{padding:12px 24px;background:var(--navy);color:var(--white);border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

/* 사이드바 */
.sidebar{width:var(--sidebar);background:var(--navy);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100;}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-logo .logo{font-family:'Inter',sans-serif;font-size:18px;font-weight:800;color:var(--white);}
.sidebar-logo .logo span{color:var(--sky);}
.sidebar-logo .admin-badge{font-size:10px;color:rgba(255,255,255,0.4);margin-top:3px;letter-spacing:0.1em;}
.sidebar-menu{flex:1;padding:12px 0;overflow-y:auto;}
.menu-section{padding:16px 20px 6px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.25);letter-spacing:0.15em;text-transform:uppercase;}
.menu-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,0.55);transition:all 0.15s;position:relative;border:none;background:none;width:100%;font-family:inherit;}
.menu-item:hover{background:rgba(255,255,255,0.06);color:var(--white);}
.menu-item.active{background:rgba(27,159,216,0.15);color:var(--white);}
.menu-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--sky);border-radius:0 2px 2px 0;}
.menu-badge{margin-left:auto;background:var(--red);color:var(--white);font-size:10px;font-weight:700;padding:1px 6px;border-radius:100px;}
.sidebar-user{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px;}
.user-avatar{width:32px;height:32px;background:var(--purple);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--white);}
.user-info .name{font-size:13px;font-weight:600;color:var(--white);}
.user-info .role{font-size:11px;color:rgba(255,255,255,0.35);}
.logout-btn{margin-left:auto;background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:18px;}
.logout-btn:hover{color:var(--red);}

/* 메인 */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;}
.topbar{background:var(--white);border-bottom:1px solid var(--g2);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:16px;font-weight:700;color:var(--navy);}
.today{font-size:12px;color:var(--g3);}
.content{padding:24px;flex:1;}

/* 대시보드 카드 */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.dash-card{background:var(--white);border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);position:relative;overflow:hidden;}
.dash-card .label{font-size:12px;color:var(--g3);font-weight:500;margin-bottom:8px;}
.dash-card .value{font-family:'Inter',sans-serif;font-size:28px;font-weight:800;color:var(--navy);}
.dash-card .value span{font-size:14px;font-weight:500;color:var(--g3);}
.dash-card .icon{position:absolute;right:16px;top:16px;font-size:28px;opacity:0.15;}

/* 섹션 */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:16px;font-weight:700;color:var(--navy);}
.btn-sm{padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all 0.15s;}
.btn-primary{background:var(--sky);color:var(--white);}
.btn-primary:hover{background:#1480B0;}
.btn-ghost{background:var(--white);color:var(--g4);border:1.5px solid var(--g2);}
.btn-ghost:hover{border-color:var(--sky);color:var(--sky);}

/* 상품 일괄등록 테이블 */
.reg-card{background:var(--white);border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:20px;}
.reg-table-wrap{overflow-x:auto;}
table.reg-table{width:100%;border-collapse:collapse;min-width:1100px;}
table.reg-table th{padding:10px 8px;font-size:11px;font-weight:700;color:var(--g4);text-align:left;background:var(--g1);white-space:nowrap;border-bottom:2px solid var(--g2);}
table.reg-table td{padding:6px 8px;border-bottom:1px solid var(--g1);vertical-align:middle;}
table.reg-table input[type=text], table.reg-table input[type=number]{width:100%;padding:8px 10px;border:1.5px solid var(--g2);border-radius:6px;font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s;}
table.reg-table input:focus{border-color:var(--sky);}
table.reg-table select{width:100%;padding:8px 6px;border:1.5px solid var(--g2);border-radius:6px;font-size:13px;font-family:inherit;outline:none;background:var(--white);}
.col-model{min-width:140px;}
.col-barcode{min-width:120px;}
.col-color{min-width:90px;}
.col-type{min-width:90px;}
.col-price{min-width:100px;}
.col-stock{min-width:80px;}
.col-img{min-width:160px;}
.col-del{width:40px;}
.img-slot-row{display:flex;gap:4px;align-items:center;}
.img-thumb-btn{width:34px;height:34px;border-radius:6px;border:1.5px dashed var(--g2);background:var(--g1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--g3);position:relative;overflow:hidden;flex-shrink:0;transition:all 0.15s;}
.img-thumb-btn:hover{border-color:var(--sky);color:var(--sky);}
.img-thumb-btn.filled{border-style:solid;border-color:var(--green);}
.img-thumb-btn img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.img-thumb-btn .main-tag{position:absolute;bottom:0;left:0;right:0;background:rgba(27,159,216,0.85);color:#fff;font-size:7px;text-align:center;padding:1px 0;font-weight:700;}
.row-del-btn{width:26px;height:26px;border:none;background:var(--g1);border-radius:50%;color:var(--g3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.row-del-btn:hover{background:var(--red);color:var(--white);}
.add-row-btn{margin-top:14px;padding:10px 18px;background:var(--g1);color:var(--navy);border:1.5px dashed var(--g2);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;transition:all 0.15s;}
.add-row-btn:hover{border-color:var(--sky);color:var(--sky);background:var(--sky-lt);}
.reg-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;padding-top:16px;border-top:1px solid var(--g2);}
.btn-bulk-save{padding:12px 28px;background:var(--navy);color:var(--white);border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s;}
.btn-bulk-save:hover{background:var(--sky);}
.btn-bulk-save:disabled{background:var(--g2);color:var(--g3);cursor:not-allowed;}

/* 상품목록 테이블 */
.table-wrap{background:var(--white);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
table{width:100%;border-collapse:collapse;}
thead{background:var(--g1);}
th{padding:12px 16px;font-size:11px;font-weight:700;color:var(--g4);text-align:left;letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap;}
td{padding:14px 16px;font-size:13px;color:var(--black);border-bottom:1px solid var(--g1);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFBFC;}
.prod-thumb{width:44px;height:44px;border-radius:8px;background:var(--g1);display:flex;align-items:center;justify-content:center;font-size:20px;opacity:0.3;object-fit:cover;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}
.badge.pending{background:#FEF9E7;color:var(--orange);}
.badge.approved{background:#E8FBF0;color:#27AE60;}
.badge.rejected{background:#FEECEC;color:var(--red);}
.badge.soldout{background:#F2F4F6;color:var(--g4);}
.action-btns{display:flex;gap:6px;}
.btn-view{padding:5px 12px;background:var(--g1);color:var(--g4);border:1px solid var(--g2);border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.btn-view:hover{background:var(--sky-lt);color:var(--sky);border-color:var(--sky);}
.btn-del-tbl{padding:5px 12px;background:#FEECEC;color:var(--red);border:1px solid #FFBBBB;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.btn-del-tbl:hover{background:var(--red);color:var(--white);}
.btn-edit-tbl{padding:5px 12px;background:var(--sky-lt);color:var(--sky);border:1px solid #B3E0F5;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.btn-edit-tbl:hover{background:var(--sky);color:var(--white);}
.btn-save-tbl{padding:5px 12px;background:var(--green);color:var(--white);border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-save-tbl:hover{background:#27AE60;}
.btn-cancel-tbl{padding:5px 12px;background:var(--g1);color:var(--g4);border:1px solid var(--g2);border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-cancel-tbl:hover{background:var(--g2);}
.edit-input{padding:6px 8px;border:1.5px solid var(--sky);border-radius:5px;font-size:13px;font-family:inherit;outline:none;}

/* 로딩/토스트 */
.loading{text-align:center;padding:40px;color:var(--g3);}
.spinner{width:32px;height:32px;border:3px solid var(--g2);border-top-color:var(--sky);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:var(--white);padding:14px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.2);transform:translateY(100px);opacity:0;transition:all 0.3s;z-index:1000;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}

/* 페이지 */
.page{display:none;}
.page.active{display:block;}

/* 숨김 파일 input */
.hidden-file-input{display:none;}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">OPTIC<span>MALL</span></div>
    <div class="login-sub">브랜드사 로그인</div>
    <input class="login-input" type="email" placeholder="이메일" id="brandEmail">
    <input class="login-input" type="password" placeholder="비밀번호" id="brandPw" onkeydown="if(event.key==='Enter') brandLogin()">
    <button class="login-btn" onclick="brandLogin()">로그인</button>
    <div class="login-error" id="loginError">이메일 또는 비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- 권한없음 화면 -->
<div class="denied-screen" id="deniedScreen">
  <div class="icon">🔒</div>
  <div class="msg" id="deniedMsg">브랜드사 권한이 없는 계정입니다.<br>관리자에게 문의해주세요.</div>
  <button class="btn-home" onclick="brandLogout()">로그아웃</button>
</div>

<!-- 사이드바 -->
<aside class="sidebar" id="sidebar" style="display:none;">
  <div class="sidebar-logo">
    <div class="logo">OPTIC<span>MALL</span></div>
    <div class="admin-badge">BRAND PARTNER</div>
  </div>
  <nav class="sidebar-menu">
    <div class="menu-section">메인</div>
    <button class="menu-item active" onclick="showPage('dashboard',this)"><span>📊</span> 대시보드</button>
    <div class="menu-section">상품 관리</div>
    <button class="menu-item" onclick="showPage('register',this)"><span>➕</span> 상품 일괄등록</button>
    <button class="menu-item" onclick="showPage('products',this)"><span>👓</span> 내 상품 목록</button>
    <div class="menu-section">운영</div>
    <button class="menu-item" onclick="showPage('dashboard',this)"><span>📈</span> 판매 통계</button>
  </nav>
  <div class="sidebar-user">
    <div class="user-avatar">B</div>
    <div class="user-info">
      <div class="name" id="brandName">브랜드사</div>
      <div class="role">입점 브랜드</div>
    </div>
    <button class="logout-btn" onclick="brandLogout()" title="로그아웃">⏻</button>
  </div>
</aside>

<!-- 메인 -->
<div class="main" id="mainArea" style="display:none;">
  <div class="topbar">
    <div class="topbar-title" id="pageTitle">대시보드</div>
    <div class="today" id="todayDate"></div>
  </div>

  <div class="content">

    <!-- 대시보드 -->
    <div class="page active" id="page-dashboard">
      <div class="dash-grid">
        <div class="dash-card">
          <div class="icon">👓</div>
          <div class="label">전체 등록 상품</div>
          <div class="value" id="totalProducts">-<span>건</span></div>
        </div>
        <div class="dash-card">
          <div class="icon">⏳</div>
          <div class="label">승인 대기</div>
          <div class="value" id="pendingProducts" style="color:var(--orange);">-<span>건</span></div>
        </div>
        <div class="dash-card">
          <div class="icon">✅</div>
          <div class="label">판매중</div>
          <div class="value" id="approvedProducts" style="color:var(--green);">-<span>건</span></div>
        </div>
        <div class="dash-card">
          <div class="icon">❌</div>
          <div class="label">반려</div>
          <div class="value" id="rejectedProducts" style="color:var(--red);">-<span>건</span></div>
        </div>
      </div>

      <div class="section-header">
        <div class="section-title">📋 최근 등록 상품</div>
        <button class="btn-sm btn-primary" onclick="showPage('register', document.querySelectorAll('.menu-item')[1])">+ 상품 등록하기</button>
      </div>
      <div class="table-wrap" id="dashRecentTable">
        <div class="loading"><div class="spinner"></div>불러오는 중...</div>
      </div>
    </div>

    <!-- 상품 일괄등록 -->
    <div class="page" id="page-register">
      <div class="section-header">
        <div class="section-title">상품 일괄등록</div>
        <div style="font-size:12px;color:var(--g3);">등록한 상품은 관리자 승인 후 노출됩니다</div>
      </div>

      <div class="reg-card">
        <div class="reg-table-wrap">
          <table class="reg-table">
            <thead>
              <tr>
                <th class="col-model">모델명 <span style="color:var(--red);">*</span></th>
                <th class="col-barcode">바코드</th>
                <th class="col-color">색상</th>
                <th class="col-type">타입</th>
                <th class="col-price">도매가 <span style="color:var(--red);">*</span></th>
                <th class="col-stock">재고</th>
                <th class="col-img">이미지 (메인+상세4)</th>
                <th class="col-del"></th>
              </tr>
            </thead>
            <tbody id="regTableBody">
              <!-- 행은 JS로 동적 생성 -->
            </tbody>
          </table>
        </div>
        <button class="add-row-btn" onclick="addRegRow()">+ 행 추가</button>

        <div class="reg-footer">
          <button class="btn-sm btn-ghost" onclick="clearAllRows()">전체 비우기</button>
          <button class="btn-bulk-save" id="bulkSaveBtn" onclick="submitBulkRegister()">일괄 등록하기</button>
        </div>
      </div>
    </div>

    <!-- 내 상품 목록 -->
    <div class="page" id="page-products">
      <div class="section-header">
        <div class="section-title">내 상품 목록</div>
        <button class="btn-sm btn-primary" onclick="loadProducts()">🔄 새로고침</button>
      </div>
      <div class="table-wrap" id="productsTable">
        <div class="loading"><div class="spinner"></div>불러오는 중...</div>
      </div>
    </div>

  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- 숨김 파일 인풋 (이미지 업로드 공용) -->
<input type="file" class="hidden-file-input" id="hiddenFileInput" accept="image/*">

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, getDocs, addDoc, doc, getDoc, deleteDoc, updateDoc, query, where, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

const firebaseConfig = {
  apiKey: "AIzaSyCZh95M18vqxwJGkXj2JkM9J4NfW_s0f1w",
  authDomain: "opticmall.firebaseapp.com",
  projectId: "opticmall",
  storageBucket: "opticmall.firebasestorage.app",
  messagingSenderId: "649171316547",
  appId: "1:649171316547:web:778de09e4fe6a43df109f6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// 전역 노출
window._auth = auth;
window._db = db;
window._storage = storage;
window._signIn = signInWithEmailAndPassword;
window._signOut = signOut;
window._collection = collection;
window._getDocs = getDocs;
window._addDoc = addDoc;
window._doc = doc;
window._getDoc = getDoc;
window._deleteDoc = deleteDoc;
window._updateDoc = updateDoc;
window._query = query;
window._where = where;
window._serverTimestamp = serverTimestamp;
window._ref = ref;
window._uploadBytes = uploadBytes;
window._getDownloadURL = getDownloadURL;

// 로그인 상태 + 권한 체크
let currentBrandUid = null;
let currentBrandData = null;

onAuthStateChanged(auth, async (user) => {
  if (user) {
    try {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      const userData = userDoc.exists() ? userDoc.data() : {};
      const role = userData.role || 'optician';

      if (role !== 'brand' && role !== 'master') {
        // 브랜드사/마스터 권한이 아니면 접근 차단
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('sidebar').style.display = 'none';
        document.getElementById('mainArea').style.display = 'none';
        document.getElementById('deniedScreen').style.display = 'flex';
        return;
      }

      currentBrandUid = user.uid;
      currentBrandData = userData;

      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('deniedScreen').style.display = 'none';
      document.getElementById('sidebar').style.display = 'flex';
      document.getElementById('mainArea').style.display = 'flex';
      document.getElementById('brandName').textContent = userData.brandName || userData.name || user.email.split('@')[0];

      window.initRegisterTable();
      window.loadDashboard();
    } catch(e) {
      console.error(e);
    }
  } else {
    currentBrandUid = null;
    currentBrandData = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('deniedScreen').style.display = 'none';
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('mainArea').style.display = 'none';
  }
});

window._getCurrentBrandUid = () => currentBrandUid;
window._getCurrentBrandData = () => currentBrandData;
</script>

<script>
// ===================== 공통 =====================
document.getElementById('todayDate').textContent = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric',weekday:'short'});

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

function formatDate(ts) {
  if(!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

async function brandLogin() {
  const email = document.getElementById('brandEmail').value.trim();
  const pw = document.getElementById('brandPw').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  try {
    await window._signIn(window._auth, email, pw);
  } catch(e) {
    errEl.style.display = 'block';
  }
}

async function brandLogout() {
  if(confirm('로그아웃 하시겠습니까?')) {
    await window._signOut(window._auth);
  }
}

function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
  if(el) el.classList.add('active');
  const titles = {dashboard:'대시보드', register:'상품 일괄등록', products:'내 상품 목록'};
  document.getElementById('pageTitle').textContent = titles[name] || '';
  if(name === 'products') loadProducts();
}

// ===================== 대시보드 =====================
async function loadDashboard() {
  try {
    const uid = window._getCurrentBrandUid();
    const snap = await window._getDocs(window._query(
      window._collection(window._db, 'products'),
      window._where('brandId', '==', uid)
    ));
    const products = [];
    snap.forEach(d => products.push({id:d.id, ...d.data()}));

    const total = products.length;
    const pending = products.filter(p => p.status === 'pending');
    const approved = products.filter(p => p.status === 'approved');
    const rejected = products.filter(p => p.status === 'rejected');

    document.getElementById('totalProducts').innerHTML = total + '<span>건</span>';
    document.getElementById('pendingProducts').innerHTML = pending.length + '<span>건</span>';
    document.getElementById('approvedProducts').innerHTML = approved.length + '<span>건</span>';
    document.getElementById('rejectedProducts').innerHTML = rejected.length + '<span>건</span>';

    products.sort((a,b) => {
      const da = a.createdAt?.toDate?.() || new Date(0);
      const dbb = b.createdAt?.toDate?.() || new Date(0);
      return dbb - da;
    });

    const tableEl = document.getElementById('dashRecentTable');
    if(products.length === 0) {
      tableEl.innerHTML = '<div style="text-align:center;padding:32px;color:var(--g3);">등록된 상품이 없습니다. 상품을 등록해보세요! 😊</div>';
      return;
    }
    tableEl.innerHTML = renderProductTable(products.slice(0,5), false);
  } catch(e) {
    console.error(e);
    showToast('데이터 로드 실패: ' + e.message, 'error');
  }
}

// ===================== 상품 목록 =====================
const statusLabelMap = {pending:'승인대기', approved:'판매중', rejected:'반려'};
const statusClassMap = {pending:'pending', approved:'approved', rejected:'rejected'};

function renderProductTable(products, withActions=true) {
  return `
    <table>
      <thead><tr>
        <th>이미지</th><th>모델명</th><th>바코드</th><th>색상</th><th>타입</th>
        <th>도매가</th><th>재고</th><th>상태</th>${withActions ? '<th>관리</th>' : ''}
      </tr></thead>
      <tbody>
        ${products.map(p => renderProductRowHtml(p, withActions)).join('')}
      </tbody>
    </table>`;
}

function renderProductRowHtml(p, withActions) {
  return `
    <tr data-pid="${p.id}">
      <td>${p.mainImageUrl ? `<img src="${p.mainImageUrl}" class="prod-thumb">` : `<div class="prod-thumb">👓</div>`}</td>
      <td><strong>${p.modelName||'-'}</strong></td>
      <td style="font-size:12px;">${p.barcode||'-'}</td>
      <td>${p.color||'-'}</td>
      <td>${p.type||'-'}</td>
      <td class="cell-price">${p.price ? '₩'+Number(p.price).toLocaleString() : '-'}</td>
      <td class="cell-stock">${p.stock ?? '-'}</td>
      <td><span class="badge ${statusClassMap[p.status]||'pending'}">${statusLabelMap[p.status]||'대기'}</span></td>
      ${withActions ? `
      <td class="cell-action">
        <div class="action-btns">
          <button class="btn-edit-tbl" onclick="startEditRow('${p.id}', ${p.price||0}, ${p.stock||0})">✏️ 수정</button>
          <button class="btn-del-tbl" onclick="deleteProduct('${p.id}')">삭제</button>
        </div>
      </td>` : ''}
    </tr>`;
}

// 인라인 수정 모드 시작
function startEditRow(pid, currentPrice, currentStock) {
  const scope = document.getElementById('productsTable');
  const tr = scope ? scope.querySelector(`tr[data-pid="${pid}"]`) : null;
  if(!tr) { console.error('행을 찾을 수 없습니다:', pid); return; }
  const priceCell = tr.querySelector('.cell-price');
  const stockCell = tr.querySelector('.cell-stock');
  const actionCell = tr.querySelector('.cell-action');

  if(!priceCell || !stockCell || !actionCell) {
    console.error('셀을 찾을 수 없습니다:', {priceCell, stockCell, actionCell});
    showToast('수정 모드를 열 수 없습니다. 새로고침 후 다시 시도해주세요.', 'error');
    return;
  }

  priceCell.innerHTML = `<input type="number" class="edit-input" id="editPrice-${pid}" value="${currentPrice}" style="width:90px;">`;
  stockCell.innerHTML = `<input type="number" class="edit-input" id="editStock-${pid}" value="${currentStock}" style="width:60px;">`;
  actionCell.innerHTML = `
    <div class="action-btns">
      <button class="btn-save-tbl" onclick="saveEditRow('${pid}')">💾 저장</button>
      <button class="btn-cancel-tbl" onclick="loadProducts()">취소</button>
    </div>`;
}

// 인라인 수정 저장
async function saveEditRow(pid) {
  const newPrice = Number(document.getElementById('editPrice-'+pid).value) || 0;
  const newStock = Number(document.getElementById('editStock-'+pid).value) || 0;

  if(newPrice <= 0) { showToast('도매가는 0보다 커야 합니다.', 'error'); return; }

  try {
    await window._updateDoc(window._doc(window._db, 'products', pid), { price: newPrice, stock: newStock });
    showToast('✅ 수정이 저장되었습니다.', 'success');
    loadProducts();
    loadDashboard();
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
  }
}

async function loadProducts() {
  const tableEl = document.getElementById('productsTable');
  tableEl.innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  try {
    const uid = window._getCurrentBrandUid();
    const snap = await window._getDocs(window._query(
      window._collection(window._db, 'products'),
      window._where('brandId', '==', uid)
    ));
    const products = [];
    snap.forEach(d => products.push({id:d.id, ...d.data()}));

    if(products.length === 0) {
      tableEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--g3);font-size:14px;">등록된 상품이 없습니다.</div>';
      return;
    }
    products.sort((a,b) => {
      const da = a.createdAt?.toDate?.() || new Date(0);
      const dbb = b.createdAt?.toDate?.() || new Date(0);
      return dbb - da;
    });
    tableEl.innerHTML = renderProductTable(products, true);
  } catch(e) {
    tableEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--red);">로드 실패: ' + e.message + '</div>';
  }
}

async function deleteProduct(productId) {
  if(!confirm('이 상품을 삭제하시겠습니까?\n삭제된 상품은 복구할 수 없습니다.')) return;
  try {
    await window._deleteDoc(window._doc(window._db, 'products', productId));
    showToast('상품이 삭제되었습니다.', 'success');
    loadProducts();
    loadDashboard();
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
  }
}

// ===================== 상품 일괄등록 (테이블) =====================
// 행 데이터 구조: { rowId, images: { main:File, detail1:File, detail2:File, detail3:File, detail4:File } }
let regRows = [];
let rowIdCounter = 0;
const IMAGE_SLOTS = [
  {key:'main', label:'메인', tag:true},
  {key:'detail1', label:'상세1'},
  {key:'detail2', label:'상세2'},
  {key:'detail3', label:'상세3'},
  {key:'detail4', label:'상세4'}
];

function initRegisterTable() {
  if(regRows.length === 0) {
    addRegRow();
    addRegRow();
    addRegRow();
  }
}

function addRegRow() {
  const rowId = 'row' + (rowIdCounter++);
  regRows.push({ rowId, images: {} });
  renderRegTable();
}

function removeRegRow(rowId) {
  regRows = regRows.filter(r => r.rowId !== rowId);
  if(regRows.length === 0) addRegRow();
  renderRegTable();
}

function clearAllRows() {
  if(!confirm('입력한 내용을 모두 비우시겠습니까?')) return;
  regRows = [];
  addRegRow();
  addRegRow();
  addRegRow();
  renderRegTable();
  showToast('초기화되었습니다.');
}

function renderRegTable() {
  const tbody = document.getElementById('regTableBody');
  tbody.innerHTML = regRows.map(row => `
    <tr data-row-id="${row.rowId}">
      <td class="col-model"><input type="text" data-field="modelName" placeholder="예) K9191" value="${row.modelName||''}" onchange="updateRowField('${row.rowId}','modelName',this.value)"></td>
      <td class="col-barcode"><input type="text" data-field="barcode" placeholder="바코드" value="${row.barcode||''}" onchange="updateRowField('${row.rowId}','barcode',this.value)"></td>
      <td class="col-color"><input type="text" data-field="color" placeholder="블랙" value="${row.color||''}" onchange="updateRowField('${row.rowId}','color',this.value)"></td>
      <td class="col-type">
        <select data-field="type" onchange="updateRowField('${row.rowId}','type',this.value)">
          <option value="">선택</option>
          <option value="하프" ${row.type==='하프'?'selected':''}>하프</option>
          <option value="온" ${row.type==='온'?'selected':''}>온</option>
          <option value="림리스" ${row.type==='림리스'?'selected':''}>림리스</option>
        </select>
      </td>
      <td class="col-price"><input type="number" data-field="price" placeholder="도매가" value="${row.price||''}" onchange="updateRowField('${row.rowId}','price',this.value)"></td>
      <td class="col-stock"><input type="number" data-field="stock" placeholder="재고" value="${row.stock||''}" onchange="updateRowField('${row.rowId}','stock',this.value)"></td>
      <td class="col-img">
        <div class="img-slot-row">
          ${IMAGE_SLOTS.map(slot => `
            <button class="img-thumb-btn ${row.images[slot.key] ? 'filled' : ''}" title="${slot.label}" onclick="triggerImageUpload('${row.rowId}','${slot.key}')">
              ${row.images[slot.key] ? `<img src="${row.images[slot.key].previewUrl}">` : (slot.tag ? '★' : slot.label[2])}
              ${slot.tag ? '<span class="main-tag">MAIN</span>' : ''}
            </button>
          `).join('')}
        </div>
      </td>
      <td class="col-del"><button class="row-del-btn" onclick="removeRegRow('${row.rowId}')" title="행 삭제">✕</button></td>
    </tr>
  `).join('');
}

function updateRowField(rowId, field, value) {
  const row = regRows.find(r => r.rowId === rowId);
  if(row) row[field] = value;
}

let currentUploadTarget = null; // {rowId, slotKey}

function triggerImageUpload(rowId, slotKey) {
  currentUploadTarget = {rowId, slotKey};
  document.getElementById('hiddenFileInput').click();
}

document.getElementById('hiddenFileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if(!file || !currentUploadTarget) return;
  if(file.size > 8 * 1024 * 1024) {
    showToast('이미지는 8MB 이하만 가능합니다.', 'error');
    e.target.value = '';
    return;
  }
  const row = regRows.find(r => r.rowId === currentUploadTarget.rowId);
  if(row) {
    row.images[currentUploadTarget.slotKey] = {
      file: file,
      previewUrl: URL.createObjectURL(file)
    };
    renderRegTable();
  }
  e.target.value = '';
  currentUploadTarget = null;
});

// 일괄 등록 제출
async function submitBulkRegister() {
  const validRows = regRows.filter(r => r.modelName && r.modelName.trim());

  if(validRows.length === 0) {
    showToast('모델명을 입력한 상품이 없습니다.', 'error');
    return;
  }
  for(const row of validRows) {
    if(!row.price) {
      showToast(`[${row.modelName}] 도매가를 입력해주세요.`, 'error');
      return;
    }
  }

  if(!confirm(`${validRows.length}건의 상품을 등록하시겠습니까?\n등록 후 관리자 승인 절차를 거쳐 노출됩니다.`)) return;

  const btn = document.getElementById('bulkSaveBtn');
  btn.disabled = true;
  btn.textContent = '등록 중...';

  const uid = window._getCurrentBrandUid();
  const brandData = window._getCurrentBrandData();
  let successCount = 0;

  try {
    for(const row of validRows) {
      // 이미지 업로드
      const imageUrls = {};
      for(const slot of IMAGE_SLOTS) {
        const imgData = row.images[slot.key];
        if(imgData && imgData.file) {
          const path = `products/${uid}/${Date.now()}_${slot.key}_${imgData.file.name}`;
          const fileRef = window._ref(window._storage, path);
          await window._uploadBytes(fileRef, imgData.file);
          const url = await window._getDownloadURL(fileRef);
          imageUrls[slot.key] = url;
        }
      }

      await window._addDoc(window._collection(window._db, 'products'), {
        brandId: uid,
        brandName: brandData?.brandName || brandData?.name || '',
        modelName: row.modelName.trim(),
        barcode: row.barcode || '',
        color: row.color || '',
        type: row.type || '',
        price: Number(row.price) || 0,
        stock: Number(row.stock) || 0,
        mainImageUrl: imageUrls.main || '',
        detailImageUrls: [imageUrls.detail1, imageUrls.detail2, imageUrls.detail3, imageUrls.detail4].filter(Boolean),
        status: 'pending', // 마스터 승인 전
        createdAt: window._serverTimestamp(),
        approvedAt: null
      });
      successCount++;
    }

    showToast(`✅ ${successCount}건 등록 완료! 관리자 승인 후 노출됩니다.`, 'success');
    regRows = [];
    addRegRow(); addRegRow(); addRegRow();
    renderRegTable();
    loadDashboard();

  } catch(e) {
    console.error(e);
    showToast('등록 중 오류 발생: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '일괄 등록하기';
  }
}

// 전역 노출 (Firebase 모듈 스크립트에서 호출하기 위함)
window.initRegisterTable = initRegisterTable;
window.loadDashboard = loadDashboard;
</script>
