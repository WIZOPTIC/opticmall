<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTICMALL | 상품 목록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sky: #1B9FD8; --sky-lt: #E6F5FB; --sky-dk: #1480B0;
  --navy: #1A2D4A; --white: #FFFFFF;
  --g1: #F2F4F6; --g2: #E0E4E8; --g3: #9BA5B0; --g4: #5A6472;
  --black: #111318; --red: #FF4444; --yellow: #F5C518;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--white); color: var(--black); padding-bottom: 80px; }
.header { background: var(--white); border-bottom: 1px solid var(--g2); position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1280px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 24px; }
.logo { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 800; color: var(--navy); text-decoration: none; }
.logo span { color: var(--sky); }
.header-search { flex: 1; max-width: 480px; display: flex; border: 1.5px solid var(--g2); border-radius: 6px; overflow: hidden; transition: border-color 0.2s; }
.header-search:focus-within { border-color: var(--sky); }
.header-search input { flex: 1; padding: 10px 16px; border: none; outline: none; font-size: 14px; font-family: inherit; }
.search-btn { padding: 0 14px; background: var(--white); border: none; cursor: pointer; color: var(--g4); border-left: 1.5px solid var(--g2); }
.search-btn:hover { color: var(--sky); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 4px; }
.h-btn { padding: 7px 12px; border: none; background: none; font-size: 13px; font-weight: 500; color: var(--g4); font-family: inherit; cursor: pointer; }
.h-sep { color: var(--g2); }
.h-join { padding: 7px 14px; border: none; background: var(--sky); color: var(--white); font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; border-radius: 4px; }
.icon-btn { width: 36px; height: 36px; border: none; background: none; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--g4); position: relative; }
.cart-count { position: absolute; top: 2px; right: 2px; background: var(--sky); color: #fff; font-size: 9px; font-weight: 700; border-radius: 100px; padding: 1px 4px; }
.gnb { background: var(--white); border-bottom: 2px solid var(--sky); position: sticky; top: 64px; z-index: 99; }
.gnb-inner { max-width: 1280px; margin: 0 auto; padding: 0 24px; display: flex; }
.gnb-item { padding: 13px 18px; font-size: 14px; font-weight: 500; color: var(--navy); cursor: pointer; border: none; background: none; font-family: inherit; transition: color 0.15s; white-space: nowrap; }
.gnb-item:hover, .gnb-item.active { color: var(--sky); font-weight: 700; }

/* 레이아웃 */
.page-wrap { max-width: 1280px; margin: 0 auto; padding: 24px; display: flex; gap: 24px; }

/* 사이드 필터 */
.sidebar { width: 220px; flex-shrink: 0; }
.filter-section { background: var(--white); border: 1px solid var(--g2); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.filter-title { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 12px; display: flex; justify-content: space-between; cursor: pointer; }
.filter-title span { color: var(--g3); font-weight: 400; font-size: 11px; }
.filter-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; }
.filter-item input[type="checkbox"] { accent-color: var(--sky); width: 15px; height: 15px; cursor: pointer; }
.filter-item label { font-size: 13px; color: var(--g4); cursor: pointer; flex: 1; }
.filter-item .cnt { font-size: 11px; color: var(--g3); }
.price-range { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.price-input { flex: 1; padding: 8px 10px; border: 1.5px solid var(--g2); border-radius: 6px; font-size: 12px; font-family: inherit; outline: none; }
.price-input:focus { border-color: var(--sky); }
.btn-filter-apply { width: 100%; padding: 9px; background: var(--sky); color: var(--white); border: none; border-radius: 6px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 8px; }
.btn-reset { width: 100%; padding: 8px; background: none; color: var(--g3); border: 1px solid var(--g2); border-radius: 6px; font-size: 12px; font-family: inherit; cursor: pointer; margin-top: 6px; }

/* 상품 목록 */
.products-area { flex: 1; }
.list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.list-title { font-size: 18px; font-weight: 700; color: var(--navy); }
.list-count { font-size: 13px; color: var(--g3); }
.list-count strong { color: var(--navy); }
.list-controls { display: flex; align-items: center; gap: 10px; }
.sort-select { padding: 8px 12px; border: 1.5px solid var(--g2); border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; cursor: pointer; background: var(--white); }
.view-btns { display: flex; gap: 4px; }
.view-btn { width: 32px; height: 32px; border: 1.5px solid var(--g2); background: var(--white); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s; }
.view-btn.active { border-color: var(--sky); color: var(--sky); background: var(--sky-lt); }

/* 상품 그리드 */
.product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.product-card { border: 1px solid var(--g2); border-radius: 10px; overflow: hidden; cursor: pointer; transition: all 0.2s; background: var(--white); }
.product-card:hover { border-color: var(--sky); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.product-img { aspect-ratio: 1; background: var(--g1); display: flex; align-items: center; justify-content: center; position: relative; font-size: 60px; }
.product-img.no-img { opacity: 0.12; }
.p-badge { position: absolute; top: 8px; left: 8px; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
.p-badge.new { background: var(--yellow); color: var(--black); }
.p-badge.hot { background: var(--red); color: var(--white); }
.p-badge.best { background: var(--navy); color: var(--white); }
.p-badge.out { background: var(--g3); color: var(--white); }
.wish-btn { position: absolute; bottom: 8px; right: 8px; width: 30px; height: 30px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
.color-dots { display: flex; gap: 4px; padding: 10px 10px 0; }
.color-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.1); }
.product-info { padding: 8px 10px 12px; }
.p-cat { font-size: 10px; font-weight: 700; color: var(--sky); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
.p-name { font-size: 13px; font-weight: 600; color: var(--black); margin-bottom: 3px; line-height: 1.3; }
.p-size { font-size: 11px; color: var(--g3); margin-bottom: 6px; }
.p-price { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 800; color: var(--navy); }
.p-price .won { font-size: 12px; font-weight: 500; }
.p-locked { font-size: 12px; color: var(--g3); display: flex; align-items: center; gap: 4px; }

/* 페이지네이션 */
.pagination { display: flex; justify-content: center; gap: 6px; margin-top: 32px; }
.page-btn { width: 36px; height: 36px; border: 1.5px solid var(--g2); background: var(--white); border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: inherit; }
.page-btn.active { background: var(--sky); color: var(--white); border-color: var(--sky); font-weight: 700; }
.page-btn:hover:not(.active) { border-color: var(--sky); color: var(--sky); }

/* 하단 네비 */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: var(--white); border-top: 1px solid var(--g2); display: flex; z-index: 300; box-shadow: 0 -4px 20px rgba(0,0,0,0.08); }
.bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: none; font-size: 10px; font-weight: 600; letter-spacing: 0.05em; color: var(--g3); cursor: pointer; font-family: inherit; }
.bnav-item.active { color: var(--sky); }
.bnav-item svg { width: 22px; height: 22px; }
</style>
</head>

const _auth = firebase.auth();
const _db = firebase.firestore();

let memberLevel = 0; // 0=비회원, 1=대기, 2=승인완료(가격공개)
let allProducts = []; // Firestore에서 불러온 승인 상품 전체

// ===================== 로그인 모달 =====================
function openLogin() { document.getElementById('loginOverlay').style.display = 'block'; }
function closeLogin() { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('loginError').style.display='none'; }
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLogin(); });

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPw').value;
  const keepLogin = document.getElementById('keepLoginChk').checked;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginSubmitBtn');
  errEl.style.display = 'none';
  if(!email || !pw) { errEl.textContent='이메일과 비밀번호를 입력해주세요.'; errEl.style.display='block'; return; }
  btn.textContent = '...';
  btn.disabled = true;
  try {
    const persistence = keepLogin ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION;
    await _auth.setPersistence(persistence);
    await _auth.signInWithEmailAndPassword(email, pw);
    closeLogin();
  } catch(e) {
    errEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
    errEl.style.display = 'block';
  } finally {
    btn.textContent = '로그인';
    btn.disabled = false;
  }
}
async function doLogout() { await _auth.signOut(); }

function updateHeaderLoggedIn(name, level) {
  const loginBtn = document.getElementById('loginBtn');
  const joinBtn = document.querySelector('.h-join');
  if(loginBtn) loginBtn.style.display = 'none';
  if(joinBtn) joinBtn.style.display = 'none';
  const dropdown = document.getElementById('userDropdown');
  if(dropdown) {
    dropdown.innerHTML = `
      <div style="padding:12px 20px;border-bottom:1px solid #F2F4F6;">
        <div style="font-size:13px;font-weight:700;color:#1A2D4A;">${name}님</div>
        <div style="font-size:11px;color:#9BA5B0;margin-top:2px;">${level >= 2 ? 'B2B 승인회원' : '승인 대기중'}</div>
      </div>
      <a href="mypage.html" style="display:block;padding:13px 20px;font-size:13px;color:#5A6472;text-decoration:none;">마이페이지</a>
      <a href="mypage.html" style="display:block;padding:13px 20px;font-size:13px;color:#5A6472;text-decoration:none;">주문/배송조회</a>
      <a href="#" onclick="doLogout()" style="display:block;padding:13px 20px;font-size:13px;color:#FF4444;text-decoration:none;border-top:1px solid #F2F4F6;">로그아웃</a>`;
  }
}
function updateHeaderLoggedOut() {
  const loginBtn = document.getElementById('loginBtn');
  const joinBtn = document.querySelector('.h-join');
  if(loginBtn) loginBtn.style.display = '';
  if(joinBtn) joinBtn.style.display = '';
}

document.getElementById('userMenuBtn')?.addEventListener('click', () => {
  const dd = document.getElementById('userDropdown');
  dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
});
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('userMenuWrap');
  if(wrap && !wrap.contains(e.target)) document.getElementById('userDropdown').style.display = 'none';
});

_auth.onAuthStateChanged(async (user) => {
  if (user) {
    try {
      const userDoc = await _db.collection('users').doc(user.uid).get();
      const userData = userDoc.exists ? userDoc.data() : {};
      const name = userData.name || user.email.split('@')[0];
      memberLevel = userData.member_level || 0;
      updateHeaderLoggedIn(name, memberLevel);
    } catch(e) {
      memberLevel = 0;
      updateHeaderLoggedIn(user.email.split('@')[0], 0);
    }
    updateCartCount();
  } else {
    memberLevel = 0;
    updateHeaderLoggedOut();
    document.getElementById('cartCountBadge').style.display = 'none';
  }
  renderProducts(allProducts); // 로그인 상태 바뀌면 가격 잠금 표시 다시 그림
});

async function updateCartCount() {
  try {
    const uid = _auth.currentUser.uid;
    const snap = await _db.collection('carts').doc(uid).collection('items').get();
    const badge = document.getElementById('cartCountBadge');
    if(snap.size > 0) {
      badge.textContent = snap.size;
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }
  } catch(e) {
    console.error(e);
  }
}

// ===================== 상품 목록 (Firestore 연동) =====================
const grid = document.getElementById('productGrid');
let currentGnbCategory = '전체';
let currentBrandFilter = null;

function renderEmptyState(message) {
  grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:#9BA5B0;">
    <div style="font-size:40px;margin-bottom:12px;">👓</div>
    <div style="font-size:14px;font-weight:600;">${message || '아직 등록된 상품이 없습니다.'}</div>
  </div>`;
}

function renderProducts(products) {
  if(!products || products.length === 0) {
    renderEmptyState(allProducts.length === 0 ? '아직 등록된 상품이 없습니다.' : '조건에 맞는 상품이 없습니다.');
    updateCount(0);
    return;
  }

  grid.innerHTML = products.map(p => {
    const badgeHtml = p.discountRate ? `<span class="p-badge hot">${p.discountRate}% SALE</span>` : (p.badge ? `<span class="p-badge ${p.badge}">${p.badge.toUpperCase()}</span>` : '');
    const outHtml = (p.stock !== undefined && Number(p.stock) <= 0) ? `<span class="p-badge out">SOLD OUT</span>` : '';
    let priceHtml;
    if(memberLevel >= 2) {
      if(p.discountRate) {
        priceHtml = `<div class="p-price">
          <span style="font-size:11px;color:var(--g3);text-decoration:line-through;margin-right:4px;">₩${p.originalPrice.toLocaleString()}</span>
          <span class="won">₩</span>${p.salePrice.toLocaleString()}
          <span style="font-size:11px;color:var(--red);font-weight:700;margin-left:2px;">${p.discountRate}%</span>
        </div>`;
      } else {
        priceHtml = `<div class="p-price"><span class="won">₩</span>${Number(p.price||0).toLocaleString()}</div>`;
      }
    } else {
      priceHtml = `<div class="p-locked">🔒 로그인 후 가격확인</div>`;
    }
    const hasImg = !!p.mainImageUrl;
    const imgHtml = hasImg
      ? `<img src="${p.mainImageUrl}" style="width:100%;height:100%;object-fit:cover;">`
      : `👓`;
    const catLabel = p.category || p.type || p.brandName || '안경테';

    return `
      <div class="product-card" onclick="goToProduct('${p.id}')">
        <div class="product-img${hasImg ? '' : ' no-img'}">${imgHtml}${badgeHtml}${outHtml}<button class="wish-btn" onclick="event.stopPropagation();this.textContent=this.textContent==='🤍'?'❤️':'🤍'">🤍</button></div>
        <div class="product-info">
          <div class="p-cat">${catLabel}</div>
          <div class="p-name">${p.modelName || '-'}${p.color ? ' · '+p.color : ''}</div>
          <div class="p-size">${p.size ? p.size + ' · ' : ''}${p.barcode || ''}</div>
          ${priceHtml}
        </div>
      </div>`;
  }).join('');
}

// 카드 클릭 시 상품 데이터를 미리 sessionStorage에 저장해서 상세페이지 로딩 깜빡임 최소화
function goToProduct(productId) {
  const product = allProducts.find(p => p.id === productId);
  if(product) {
    try {
      sessionStorage.setItem('preloadProduct_' + productId, JSON.stringify(product));
    } catch(e) { console.error('상품 미리보기 데이터 저장 실패:', e); }
  }
  location.href = 'product.html?id=' + productId;
}

function updateCount(n) {
  document.querySelector('.list-count').innerHTML = `총 <strong>${n}</strong>개 상품`;
}

const CATEGORIES = ['하금테', '뿔테', '메탈', '선글라스'];
const TYPES = ['하프', '온', '림리스'];

function updateCategoryCounts() {
  const counts = { '전체': allProducts.length };
  CATEGORIES.forEach(c => counts[c] = 0);
  allProducts.forEach(p => { if(counts[p.category] !== undefined) counts[p.category]++; });
  document.getElementById('cnt-all').textContent = `(${counts['전체']})`;
  CATEGORIES.forEach(c => { document.getElementById('cnt-'+c).textContent = `(${counts[c]})`; });
}

// GNB 클릭: 카테고리 단독 선택
function filterByGnb(category, el) {
  currentGnbCategory = category;
  currentBrandFilter = null;
  document.querySelectorAll('.gnb-item').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('listTitle').textContent = category === '전체' ? '전체상품' : category;

  // 사이드바 체크박스도 동기화
  document.getElementById('cat-all').checked = (category === '전체');
  CATEGORIES.forEach(c => { document.getElementById('cat-'+c).checked = (category === c); });

  applyFilters();
}

// 사이드바 카테고리 체크박스 변경
function onCategoryFilterChange() {
  const allCb = document.getElementById('cat-all');
  const checkedCats = CATEGORIES.filter(c => document.getElementById('cat-'+c).checked);

  document.querySelectorAll('.gnb-item').forEach(b => b.classList.remove('active'));

  if(checkedCats.length === 0) {
    allCb.checked = true;
    currentGnbCategory = '전체';
    document.getElementById('listTitle').textContent = '전체상품';
  } else {
    allCb.checked = false;
    currentGnbCategory = checkedCats;
    document.getElementById('listTitle').textContent = checkedCats.join(', ');
  }
  applyFilters();
}

function onFilterChange() {
  applyFilters();
}

function resetFilters() {
  document.getElementById('cat-all').checked = true;
  CATEGORIES.forEach(c => { document.getElementById('cat-'+c).checked = false; });
  TYPES.forEach(t => { document.getElementById('type-'+t).checked = false; });
  document.getElementById('s1').checked = false;
  document.getElementById('priceMin').value = '';
  document.getElementById('priceMax').value = '';
  document.getElementById('searchInput').value = '';
  currentGnbCategory = '전체';
  currentBrandFilter = null;
  document.querySelectorAll('.gnb-item').forEach(b => b.classList.remove('active'));
  document.querySelector('.gnb-item').classList.add('active');
  document.getElementById('listTitle').textContent = '전체상품';
  applyFilters();
}

function doSearch() {
  applyFilters();
}

function applyFilters() {
  let result = [...allProducts];

  // 브랜드 필터 (브랜드관에서 진입한 경우)
  if(currentBrandFilter) {
    result = result.filter(p => p.brandId === currentBrandFilter);
  }

  // 카테고리 필터 (메인)
  if(Array.isArray(currentGnbCategory)) {
    result = result.filter(p => currentGnbCategory.includes(p.category));
  } else if(currentGnbCategory !== '전체') {
    result = result.filter(p => p.category === currentGnbCategory);
  }

  // 타입 필터 (서브: 하프/온/림리스)
  const checkedTypes = TYPES.filter(t => document.getElementById('type-'+t).checked);
  if(checkedTypes.length > 0) {
    result = result.filter(p => checkedTypes.includes(p.type));
  }

  // 검색어 필터
  const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  if(keyword) {
    result = result.filter(p =>
      (p.modelName||'').toLowerCase().includes(keyword) ||
      (p.barcode||'').toLowerCase().includes(keyword) ||
      (p.brandName||'').toLowerCase().includes(keyword)
    );
  }

  // 재고 필터
  if(document.getElementById('s1').checked) {
    result = result.filter(p => Number(p.stock||0) > 0);
  }

  // 가격대 필터 (회원만 의미있음)
  const minP = parseInt(document.getElementById('priceMin').value) || null;
  const maxP = parseInt(document.getElementById('priceMax').value) || null;
  if(minP !== null) result = result.filter(p => Number(p.price||0) >= minP);
  if(maxP !== null) result = result.filter(p => Number(p.price||0) <= maxP);

  // 정렬
  const sortV = document.querySelector('.sort-select').value;
  if(sortV === '낮은가격순') result.sort((a,b) => (a.price||0) - (b.price||0));
  else if(sortV === '높은가격순') result.sort((a,b) => (b.price||0) - (a.price||0));

  renderProducts(result);
  updateCount(result.length);
}

async function loadActivePromotions() {
  try {
    const snap = await _db.collection('promotions').where('status', '==', 'approved').get();
    const today = new Date().toISOString().slice(0,10);
    const discountMap = {}; // productId -> discountRate

    snap.forEach(doc => {
      const promo = doc.data();
      if(promo.startDate > today || promo.endDate < today) return; // 기간 외
      (promo.targetProductIds || []).forEach(pid => {
        // 여러 이벤트가 겹치면 더 높은 할인율 적용
        if(!discountMap[pid] || promo.discountRate > discountMap[pid]) {
          discountMap[pid] = promo.discountRate;
        }
      });
    });
    return discountMap;
  } catch(e) {
    console.error('이벤트 로드 실패:', e);
    return {};
  }
}

async function loadApprovedProducts() {
  try {
    const snap = await _db.collection('products').where('status', '==', 'approved').get();
    const products = [];
    snap.forEach(doc => products.push({id: doc.id, ...doc.data()}));
    // 최신순 정렬
    products.sort((a,b) => {
      const da = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(0);
      const dbb = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(0);
      return dbb - da;
    });

    // 진행중 이벤트 할인가 매칭
    const discountMap = await loadActivePromotions();
    products.forEach(p => {
      if(discountMap[p.id]) {
        p.discountRate = discountMap[p.id];
        p.originalPrice = Number(p.price || 0);
        p.salePrice = Math.round(p.originalPrice * (1 - discountMap[p.id]/100));
      }
    });

    allProducts = products;
    updateCategoryCounts();

    // URL의 brand 파라미터 처리 (브랜드관에서 넘어온 경우)
    const urlParams = new URLSearchParams(location.search);
    const brandId = urlParams.get('brand');
    if(brandId) {
      currentBrandFilter = brandId;
      const brandProduct = allProducts.find(p => p.brandId === brandId);
      document.getElementById('listTitle').textContent = brandProduct ? `${brandProduct.brandName} 상품` : '브랜드 상품';
    }

    applyFilters();
  } catch(e) {
    console.error(e);
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:#FF4444;">상품을 불러오는 중 오류가 발생했습니다.</div>`;
  }
}

// 정렬 변경
document.querySelector('.sort-select')?.addEventListener('change', applyFilters);

loadApprovedProducts();
</script>
