<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTICMALL | 상품 목록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@400;600;700;800&family=Montserrat:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-y: scroll; }
:root {
  --sky: #1B9FD8; --sky-lt: #E6F5FB; --sky-dk: #1480B0;
  --navy: #1A2D4A; --white: #FFFFFF; --bg-subtle: #F6F8FA;
  --g1: #F2F4F6; --g2: #E0E4E8; --g3: #9BA5B0; --g4: #5A6472;
  --black: #111318; --red: #FF4444; --yellow: #F5C518;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg-subtle); color: var(--black); }
.header{background:var(--white);border-bottom:1px solid var(--g2);}
.header-inner { max-width: 1280px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 24px; }
.logo { font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 700; color: var(--navy); text-decoration: none; }
.logo span { color: var(--navy); }
.header-search { flex: 1; max-width: 480px; display: flex; border: 1.5px solid var(--g2); border-radius: 6px; overflow: hidden; transition: border-color 0.2s; }
.header-search:focus-within { border-color: var(--sky); }
.header-search input { flex: 1; padding: 10px 16px; border: none; outline: none; font-size: 14px; font-family: inherit; }
.search-btn { padding: 0 14px; background: var(--white); border: none; cursor: pointer; color: var(--g4); border-left: 1.5px solid var(--g2); }
.search-btn:hover { color: var(--sky); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 4px; }
.h-btn { padding: 7px 12px; border: none; background: none; font-size: 13px; font-weight: 500; color: var(--g4); font-family: inherit; cursor: pointer; }
.h-sep { color: var(--g2); }
.h-join { padding: 7px 12px; border: none; background: none; color: var(--sky); font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }
.h-join:hover { color: var(--sky-dk); }
.icon-btn { width: 36px; height: 36px; border: none; background: none; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--g4); position: relative; }
.cart-count { position: absolute; top: 2px; right: 2px; background: var(--sky); color: #fff; font-size: 9px; font-weight: 700; border-radius: 100px; padding: 1px 4px; }
.gnb{background:var(--white);border-bottom:2px solid var(--sky);}
.gnb-inner { max-width: 1280px; margin: 0 auto; padding: 0 24px; display: flex; }
.gnb-item { padding: 13px 18px; font-size: 14px; font-weight: 500; color: var(--black); cursor: pointer; border: none; background: none; font-family: inherit; transition: color 0.15s; white-space: nowrap; }
.gnb-item:hover, .gnb-item.active { color: var(--sky); font-weight: 700; }

/* 레이아웃 */
.page-wrap { max-width: 1280px; margin: 0 auto; padding: 24px; display: flex; gap: 24px; }

/* 사이드 필터 */
.sidebar { width: 220px; flex-shrink: 0; }
.filter-section { background: var(--white); border: 1px solid var(--g2); border-radius: 10px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(20,20,20,0.03); }
.filter-title { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 12px; display: flex; justify-content: space-between; cursor: pointer; }
.filter-title span { color: var(--g3); font-weight: 400; font-size: 11px; }
.filter-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; }
.filter-item input[type="checkbox"] { accent-color: var(--sky); width: 15px; height: 15px; cursor: pointer; }
.filter-item label { font-size: 13px; color: var(--g4); cursor: pointer; flex: 1; }
.filter-item .cnt { font-size: 11px; color: var(--g3); }
.price-range { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.price-input { flex: 1; min-width: 0; padding: 8px 10px; border: 1.5px solid var(--g2); border-radius: 6px; font-size: 12px; font-family: inherit; outline: none; }
.price-input:focus { border-color: var(--sky); }
.btn-filter-apply { width: 100%; padding: 9px; background: var(--sky); color: var(--white); border: none; border-radius: 6px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 8px; }
.btn-reset { width: 100%; padding: 8px; background: none; color: var(--g3); border: 1px solid var(--g2); border-radius: 6px; font-size: 12px; font-family: inherit; cursor: pointer; margin-top: 6px; }

/* 상품 목록 */
.products-area { flex: 1; }
.list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.list-title { font-size: 18px; font-weight: 700; color: var(--navy); }
.list-count { font-size: 13px; color: var(--g3); }
.list-count strong { color: var(--navy); }
.list-controls { display: flex; align-items: center; gap: 10px; }
.sort-select { padding: 8px 12px; border: 1.5px solid var(--g2); border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; cursor: pointer; background: var(--white); }
.view-btns { display: flex; gap: 4px; }
.view-btn { width: 32px; height: 32px; border: 1.5px solid var(--g2); background: var(--white); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s; }
.view-btn.active { border-color: var(--sky); color: var(--sky); background: var(--sky-lt); }

/* 상품 그리드 */
.product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.product-card { border: 1px solid var(--g1); box-shadow: 0 1px 2px rgba(20,20,20,0.03); border-radius: 10px; overflow: hidden; cursor: pointer; transition: all 0.2s; background: var(--white); }
.product-card:hover { border-color: var(--sky); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.product-img { aspect-ratio: 4/3; background: var(--g1); display: flex; align-items: center; justify-content: center; position: relative; font-size: 60px; }
.product-img.no-img { opacity: 0.12; }
.p-badge { position: absolute; top: 8px; left: 8px; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
.p-badge.new { background: var(--yellow); color: var(--black); }
.p-badge.hot { background: var(--red); color: var(--white); }
.p-badge.best { background: var(--navy); color: var(--white); }
.p-badge.out { background: var(--g3); color: var(--white); }
.wish-btn { position: absolute; bottom: 8px; right: 8px; width: 30px; height: 30px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
.color-dots { display: flex; gap: 4px; padding: 10px 10px 0; }
.color-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.1); }
.product-info { padding: 8px 10px 12px; }
.p-cat { font-size: 10px; font-weight: 700; color: var(--sky); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
.p-name { font-size: 13px; font-weight: 600; color: var(--black); margin-bottom: 3px; line-height: 1.3; }
.p-size { font-size: 11px; color: var(--g3); margin-bottom: 6px; }
.p-colors { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.p-color-chip { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.15); flex-shrink: 0; title: attr(title); }
.p-color-more { font-size: 10px; color: var(--g3); align-self: center; }
.p-price { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 800; color: var(--navy); }
.p-price .won { font-size: 12px; font-weight: 500; }
.p-locked { font-size: 12px; color: var(--g3); display: flex; align-items: center; gap: 4px; }

/* 페이지네이션 */
.pagination { display: flex; justify-content: center; gap: 6px; margin-top: 32px; }
.page-btn { width: 36px; height: 36px; border: 1.5px solid var(--g2); background: var(--white); border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: inherit; }
.page-btn.active { background: var(--sky); color: var(--white); border-color: var(--sky); font-weight: 700; }
.page-btn:hover:not(.active) { border-color: var(--sky); color: var(--sky); }

/* 하단 네비 */

  if(!email || !pw) { errEl.textContent='이메일과 비밀번호를 입력해주세요.'; errEl.style.display='block'; return; }
  btn.textContent = '...';
  btn.disabled = true;
  try {
    const persistence = keepLogin ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION;
    await _auth.setPersistence(persistence);
    await _auth.signInWithEmailAndPassword(email, pw);
    closeLogin();
  } catch(e) {
    errEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
    errEl.style.display = 'block';
  } finally {
    btn.textContent = '로그인';
    btn.disabled = false;
  }
}

function renderProducts(products) {
  if(!products || products.length === 0) {
    renderEmptyState(allProducts.length === 0 ? '아직 등록된 상품이 없습니다.' : '조건에 맞는 상품이 없습니다.');
    updateCount(0);
    return;
  }

  grid.innerHTML = products.map(p => {
    const badgeHtml = p.discountRate ? `<span class="p-badge hot">${p.discountRate}% SALE</span>` : (p.badge ? `<span class="p-badge ${p.badge}">${p.badge.toUpperCase()}</span>` : '');
    const totalStock = p.colors && p.colors.length > 0
      ? p.colors.reduce((sum, c) => sum + Number(c.stock || 0), 0)
      : Number(p.stock || 0);
    const outHtml = totalStock <= 0 ? `<span class="p-badge out">SOLD OUT</span>` : '';
    let priceHtml;
    if(memberLevel >= 2) {
      const discountRate = Number(p.discountRate) || 0;
      const price = Number(p.price) || 0;
      const salePrice = p.salePrice ? Number(p.salePrice) : (discountRate > 0 ? Math.round(price * (1 - discountRate/100)) : 0);
      if(discountRate > 0 && price > 0) {
        priceHtml = `<div class="p-price">
          <span style="font-size:11px;color:var(--g3);text-decoration:line-through;margin-right:4px;">₩${price.toLocaleString()}</span>
          <span class="won">₩</span>${salePrice.toLocaleString()}
          <span style="font-size:11px;color:var(--red);font-weight:700;margin-left:2px;">${discountRate}%</span>
        </div>`;
      } else {
        priceHtml = `<div class="p-price"><span class="won">₩</span>${price.toLocaleString()}</div>`;
      }
    } else {
      priceHtml = `<div class="p-locked"><i class=ic-lock></i> 로그인 후 가격확인</div>`;
    }
    const hasImg = !!p.mainImageUrl;
    const imgHtml = hasImg
      ? `<img src="${p.mainImageUrl}" style="width:100%;height:100%;object-fit:cover;">`
      : `<i class=ic-glasses></i>`;
    const catLabel = p.category || p.type || p.brandName || '안경테';

    const wishId = (Array.isArray(p.colors) && p.colors.length > 0) ? `${p.id}_c0` : p.id;
    const isWished = wishlistIds.has(wishId);
    return `
      <div class="product-card" onclick="goToProduct('${p.id}')">
        <div class="product-img${hasImg ? '' : ' no-img'}">${imgHtml}${badgeHtml}${outHtml}<button class="wish-btn${isWished ? ' active' : ''}" onclick="toggleListWish(event,'${p.id}','${wishId}',${(p.colors&&p.colors[0])?`'${(p.colors[0].colorName||'').replace(/'/g,"\\'")}'`:'null'})">${isWished ? '<i class=ic-heart-filled></i>' : '<i class=ic-heart></i>'}</button></div>
        <div class="product-info">
          <div class="p-cat">${catLabel}</div>
          <div class="p-name">${p.modelName || '-'}</div>
          <div class="p-size">${p.size ? p.size + ' · ' : ''}${p.barcode || ''}</div>
          ${(() => {
            const colorNames = p.colorNames || (p.color ? [p.color] : []);
            if(colorNames.length === 0) return '';
            const chips = colorNames.slice(0,6).map(c =>
              `<div class="p-color-chip" title="${c}" style="${getListColorDot(c)}"></div>`
            ).join('');
            const more = colorNames.length > 6 ? `<span class="p-color-more">+${colorNames.length-6}</span>` : '';
            return `<div class="p-colors">${chips}${more}</div>`;
          })()}
          ${priceHtml}
        </div>
      </div>`;
  }).join('');
}

// 카드 클릭 시 상품 데이터를 미리 sessionStorage에 저장해서 상세페이지 로딩 깜빡임 최소화
// 색상명 안에서 최대 2가지 색상 키워드 + 투명 여부를 인식 (복합색 이름 지원: 로즈골드블랙, 투명실버 등)
const COLOR_KEYWORD_MAP = [
  ['로즈골드','#E6B8B0'], ['rose gold','#E6B8B0'],
  ['아이보리','#F5F0E1'], ['ivory','#F5F0E1'],
  ['네이비','#1A2D4A'], ['navy','#1A2D4A'],
  ['그레이','#9BA5B0'], ['회색','#9BA5B0'], ['gray','#9BA5B0'], ['grey','#9BA5B0'],
  ['카키','#8B8B5A'], ['khaki','#8B8B5A'],
  ['블랙','#222222'], ['black','#222222'],
  ['화이트','#F5F5F5'], ['white','#F5F5F5'],
  ['실버','#C0C0C0'], ['silver','#C0C0C0'],
  ['골드','#C9A84C'], ['gold','#C9A84C'],
  ['브라운','#8B4513'], ['brown','#8B4513'],
  ['레드','#E53935'], ['red','#E53935'],
  ['블루','#1976D2'], ['blue','#1976D2'],
  ['핑크','#E91E8C'], ['pink','#E91E8C'],
  ['그린','#388E3C'], ['green','#388E3C'],
  ['퍼플','#7B1FA2'], ['purple','#7B1FA2']
];
const TRANSPARENT_KEYWORDS = ['투명','clear','transparent','크리스탈','crystal'];
const CHECKER_BG = "background-image:linear-gradient(45deg,#ddd 25%,transparent 25%),linear-gradient(-45deg,#ddd 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ddd 75%),linear-gradient(-45deg,transparent 75%,#ddd 75%);background-size:6px 6px;background-position:0 0,0 3px,3px -3px,-3px 0;background-color:#fff;";

function extractSwatchColors(colorName) {
  const name = (colorName || '').toLowerCase();
  const isTransparent = TRANSPARENT_KEYWORDS.some(k => name.includes(k));
  const found = [];
  for(const [key, hex] of COLOR_KEYWORD_MAP) {
    if(name.includes(key) && !found.includes(hex)) {
      found.push(hex);
      if(found.length >= 2) break;
    }
  }
  return { colors: found, isTransparent };
}

function getListColorDot(colorName) {
  const { colors, isTransparent } = extractSwatchColors(colorName);
  if(isTransparent && colors.length === 0) return CHECKER_BG;
  if(isTransparent && colors.length >= 1) return `background:linear-gradient(135deg, rgba(255,255,255,0.85), ${colors[0]});`;
  if(colors.length >= 2) return `background:linear-gradient(90deg, ${colors[0]} 50%, ${colors[1]} 50%);`;
  if(colors.length === 1) return `background:${colors[0]};`;
  return `background:#888;`;
}

async function toggleListWish(event, productId, wishId, colorName) {
  event.stopPropagation();
  if(memberLevel < 2) { openLogin(); return; }
  const btn = event.currentTarget;
  const uid = _auth.currentUser.uid;
  wishId = wishId || productId;
  const wishRef = _db.collection('wishlists').doc(uid).collection('items').doc(wishId);
  try {
    if(wishlistIds.has(wishId)) {
      await wishRef.delete();
      wishlistIds.delete(wishId);
      btn.innerHTML = '<i class=ic-heart></i>';
      btn.classList.remove('active');
      showListToast('관심상품에서 제거되었습니다.');
    } else {
      await wishRef.set({
        productId,
        colorIdx: wishId !== productId ? 0 : null,
        colorName: colorName || '',
        addedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      wishlistIds.add(wishId);
      btn.innerHTML = '<i class=ic-heart-filled></i>';
      btn.classList.add('active');
      showListToast('관심상품에 추가되었습니다.', 'success');
    }
  } catch(e) {
    console.error(e);
    showListToast('처리 중 오류가 발생했습니다.');
  }
}

function showListToast(msg, type) {
  let toast = document.getElementById('listFloatToast');
  if(!toast) {
    toast = document.createElement('div');
    toast.id = 'listFloatToast';
    toast.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A2D4A;color:#fff;padding:12px 22px;border-radius:100px;font-size:13px;font-weight:600;z-index:2000;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.background = type === 'success' ? '#1B9FD8' : '#1A2D4A';
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(toast._hideTimer);
  toast._hideTimer = setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(20px)';
  }, 1800);
}

function applyFilters() {
  let result = [...allProducts];

  // 브랜드 필터 (브랜드관에서 진입한 경우)
  if(currentBrandFilter) {
    result = result.filter(p => p.brandId === currentBrandFilter);
  }

  // 카테고리 필터 (메인)
  if(Array.isArray(currentGnbCategory)) {
    result = result.filter(p => currentGnbCategory.includes(p.category));
  } else if(currentGnbCategory !== '전체') {
    result = result.filter(p => p.category === currentGnbCategory);
  }

  // 타입 필터 (서브: 하프/온/림리스)
  const checkedTypes = TYPES.filter(t => document.getElementById('type-'+t).checked);
  if(checkedTypes.length > 0) {
    result = result.filter(p => checkedTypes.includes(p.type));
  }

  // 검색어 필터 (모델명 / 브랜드명 / 대표바코드 / 색상별 바코드 / 카테고리명까지 모두 확인)
  const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  if(keyword) {
    result = result.filter(p => {
      const modelMatch = (p.modelName||'').toLowerCase().includes(keyword);
      const brandMatch = (p.brandName||'').toLowerCase().includes(keyword);
      const catMatch = (p.category||'').toLowerCase().includes(keyword);
      const topBarcodeMatch = (p.barcode||'').toLowerCase().includes(keyword);
      const colorBarcodeMatch = Array.isArray(p.colors) && p.colors.some(c => (c.barcode||'').toLowerCase().includes(keyword));
      return modelMatch || brandMatch || catMatch || topBarcodeMatch || colorBarcodeMatch;
    });
  }

  // 재고 필터
  if(document.getElementById('s1').checked) {
    result = result.filter(p => {
      // 새 구조: colors 배열에서 하나라도 재고 있으면 OK
      if(p.colors && p.colors.length > 0) {
        return p.colors.some(c => Number(c.stock || 0) > 0);
      }
      // 구버전: p.stock
      return Number(p.stock || 0) > 0;
    });
  }

  // 가격대 필터 (회원만 의미있음)
  const minP = parseInt(document.getElementById('priceMin').value) || null;
  const maxP = parseInt(document.getElementById('priceMax').value) || null;
  if(minP !== null) result = result.filter(p => Number(p.price||0) >= minP);
  if(maxP !== null) result = result.filter(p => Number(p.price||0) <= maxP);

  // 정렬
  const sortV = document.querySelector('.sort-select').value;
  if(sortV === '낮은가격순') result.sort((a,b) => (a.price||0) - (b.price||0));
  else if(sortV === '높은가격순') result.sort((a,b) => (b.price||0) - (a.price||0));

  renderProducts(result);
  updateCount(result.length);
}

async function loadActivePromotions() {
  try {
    const snap = await _db.collection('promotions').where('status', '==', 'approved').get();
    const today = new Date().toISOString().slice(0,10);
    const discountMap = {}; // productId -> discountRate

    snap.forEach(doc => {
      const promo = doc.data();
      if(promo.startDate > today || promo.endDate < today) return; // 기간 외
      (promo.targetProductIds || []).forEach(pid => {
        // 여러 이벤트가 겹치면 더 높은 할인율 적용
        if(!discountMap[pid] || promo.discountRate > discountMap[pid]) {
          discountMap[pid] = promo.discountRate;
        }
      });
    });
    return discountMap;
  } catch(e) {
    console.error('이벤트 로드 실패:', e);
    return {};
  }
}

async function loadApprovedProducts() {
  try {
    const snap = await _db.collection('products').where('status', '==', 'approved').get();
    const products = [];
    snap.forEach(doc => products.push({id: doc.id, ...doc.data()}));
    // 최신순 정렬
    products.sort((a,b) => {
      const da = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(0);
      const dbb = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(0);
      return dbb - da;
    });

    // 진행중 이벤트 할인가 매칭
    const discountMap = await loadActivePromotions();
    products.forEach(p => {
      if(discountMap[p.id]) {
        p.discountRate = discountMap[p.id];
        p.originalPrice = Number(p.price || 0);
        p.salePrice = Math.round(p.originalPrice * (1 - discountMap[p.id]/100));
      }
    });

    allProducts = products;
    updateCategoryCounts();

    // URL의 brand 파라미터 처리 (브랜드관에서 넘어온 경우)
    const urlParams = new URLSearchParams(location.search);
    const brandId = urlParams.get('brand');
    if(brandId) {
      currentBrandFilter = brandId;
      const brandProduct = allProducts.find(p => p.brandId === brandId);
      document.getElementById('listTitle').textContent = brandProduct ? `${brandProduct.brandName} 상품` : '브랜드 상품';
    }

    // URL의 cat 파라미터 처리 (다른 페이지 GNB/카테고리 링크로 넘어온 경우)
    const catParam = urlParams.get('cat');
    if(catParam && CATEGORIES.includes(catParam)) {
      currentGnbCategory = catParam;
      document.querySelectorAll('.gnb-item').forEach(b => b.classList.remove('active'));
      const matchingGnbBtn = [...document.querySelectorAll('.gnb-item')].find(b => b.textContent.trim() === catParam);
      if(matchingGnbBtn) matchingGnbBtn.classList.add('active');
      document.getElementById('listTitle').textContent = catParam;
      document.getElementById('cat-all').checked = false;
      CATEGORIES.forEach(c => { document.getElementById('cat-'+c).checked = (c === catParam); });
    }

    // URL의 q 파라미터 처리 (다른 페이지 검색창으로 넘어온 경우)
    const qParam = urlParams.get('q');
    if(qParam) {
      document.getElementById('searchInput').value = qParam;
      document.getElementById('listTitle').textContent = `'${qParam}' 검색결과`;
    }

    applyFilters();
  } catch(e) {
    console.error(e);
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:#FF4444;">상품을 불러오는 중 오류가 발생했습니다.</div>`;
  }
}

// 정렬 변경
document.querySelector('.sort-select')?.addEventListener('change', applyFilters);

loadApprovedProducts();
</script>
