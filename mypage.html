<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTICMALL | 마이페이지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--sky:#1B9FD8;--sky-lt:#E6F5FB;--sky-dk:#1480B0;--navy:#1A2D4A;--white:#FFFFFF;--g1:#F2F4F6;--g2:#E0E4E8;--g3:#9BA5B0;--g4:#5A6472;--black:#111318;--red:#FF4444;--green:#2ECC71;--orange:#F39C12;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--g1);color:var(--black);padding-bottom:80px;}
.header{background:var(--white);border-bottom:1px solid var(--g2);position:sticky;top:0;z-index:100;}
.header-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;gap:24px;}
.logo{font-family:'Inter',sans-serif;font-size:24px;font-weight:800;color:var(--navy);text-decoration:none;}
.logo span{color:var(--sky);}
.back{margin-left:auto;font-size:13px;color:var(--g3);text-decoration:none;}
.back:hover{color:var(--sky);}

.main{max-width:1100px;margin:0 auto;padding:24px;display:flex;gap:20px;align-items:flex-start;}

/* 사이드 */
.sidebar{width:220px;flex-shrink:0;}
.profile-card{background:var(--white);border-radius:10px;padding:20px;text-align:center;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.profile-avatar{width:64px;height:64px;background:var(--sky);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--white);margin:0 auto 10px;}
.profile-name{font-size:15px;font-weight:700;color:var(--navy);}
.profile-store{font-size:12px;color:var(--g3);margin-top:2px;}
.profile-level{display:inline-block;margin-top:8px;background:var(--sky-lt);color:var(--sky);font-size:11px;font-weight:700;padding:3px 12px;border-radius:100px;}
.profile-level.pending{background:#FEF9E7;color:var(--orange);}
.purchase-level-badge{display:inline-block;margin-top:8px;font-size:12px;font-weight:700;padding:4px 14px;border-radius:100px;}
.purchase-level-badge.lv-1{background:#F2F4F6;color:#5A6472;}
.purchase-level-badge.lv-2{background:#EEF2F6;color:#6B7C93;}
.purchase-level-badge.lv-3{background:#FEF8E7;color:#C49A1A;}
.purchase-level-badge.lv-4{background:#F1EEFB;color:#6B4FBB;}
.purchase-level-badge.lv-5{background:#1A2D4A;color:#FFD700;}
.purchase-progress{margin-top:10px;font-size:11px;color:var(--g3);text-align:left;}
.purchase-progress-bar{width:100%;height:5px;background:var(--g1);border-radius:100px;margin-top:5px;overflow:hidden;}
.purchase-progress-fill{height:100%;background:var(--sky);border-radius:100px;transition:width 0.3s;}
.menu-card{background:var(--white);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.menu-item{padding:13px 16px;font-size:13px;font-weight:500;color:var(--g4);cursor:pointer;border-bottom:1px solid var(--g1);display:flex;align-items:center;gap:8px;transition:all 0.15s;}
.menu-item:last-child{border-bottom:none;}
.menu-item:hover,.menu-item.active{background:var(--sky-lt);color:var(--sky);font-weight:700;}
.menu-item .icon{font-size:15px;width:20px;text-align:center;}

/* 컨텐츠 */
.content{flex:1;}
.section-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:16px;}

/* 요약 카드 */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.sum-card{background:var(--white);border-radius:10px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.sum-num{font-family:'Inter',sans-serif;font-size:26px;font-weight:800;color:var(--navy);}
.sum-label{font-size:11px;color:var(--g3);margin-top:4px;}

/* 주문 내역 */
.order-card{background:var(--white);border-radius:10px;padding:20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--g1);}
.order-num{font-family:'Inter',sans-serif;font-size:13px;color:var(--sky);font-weight:700;}
.order-date{font-size:12px;color:var(--g3);}
.order-status{font-size:12px;font-weight:700;padding:4px 12px;border-radius:100px;white-space:nowrap;}
.status-pending{background:var(--g1);color:var(--g3);}
.status-pay{background:#E8FBF0;color:var(--green);}
.status-ready{background:#FEF9E7;color:var(--orange);}
.status-ship{background:var(--sky-lt);color:var(--sky);}
.status-done{background:var(--g1);color:var(--g3);}
.status-cancel{background:#FEECEC;color:var(--red);}
.status-cancel-req{background:#FFF3E0;color:#E65100;}

/* 취소/반품 신청 모달 */
.cancel-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:2000;}
.cancel-modal-overlay.open{display:flex;}
.cancel-modal-box{background:var(--white);border-radius:14px;width:440px;max-width:92vw;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.2);}
.cancel-modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--g2);}
.cancel-modal-title{font-size:16px;font-weight:700;color:var(--navy);}
.cancel-modal-close{width:28px;height:28px;border:none;background:var(--g1);border-radius:50%;cursor:pointer;font-size:14px;}
.cancel-modal-body{padding:20px;}
.cancel-form-group{margin-bottom:16px;}
.cancel-form-group label{display:block;font-size:12px;font-weight:700;color:var(--g4);margin-bottom:6px;}
.cancel-form-group select{width:100%;padding:10px 12px;border:1.5px solid var(--g2);border-radius:8px;font-size:14px;font-family:inherit;outline:none;}
.cancel-refund-info{background:var(--g1);border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:13px;line-height:1.7;}
.cancel-notice{font-size:12px;color:var(--g3);line-height:1.6;margin-top:8px;}
.cancel-modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid var(--g2);}
.cancel-submit-btn{padding:10px 24px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.cancel-submit-btn:hover{opacity:0.88;}
.cancel-submit-btn:disabled{background:var(--g2);color:var(--g3);cursor:not-allowed;}
.order-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--g1);}
.order-item:last-child{border-bottom:none;}
.order-img{width:56px;height:56px;background:var(--g1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;opacity:0.15;flex-shrink:0;overflow:hidden;}
.order-img img{width:100%;height:100%;object-fit:cover;}
.order-item-info{flex:1;}
.order-item-name{font-size:13px;font-weight:600;color:var(--navy);}
.order-item-opt{font-size:11px;color:var(--g3);margin-top:2px;}
.order-item-price{font-family:'Inter',sans-serif;font-size:14px;font-weight:800;color:var(--navy);}
.order-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--g1);}
.order-total{font-size:14px;font-weight:700;color:var(--navy);}
.order-total span{font-family:'Inter',sans-serif;font-size:18px;color:var(--sky);}
.order-actions{display:flex;gap:8px;}
.btn-sm{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all 0.15s;}
.btn-track{background:var(--sky);color:var(--white);}
.btn-track:hover{background:var(--sky-dk);}
.btn-cancel{background:var(--white);color:var(--g4);border:1.5px solid var(--g2);}
.btn-cancel:hover{border-color:var(--red);color:var(--red);}
.empty-box{background:var(--white);border-radius:10px;padding:60px;text-align:center;color:var(--g3);}
.loading-box{text-align:center;padding:60px;color:var(--g3);}
.spinner{width:32px;height:32px;border:3px solid var(--g2);border-top-color:var(--sky);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* 관심 상품 */
.wish-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.wish-card{background:var(--white);border-radius:10px;overflow:hidden;border:1px solid var(--g2);cursor:pointer;transition:all 0.2s;position:relative;}
.wish-card:hover{border-color:var(--sky);transform:translateY(-2px);}
.wish-img{aspect-ratio:4/3;background:var(--g1);display:flex;align-items:center;justify-content:center;font-size:50px;overflow:hidden;}
.wish-img.no-img{opacity:0.12;}
.wish-img img{width:100%;height:100%;object-fit:cover;}
.wish-info{padding:10px;}
.wish-name{font-size:13px;font-weight:600;color:var(--navy);}
.wish-price{font-size:13px;color:var(--sky);font-weight:700;margin-top:4px;}
.wish-del{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;cursor:pointer;font-size:13px;color:var(--g4);display:flex;align-items:center;justify-content:center;}
.wish-del:hover{color:var(--red);}

/* 재입고 알림 */
.restock-card{background:var(--white);border-radius:10px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.restock-img{width:56px;height:56px;background:var(--g1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden;}
.restock-img.no-img{opacity:0.15;}
.restock-img img{width:100%;height:100%;object-fit:cover;}
.restock-info{flex:1;}
.restock-name{font-size:13px;font-weight:600;color:var(--navy);}
.restock-status{font-size:11px;margin-top:3px;}
.restock-status.waiting{color:var(--orange);}
.restock-status.ready{color:var(--green);}
.btn-del-alarm{padding:6px 14px;background:var(--white);color:var(--red);border:1px solid var(--red);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}

/* 회원정보 폼 */
.form-card{background:var(--white);border-radius:10px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.addr-card{background:var(--white);border-radius:10px;padding:18px 20px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.addr-card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.addr-label{font-size:14px;font-weight:700;color:var(--navy);}
.addr-default-badge{font-size:11px;font-weight:700;background:var(--sky-lt);color:var(--sky);padding:2px 10px;border-radius:100px;}
.addr-recipient{font-size:13px;color:var(--g4);margin-bottom:4px;}
.addr-text{font-size:13px;color:var(--black);line-height:1.6;margin-bottom:12px;}
.addr-actions{display:flex;gap:8px;}
.form-group{margin-bottom:14px;}
.form-group label{font-size:12px;font-weight:600;color:var(--g4);display:block;margin-bottom:5px;}
.form-group input,.form-group textarea{width:100%;padding:11px 14px;border:1.5px solid var(--g2);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.form-group input:focus,.form-group textarea:focus{border-color:var(--sky);}
.form-group input[readonly]{background:var(--g1);color:var(--g4);}
.btn-save{padding:13px;background:var(--sky);color:var(--white);border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;margin-top:6px;transition:background 0.15s;}
.btn-addr-search{padding:0 16px;background:var(--navy);color:var(--white);border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;transition:background 0.15s;}
.btn-addr-search:hover{background:var(--sky);}
.btn-save:hover{background:var(--sky-dk);}

/* 하단 네비 */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--white);border-top:1px solid var(--g2);display:flex;z-index:300;box-shadow:0 -4px 20px rgba(0,0,0,0.08);}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;font-size:10px;font-weight:600;color:var(--g3);cursor:pointer;font-family:inherit;}
.bnav-item.active{color:var(--sky);}
.bnav-item svg{width:22px;height:22px;}
</style>
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">OPTIC<span>MALL</span></a>
    <a href="index.html" class="back">← 홈으로</a>
  </div>
</header>

<div id="loadingArea" class="main">
  <div class="loading-box" style="flex:1;"><div class="spinner"></div>마이페이지를 불러오는 중...</div>
</div>

<div class="main" id="mypageMain" style="display:none;">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="profile-card">
      <div class="profile-avatar" id="profileAvatar">-</div>
      <div class="profile-name" id="profileName">-</div>
      <div class="profile-store" id="profileStore">-</div>
      <div class="profile-level" id="profileLevel">-</div>
      <div class="purchase-level-badge" id="purchaseLevelBadge" style="display:none;"></div>
      <div class="purchase-progress" id="purchaseProgress" style="display:none;">
        <div id="purchaseProgressText"></div>
        <div class="purchase-progress-bar"><div class="purchase-progress-fill" id="purchaseProgressFill" style="width:0%;"></div></div>
      </div>
    </div>
    <div class="menu-card">
      <div class="menu-item active" onclick="showSection('orders',this)"><span class="icon">🛒</span>주문 내역</div>
      <div class="menu-item" onclick="showSection('wish',this)"><span class="icon">❤️</span>관심상품</div>
      <div class="menu-item" onclick="showSection('restock',this)"><span class="icon">🔔</span>재입고 알림</div>
      <div class="menu-item" onclick="showSection('profile',this)"><span class="icon">👤</span>회원 정보 수정</div>
      <div class="menu-item" onclick="showSection('biz',this)"><span class="icon">🏢</span>사업자 정보</div>
      <div class="menu-item" onclick="showSection('address',this)"><span class="icon">📍</span>배송지 관리</div>
      <div class="menu-item" onclick="doLogout()"><span class="icon">🚪</span>로그아웃</div>
    </div>
  </aside>

  <!-- 컨텐츠 -->
  <div class="content">

    <!-- 주문 요약 -->
    <div class="summary-grid">
      <div class="sum-card"><div class="sum-num" style="color:var(--sky);" id="cntPaid">-</div><div class="sum-label">결제완료</div></div>
      <div class="sum-card"><div class="sum-num" style="color:var(--orange);" id="cntShipping">-</div><div class="sum-label">배송중</div></div>
      <div class="sum-card"><div class="sum-num" style="color:var(--green);" id="cntDone">-</div><div class="sum-label">배송완료</div></div>
      <div class="sum-card"><div class="sum-num" style="color:var(--red);" id="cntCancel">-</div><div class="sum-label">취소/반품</div></div>
    </div>

    <!-- 주문 내역 -->
    <div id="section-orders">
      <div class="section-title">주문 내역</div>
      <div id="ordersList"><div class="loading-box"><div class="spinner"></div>불러오는 중...</div></div>
    </div>

    <!-- 관심상품 -->
    <div id="section-wish" style="display:none;">
      <div class="section-title">관심상품</div>
      <div id="wishList"><div class="loading-box"><div class="spinner"></div>불러오는 중...</div></div>
    </div>

    <!-- 재입고 알림 -->
    <div id="section-restock" style="display:none;">
      <div class="section-title">재입고 알림 신청 목록</div>
      <div id="restockList"><div class="loading-box"><div class="spinner"></div>불러오는 중...</div></div>
    </div>

    <!-- 회원 정보 -->
    <div id="section-profile" style="display:none;">
      <div class="section-title">회원 정보 수정</div>
      <div class="form-card">
        <div class="form-group"><label>이름</label><input id="editName"></div>
        <div class="form-group"><label>이메일</label><input id="editEmail" readonly></div>
        <div class="form-group"><label>휴대폰</label><input id="editPhone"></div>
        <div class="form-group" id="storeNameGroup"><label>안경원명</label><input id="editStoreName"></div>
        <button class="btn-save" onclick="saveProfile()">수정하기</button>
      </div>
    </div>

    <!-- 사업자 정보 -->
    <div id="section-biz" style="display:none;">
      <div class="section-title">사업자 정보</div>
      <div class="form-card">
        <div class="form-group"><label>사업자등록번호</label><input id="bizNo" readonly></div>
        <div class="form-group" id="licenseGroup"><label>안경사 면허번호</label><input id="licenseNo" readonly></div>
        <div class="form-group" id="storePhoneGroup"><label>안경원 전화번호</label><input id="storePhone" readonly></div>
        <div style="font-size:12px;color:var(--g3);margin-top:8px;">사업자 정보 변경이 필요하면 고객센터로 문의해주세요.</div>
      </div>
    </div>

    <!-- 배송지 관리 -->
    <div id="section-address" style="display:none;">
      <div class="section-header">
        <div class="section-title">배송지 관리</div>
        <button class="btn-sm btn-primary" onclick="openAddAddressForm()">+ 배송지 추가</button>
      </div>

      <!-- 배송지 추가/수정 폼 (기본 숨김) -->
      <div class="form-card" id="addressFormCard" style="display:none;margin-bottom:14px;">
        <div class="form-group"><label>배송지 이름</label><input id="addrLabel" placeholder="예) 회사, 자택, 안경원"></div>
        <div class="form-group"><label>받는 분</label><input id="addrRecipientName" placeholder="수령인 이름"></div>
        <div class="form-group"><label>연락처</label><input id="addrRecipientPhone" placeholder="010-0000-0000"></div>
        <div class="form-group">
          <label>우편번호</label>
          <div style="display:flex;gap:8px;">
            <input id="addrZip" placeholder="우편번호" readonly style="background:var(--g1);">
            <button type="button" class="btn-addr-search" onclick="openAddressSearch()">주소 검색</button>
          </div>
        </div>
        <div class="form-group"><label>기본 주소</label><input id="addrAddr1" placeholder="주소 검색을 클릭해주세요" readonly style="background:var(--g1);"></div>
        <div class="form-group"><label>상세 주소</label><input id="addrAddr2" placeholder="상세 주소 (동/호수 등)"></div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
            <input type="checkbox" id="addrIsDefault" style="width:16px;height:16px;accent-color:var(--sky);">
            <span style="font-size:13px;color:var(--g4);">기본 배송지로 설정</span>
          </label>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn-sm btn-ghost" onclick="closeAddAddressForm()" style="flex:1;padding:13px;">취소</button>
          <button class="btn-save" id="saveAddressBtn" onclick="saveAddress()" style="flex:2;margin-top:0;">배송지 저장</button>
        </div>
      </div>

      <div id="addressList"><div class="loading-box"><div class="spinner"></div>불러오는 중...</div></div>
    </div>

  </div>
</div>

<!-- 하단 네비 -->
<nav class="bottom-nav">
  <button class="bnav-item" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>HOME
  </button>
  <button class="bnav-item" onclick="location.href='list.html'">

function showSection(name, el) {
  ['orders','wish','restock','profile','biz','address'].forEach(s => {

    if(sec) sec.style.display = s===name ? 'block' : 'none';

function formatDate(ts) {
  if(!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

// ===================== 프로필 =====================
function renderProfile() {
  const u = currentUserData;
  const role = u.role || 'optician';
  const displayName = u.storeName || u.brandName || '';

  document.getElementById('profileAvatar').textContent = (u.name||'?').charAt(0);
  document.getElementById('profileName').textContent = u.name || '-';
  document.getElementById('profileStore').textContent = displayName || '-';

  const levelEl = document.getElementById('profileLevel');
  const isApproved = (u.member_level||0) >= 2;
  if(isApproved) {
    levelEl.textContent = '✓ B2B 승인회원';
    levelEl.classList.remove('pending');
  } else {
    levelEl.textContent = '⏳ 승인 대기중';
    levelEl.classList.add('pending');
  }

  // 구매등급 (승인된 회원만 표시)
  const badgeEl = document.getElementById('purchaseLevelBadge');
  const progressEl = document.getElementById('purchaseProgress');
  if(isApproved) {
    const purchaseLevel = u.purchase_level || 1;
    const totalAmount = Number(u.total_purchase_amount || 0);
    const lvInfo = PURCHASE_LEVELS.find(l => l.level === purchaseLevel) || PURCHASE_LEVELS[0];

    badgeEl.textContent = lvInfo.name;
    badgeEl.className = `purchase-level-badge lv-${lvInfo.level}`;
    badgeEl.style.display = 'inline-block';

    if(lvInfo.max) {
      const progress = Math.min(100, Math.round((totalAmount - lvInfo.min) / (lvInfo.max - lvInfo.min) * 100));
      const remain = lvInfo.max - totalAmount;
      const nextLv = PURCHASE_LEVELS.find(l => l.level === lvInfo.level + 1);
      document.getElementById('purchaseProgressText').textContent =
        `${nextLv ? nextLv.name : '다음 등급'}까지 ₩${remain.toLocaleString()} 남음`;
      document.getElementById('purchaseProgressFill').style.width = progress + '%';
      progressEl.style.display = 'block';
    } else {
      document.getElementById('purchaseProgressText').textContent = '최고 등급입니다 🎉';
      document.getElementById('purchaseProgressFill').style.width = '100%';
      progressEl.style.display = 'block';
    }
  } else {
    badgeEl.style.display = 'none';
    progressEl.style.display = 'none';
  }

  // 회원정보 폼
  document.getElementById('editName').value = u.name || '';
  document.getElementById('editEmail').value = currentUser.email || '';
  document.getElementById('editPhone').value = u.phone || '';
  if(role === 'brand') {
    document.getElementById('storeNameGroup').querySelector('label').textContent = '브랜드명';
    document.getElementById('editStoreName').value = u.brandName || '';
  } else {
    document.getElementById('editStoreName').value = u.storeName || '';
  }

  // 사업자 정보
  document.getElementById('bizNo').value = u.bizNo || '-';
  if(role === 'brand') {
    document.getElementById('licenseGroup').style.display = 'none';
    document.getElementById('storePhoneGroup').querySelector('label').textContent = '대표자명';
    document.getElementById('storePhone').value = u.ceoName || '-';
  } else {
    document.getElementById('licenseNo').value = u.licenseNo || '-';
    document.getElementById('storePhone').value = u.storePhone || '-';
  }
}

async function saveProfile() {
  const name = document.getElementById('editName').value.trim();
  const phone = document.getElementById('editPhone').value.trim();
  const storeName = document.getElementById('editStoreName').value.trim();
  if(!name) { alert('이름을 입력해주세요.'); return; }

  const role = currentUserData.role || 'optician';
  const updateData = { name, phone };
  if(role === 'brand') updateData.brandName = storeName;
  else updateData.storeName = storeName;

  try {
    await _db.collection('users').doc(currentUser.uid).update(updateData);
    currentUserData = { ...currentUserData, ...updateData };
    renderProfile();
    alert('✓ 정보가 수정되었습니다.');
  } catch(e) {
    console.error(e);
    alert('수정 중 오류가 발생했습니다: ' + e.message);
  }
}

// ===================== 배송지 관리 (다중 배송지) =====================
let myAddresses = [];
let editingAddressId = null;

async function loadAddresses() {
  const listEl = document.getElementById('addressList');
  listEl.innerHTML = '<div class="loading-box"><div class="spinner"></div>불러오는 중...</div>';
  try {
    const snap = await _db.collection('users').doc(currentUser.uid).collection('addresses').get();
    myAddresses = [];
    snap.forEach(d => myAddresses.push({ id: d.id, ...d.data() }));
    // 기본 배송지가 맨 위로
    myAddresses.sort((a,b) => (b.isDefault?1:0) - (a.isDefault?1:0));

    if(myAddresses.length === 0) {
      listEl.innerHTML = `<div class="empty-box">등록된 배송지가 없습니다. "+ 배송지 추가"로 첫 배송지를 등록해보세요!</div>`;
      return;
    }

    listEl.innerHTML = myAddresses.map(a => `
      <div class="addr-card">
        <div class="addr-card-top">
          <span class="addr-label">${a.label || '배송지'}</span>
          ${a.isDefault ? `<span class="addr-default-badge">기본 배송지</span>` : ''}
        </div>
        <div class="addr-recipient">${a.recipientName||'-'} · ${a.recipientPhone||'-'}</div>
        <div class="addr-text">${a.addr1||''} ${a.addr2||''} ${a.zipcode ? `(${a.zipcode})` : ''}</div>
        <div class="addr-actions">
          ${!a.isDefault ? `<button class="btn-sm btn-track" onclick="setDefaultAddress('${a.id}')">기본으로 설정</button>` : ''}
          <button class="btn-sm btn-cancel" onclick="openEditAddressForm('${a.id}')">수정</button>
          <button class="btn-sm btn-cancel" onclick="deleteAddress('${a.id}')">삭제</button>
        </div>
      </div>
    `).join('');
  } catch(e) {
    console.error(e);
    listEl.innerHTML = `<div class="empty-box" style="color:var(--red);">불러오지 못했습니다: ${e.message}</div>`;
  }
}

function openAddAddressForm() {

  document.getElementById('addrLabel').value = '';
  document.getElementById('addrRecipientName').value = currentUserData.name || '';
  document.getElementById('addrRecipientPhone').value = currentUserData.phone || '';

function openEditAddressForm(addressId) {
  const addr = myAddresses.find(a => a.id === addressId);
  if(!addr) return;
  editingAddressId = addressId;
  document.getElementById('addrLabel').value = addr.label || '';
  document.getElementById('addrRecipientName').value = addr.recipientName || '';
  document.getElementById('addrRecipientPhone').value = addr.recipientPhone || '';
  document.getElementById('addrZip').value = addr.zipcode || '';
  document.getElementById('addrAddr1').value = addr.addr1 || '';
  document.getElementById('addrAddr2').value = addr.addr2 || '';
  document.getElementById('addrIsDefault').checked = !!addr.isDefault;
  document.getElementById('saveAddressBtn').textContent = '배송지 수정 저장';
  document.getElementById('addressFormCard').style.display = 'block';
}

function closeAddAddressForm() {
  document.getElementById('addressFormCard').style.display = 'none';
  editingAddressId = null;
}

async function saveAddress() {
  const label = document.getElementById('addrLabel').value.trim() || '배송지';
  const recipientName = document.getElementById('addrRecipientName').value.trim();
  const recipientPhone = document.getElementById('addrRecipientPhone').value.trim();
  const zipcode = document.getElementById('addrZip').value.trim();
  const addr1 = document.getElementById('addrAddr1').value.trim();
  const addr2 = document.getElementById('addrAddr2').value.trim();
  const isDefault = document.getElementById('addrIsDefault').checked;

  if(!recipientName) { alert('받는 분 이름을 입력해주세요.'); return; }
  if(!addr1) { alert('기본 주소를 입력해주세요.'); return; }

  const btn = document.getElementById('saveAddressBtn');
  btn.disabled = true;

  try {
    const colRef = _db.collection('users').doc(currentUser.uid).collection('addresses');

    // 이 배송지를 기본으로 설정하면, 기존 기본 배송지들의 플래그를 해제
    if(isDefault) {
      await Promise.all(
        myAddresses.filter(a => a.isDefault && a.id !== editingAddressId)
          .map(a => colRef.doc(a.id).update({ isDefault: false }))
      );
    }

    const data = { label, recipientName, recipientPhone, zipcode, addr1, addr2, isDefault };

    if(editingAddressId) {
      await colRef.doc(editingAddressId).update(data);
      alert('✓ 배송지가 수정되었습니다.');
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      await colRef.add(data);
      alert('✓ 배송지가 추가되었습니다.');
    }

    closeAddAddressForm();
    loadAddresses();
  } catch(e) {
    console.error(e);
    alert('저장 중 오류가 발생했습니다: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

async function setDefaultAddress(addressId) {
  try {
    const colRef = _db.collection('users').doc(currentUser.uid).collection('addresses');
    await Promise.all(
      myAddresses.filter(a => a.isDefault).map(a => colRef.doc(a.id).update({ isDefault: false }))
    );
    await colRef.doc(addressId).update({ isDefault: true });
    loadAddresses();
  } catch(e) {
    console.error(e);
    alert('기본 배송지 설정 중 오류가 발생했습니다: ' + e.message);
  }
}

async function deleteAddress(addressId) {
  const addr = myAddresses.find(a => a.id === addressId);
  if(!confirm(`"${addr?.label}" 배송지를 삭제하시겠습니까?`)) return;
  try {
    await _db.collection('users').doc(currentUser.uid).collection('addresses').doc(addressId).delete();
    loadAddresses();
  } catch(e) {
    console.error(e);
    alert('삭제 중 오류가 발생했습니다: ' + e.message);
  }
}

// ===================== 주문 내역 =====================
const orderStatusMap = {
  payment_pending:       { label: '결제대기',        cls: 'status-pending' },
  payment_window_passed: { label: '결제완료(승인대기)', cls: 'status-pay' },
  paid:                  { label: '결제완료',         cls: 'status-pay' },
  preparing:             { label: '출고준비중',        cls: 'status-ready' },
  shipping:              { label: '배송중',            cls: 'status-ship' },
  delivered:             { label: '배송완료',          cls: 'status-done' },
  cancel_requested:      { label: '취소신청',          cls: 'status-cancel-req' },
  cancel_completed:      { label: '취소/환불완료',     cls: 'status-cancel' },
  return_requested:      { label: '반품신청',          cls: 'status-cancel-req' },
  cancelled:             { label: '취소됨',            cls: 'status-cancel' }
};

function getOrderItems(order) {
  // 신규 다건 구조 우선, 옛 단건 구조 호환
  if(Array.isArray(order.items) && order.items.length > 0) return order.items;
  if(order.productName) {
    return [{
      productId: order.productId, productName: order.productName,
      qty: order.qty || 1, unitPrice: order.unitPrice || 0,
      subtotal: (order.unitPrice||0) * (order.qty||1)
    }];
  }
  return [];
}

async function loadOrders() {
  const listEl = document.getElementById('ordersList');
  try {
    const snap = await _db.collection('orders').where('userId', '==', currentUser.uid).get();
    const orders = [];
    snap.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
    orders.sort((a,b) => {
      const da = a.createdAt?.toDate?.() || new Date(0);
      const dbb = b.createdAt?.toDate?.() || new Date(0);
      return dbb - da;
    });

    // 요약 카운트
    let paid=0, shipping=0, done=0, cancel=0;
    orders.forEach(o => {
      const st = o.status;
      if(st === 'payment_window_passed' || st === 'paid' || st === 'preparing') paid++;
      else if(st === 'shipping') shipping++;
      else if(st === 'delivered') done++;
      else if(st === 'cancelled') cancel++;
    });
    document.getElementById('cntPaid').textContent = paid;
    document.getElementById('cntShipping').textContent = shipping;
    document.getElementById('cntDone').textContent = done;
    document.getElementById('cntCancel').textContent = cancel;

    if(orders.length === 0) {
      listEl.innerHTML = `<div class="empty-box">아직 주문 내역이 없습니다.</div>`;
      return;
    }

    listEl.innerHTML = orders.map(o => {
      const statusInfo = orderStatusMap[o.status] || { label: o.status||'대기', cls: 'status-pending' };
      const items = getOrderItems(o);

      // 취소/반품 버튼 상태별 분기
      const canCancel = ['payment_window_passed', 'paid', 'preparing'].includes(o.status);
      const canReturn = o.status === 'shipping' || o.status === 'delivered';
      const isPendingCancel = o.status === 'cancel_requested' || o.status === 'return_requested';

      return `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-num">${o.orderId || o.id}</div>
              <div class="order-date">${formatDate(o.createdAt)}</div>
            </div>
            <span class="order-status ${statusInfo.cls}">${statusInfo.label}</span>
          </div>
          ${items.map(it => `
            <div class="order-item">
              <div class="order-img">👓</div>
              <div class="order-item-info">
                <div class="order-item-name">${it.productName||'-'}</div>
                <div class="order-item-opt">${it.qty}개</div>
              </div>
              <div class="order-item-price">₩${Number(it.subtotal||0).toLocaleString()}</div>
            </div>
          `).join('')}
          <div class="order-footer">
            <div class="order-total">합계 <span>₩${Number(o.totalAmount||0).toLocaleString()}</span></div>
            <div class="order-actions">
              ${canCancel ? `<button class="btn-sm btn-cancel" onclick="openCancelModal('${o.id}','before_ship')">주문 취소</button>` : ''}
              ${canReturn ? `<button class="btn-sm btn-cancel" onclick="openCancelModal('${o.id}','after_ship')">반품 신청</button>` : ''}
              ${isPendingCancel ? `<span style="font-size:12px;color:var(--orange);font-weight:600;">처리 대기중</span>` : ''}
            </div>
          </div>
          ${o.cancelReason ? `<div style="font-size:12px;color:var(--g3);padding:0 4px 4px;">취소사유: ${o.cancelReason}</div>` : ''}
          ${o.cancelNote ? `<div style="font-size:12px;color:var(--red);padding:0 4px 4px;">관리자 메모: ${o.cancelNote}</div>` : ''}
        </div>`;
    }).join('');
  } catch(e) {
    console.error(e);
    listEl.innerHTML = `<div class="empty-box" style="color:var(--red);">주문 내역을 불러오지 못했습니다.</div>`;
  }
}

// ===================== 취소/반품 신청 모달 =====================
let cancelTargetOrderId = null;
let cancelType = null; // 'before_ship' | 'after_ship'
const RETURN_SHIPPING_FEE = 6000; // 왕복 택배비

function openCancelModal(orderId, type) {
  cancelTargetOrderId = orderId;
  cancelType = type;

  const title = document.getElementById('cancelModalTitle');
  const refundInfo = document.getElementById('cancelRefundInfo');
  const notice = document.getElementById('cancelNotice');
  const submitBtn = document.getElementById('cancelSubmitBtn');

  document.getElementById('cancelReasonSelect').value = '';
  document.getElementById('cancelReasonEtc').value = '';
  document.getElementById('cancelReasonEtcWrap').style.display = 'none';

  // 주문 정보 찾기
  const orderSnap = _db.collection('orders').doc(orderId);
  orderSnap.get().then(doc => {
    if(!doc.exists) return;
    const o = doc.data();
    const totalAmount = Number(o.totalAmount || 0);

    if(type === 'before_ship') {
      title.textContent = '주문 취소 신청';
      refundInfo.innerHTML = `
        <div style="font-weight:700;color:var(--navy);margin-bottom:6px;">💰 환불 예정 금액</div>
        <div style="display:flex;justify-content:space-between;"><span>결제 금액</span><span>₩${totalAmount.toLocaleString()}</span></div>
        <div style="display:flex;justify-content:space-between;"><span>배송비 공제</span><span style="color:var(--green);">없음 (발송 전 취소)</span></div>
        <div style="display:flex;justify-content:space-between;font-weight:700;color:var(--sky);margin-top:6px;border-top:1px solid var(--g2);padding-top:6px;">
          <span>환불 예정액</span><span>₩${totalAmount.toLocaleString()}</span>
        </div>`;
      notice.innerHTML = `⚠️ 취소 신청 후 관리자 확인을 거쳐 환불 처리됩니다.<br>영업일 기준 1~3일 내 처리됩니다.`;
      submitBtn.textContent = '취소 신청';
      submitBtn.style.background = 'var(--red)';
    } else {
      title.textContent = '반품 신청';

      // 배송지 주소로 택배비 자동 계산
      const addr = o.shippingAddress?.address || o.shippingAddress?.roadAddress || '';
      let returnFee = 7000;
      let regionLabel = '일반 지역';
      if(addr.includes('제주')) {
        returnFee = 13000;
        regionLabel = '제주도';
      } else if(addr.includes('울릉') || addr.includes('독도') || addr.includes('가거도') || addr.includes('거문도') || addr.includes('고흥') || addr.includes('신안') || addr.includes('완도') || addr.includes('진도') || addr.includes('홍도')) {
        returnFee = 20000;
        regionLabel = '도서산간';
      }

      // 취소 사유에 따라 택배비 공제 여부 결정 (불량/오배송은 무료)
      const refundAmount = Math.max(0, totalAmount - returnFee);

      refundInfo.innerHTML = `
        <div style="font-weight:700;color:var(--navy);margin-bottom:8px;">💰 환불 예정 금액</div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>결제 금액</span><span>₩${totalAmount.toLocaleString()}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;color:var(--red);">
          <span>왕복 택배비 공제 <span style="font-size:11px;color:var(--g3);">(${regionLabel})</span></span>
          <span>-₩${returnFee.toLocaleString()}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-weight:700;color:var(--sky);margin-top:8px;border-top:1px solid var(--g2);padding-top:8px;font-size:15px;">
          <span>환불 예정액</span><span>₩${refundAmount.toLocaleString()}</span>
        </div>
        <div style="font-size:11px;color:var(--g3);margin-top:6px;">배송지: ${addr || '정보 없음'}</div>`;

      notice.innerHTML = `
        ⚠️ 상품 불량/오배송의 경우 택배비가 공제되지 않습니다.<br>
        해당 사유 선택 시 전액(₩${totalAmount.toLocaleString()}) 환불됩니다.<br>
        반품 주소는 관리자 확인 후 안내드립니다.`;

      // 반품 택배비 정보를 전역으로 저장 (onCancelReasonChange에서 사용)
      window._returnFeeInfo = { returnFee, regionLabel, totalAmount, addr };

      submitBtn.textContent = '반품 신청';
      submitBtn.style.background = '#E65100';
    }
  });

  document.getElementById('cancelModalOverlay').classList.add('open');
}

function closeCancelModal() {
  document.getElementById('cancelModalOverlay').classList.remove('open');
  cancelTargetOrderId = null;
  cancelType = null;
  window._returnFeeInfo = null;
}

function onCancelReasonChange() {
  const val = document.getElementById('cancelReasonSelect').value;
  document.getElementById('cancelReasonEtcWrap').style.display = val === '기타' ? 'block' : 'none';

  // 반품 모달일 때 사유에 따라 환불액 재계산
  if(cancelType === 'after_ship' && window._returnFeeInfo) {
    const { returnFee, regionLabel, totalAmount, addr } = window._returnFeeInfo;
    const isFreeReturn = val === '상품불량' || val === '오배송';
    const actualFee = isFreeReturn ? 0 : returnFee;
    const actualRefund = Math.max(0, totalAmount - actualFee);
    const refundInfo = document.getElementById('cancelRefundInfo');
    if(refundInfo) {
      refundInfo.innerHTML = `
        <div style="font-weight:700;color:var(--navy);margin-bottom:8px;">💰 환불 예정 금액</div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>결제 금액</span><span>₩${totalAmount.toLocaleString()}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;color:${isFreeReturn ? 'var(--green)' : 'var(--red)'};">
          <span>왕복 택배비 공제 <span style="font-size:11px;color:var(--g3);">(${regionLabel})</span></span>
          <span>${isFreeReturn ? '없음 (판매자 귀책)' : '-₩' + actualFee.toLocaleString()}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-weight:700;color:var(--sky);margin-top:8px;border-top:1px solid var(--g2);padding-top:8px;font-size:15px;">
          <span>환불 예정액</span><span>₩${actualRefund.toLocaleString()}</span>
        </div>
        <div style="font-size:11px;color:var(--g3);margin-top:6px;">배송지: ${addr || '정보 없음'}</div>`;
    }
  }
}

async function submitCancelRequest() {
  if(!cancelTargetOrderId) return;
  const reasonSelect = document.getElementById('cancelReasonSelect').value;
  if(!reasonSelect) { alert('취소/반품 사유를 선택해주세요.'); return; }

  const reasonEtc = document.getElementById('cancelReasonEtc').value.trim();
  const finalReason = reasonSelect === '기타'
    ? (reasonEtc || '기타')
    : reasonSelect;

  const btn = document.getElementById('cancelSubmitBtn');
  btn.disabled = true;
  btn.textContent = '처리 중...';

  try {
    const newStatus = cancelType === 'before_ship' ? 'cancel_requested' : 'return_requested';

    // 반품 시 택배비/환불액 계산해서 같이 저장
    let returnShippingFee = 0;
    let expectedRefund = 0;
    if(cancelType === 'after_ship') {
      const orderSnap2 = await _db.collection('orders').doc(cancelTargetOrderId).get();
      const o2 = orderSnap2.data();
      const total2 = Number(o2?.totalAmount || 0);
      const addr2 = o2?.shippingAddress?.address || o2?.shippingAddress?.roadAddress || '';
      const isFreeReturn = finalReason === '상품불량' || finalReason === '오배송';

      if(!isFreeReturn) {
        if(addr2.includes('제주')) returnShippingFee = 13000;
        else if(addr2.includes('울릉') || addr2.includes('독도') || addr2.includes('신안') || addr2.includes('완도') || addr2.includes('진도')) returnShippingFee = 20000;
        else returnShippingFee = 7000;
      }
      expectedRefund = Math.max(0, total2 - returnShippingFee);
    }

    await _db.collection('orders').doc(cancelTargetOrderId).update({
      status: newStatus,
      cancelReason: finalReason,
      cancelType,
      returnShippingFee,
      expectedRefund,
      cancelRequestedAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    closeCancelModal();
    alert(cancelType === 'before_ship'
      ? '취소 신청이 완료되었습니다.\n관리자 확인 후 환불 처리됩니다.'
      : `반품 신청이 접수되었습니다.\n환불 예정액: ₩${expectedRefund.toLocaleString()}\n관리자 확인 후 반품 주소를 안내드립니다.`);
    loadOrders();
  } catch(e) {
    console.error(e);
    alert('신청 중 오류가 발생했습니다: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = cancelType === 'before_ship' ? '취소 신청' : '반품 신청';
  }
}

// ===================== 관심상품 =====================
async function loadWishlist() {
  const listEl = document.getElementById('wishList');
  listEl.innerHTML = `<div class="loading-box"><div class="spinner"></div>불러오는 중...</div>`;
  try {
    const snap = await _db.collection('wishlists').doc(currentUser.uid).collection('items').get();
    const ids = [];
    snap.forEach(doc => ids.push(doc.id));

    if(ids.length === 0) {
      listEl.innerHTML = `<div class="empty-box">아직 관심상품이 없습니다.</div>`;
      return;
    }

    const productDocs = await Promise.all(ids.map(id => _db.collection('products').doc(id).get()));
    const products = productDocs.filter(d => d.exists).map(d => ({ id: d.id, ...d.data() }));

    if(products.length === 0) {
      listEl.innerHTML = `<div class="empty-box">아직 관심상품이 없습니다.</div>`;
      return;
    }

    listEl.innerHTML = `<div class="wish-grid">${products.map(p => {
      const hasImg = !!p.mainImageUrl;
      const imgHtml = hasImg ? `<img src="${p.mainImageUrl}">` : '👓';
      const priceHtml = (currentUserData.member_level||0) >= 2
        ? `₩${Number(p.price||0).toLocaleString()}`
        : `🔒 로그인 후 확인`;
      return `
        <div class="wish-card" onclick="location.href='product.html?id=${p.id}'">
          <button class="wish-del" onclick="event.stopPropagation();removeWish('${p.id}')">✕</button>
          <div class="wish-img${hasImg ? '' : ' no-img'}">${imgHtml}</div>
          <div class="wish-info">
            <div class="wish-name">${p.modelName||'-'}</div>
            <div class="wish-price">${priceHtml}</div>
          </div>
        </div>`;
    }).join('')}</div>`;
  } catch(e) {
    console.error(e);
    listEl.innerHTML = `<div class="empty-box" style="color:var(--red);">불러오지 못했습니다.</div>`;
  }
}

async function removeWish(productId) {
  try {
    await _db.collection('wishlists').doc(currentUser.uid).collection('items').doc(productId).delete();
    loadWishlist();
  } catch(e) {
    console.error(e);
    alert('삭제 중 오류가 발생했습니다.');
  }
}

// ===================== 재입고 알림 =====================
async function loadRestockAlerts() {
  const listEl = document.getElementById('restockList');
  listEl.innerHTML = `<div class="loading-box"><div class="spinner"></div>불러오는 중...</div>`;
  try {
    const snap = await _db.collection('restockAlerts').doc(currentUser.uid).collection('items').get();
    const alerts = [];
    snap.forEach(doc => alerts.push({ id: doc.id, ...doc.data() }));

    if(alerts.length === 0) {
      listEl.innerHTML = `<div class="empty-box">신청한 재입고 알림이 없습니다.</div>`;
      return;
    }

    const productDocs = await Promise.all(alerts.map(a => _db.collection('products').doc(a.id).get()));

    listEl.innerHTML = alerts.map((a, i) => {
      const pDoc = productDocs[i];
      const p = pDoc.exists ? pDoc.data() : null;
      const stock = p ? Number(p.stock||0) : 0;
      const isReady = stock > 0;
      const hasImg = !!p?.mainImageUrl;
      const imgHtml = hasImg ? `<img src="${p.mainImageUrl}">` : '👓';

      return `
        <div class="restock-card">
          <div class="restock-img${hasImg ? '' : ' no-img'}">${imgHtml}</div>
          <div class="restock-info">
            <div class="restock-name">${p?.modelName || a.productName || '-'}</div>
            ${isReady
              ? `<div class="restock-status ready">✅ 재입고 완료! 지금 바로 구매하세요</div>`
              : `<div class="restock-status waiting">🔔 재입고 대기중 · 신청일: ${formatDate(a.requestedAt)}</div>`
            }
          </div>
          ${isReady
            ? `<button class="btn-sm btn-track" onclick="location.href='product.html?id=${a.id}'">바로가기</button>`
            : `<button class="btn-del-alarm" onclick="removeRestockAlert('${a.id}')">알림 취소</button>`
          }
        </div>`;
    }).join('');
  } catch(e) {
    console.error(e);
    listEl.innerHTML = `<div class="empty-box" style="color:var(--red);">불러오지 못했습니다.</div>`;
  }
}

async function removeRestockAlert(productId) {
  try {
    await _db.collection('restockAlerts').doc(currentUser.uid).collection('items').doc(productId).delete();
    loadRestockAlerts();
  } catch(e) {
    console.error(e);
    alert('삭제 중 오류가 발생했습니다.');
  }
}
</script>
<!-- 취소/반품 신청 모달 -->
<div class="cancel-modal-overlay" id="cancelModalOverlay">
  <div class="cancel-modal-box">
    <div class="cancel-modal-header">
      <div class="cancel-modal-title" id="cancelModalTitle">주문 취소 신청</div>
      <button class="cancel-modal-close" onclick="closeCancelModal()">✕</button>
    </div>
    <div class="cancel-modal-body">
      <div class="cancel-refund-info" id="cancelRefundInfo"></div>
      <div class="cancel-form-group">
        <label>취소/반품 사유 <span style="color:var(--red);">*</span></label>
        <select id="cancelReasonSelect" onchange="onCancelReasonChange()">
          <option value="">사유를 선택해주세요</option>
          <option value="단순변심">단순 변심</option>
          <option value="주문실수">주문 실수 (색상/수량 오입력)</option>
          <option value="상품불량">상품 불량/파손</option>
          <option value="오배송">오배송 (다른 상품 수령)</option>
          <option value="배송지연">배송 지연</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="cancel-form-group" id="cancelReasonEtcWrap" style="display:none;">
        <label>직접 입력</label>
        <textarea id="cancelReasonEtc" placeholder="취소 사유를 입력해주세요" rows="3" style="width:100%;padding:10px;border:1.5px solid var(--g2);border-radius:8px;font-family:inherit;font-size:13px;resize:none;outline:none;"></textarea>
      </div>
      <div class="cancel-notice" id="cancelNotice"></div>
    </div>
    <div class="cancel-modal-footer">
      <button class="btn-sm btn-ghost" onclick="closeCancelModal()">닫기</button>
      <button class="cancel-submit-btn" id="cancelSubmitBtn" onclick="submitCancelRequest()">신청하기</button>
    </div>
  </div>
</div>

</body>
</html>
