<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTICMALL | 주문완료</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@600;700;800&family=Montserrat:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--sky:#1B9FD8;--sky-lt:#E6F5FB;--sky-dk:#1480B0;--navy:#1A2D4A;--white:#FFFFFF;--g1:#F2F4F6;--g2:#E0E4E8;--g3:#9BA5B0;--g4:#5A6472;--black:#111318;--red:#FF4444;--green:#2ECC71;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--g1);color:var(--black);min-height:100vh;}
.header{background:var(--white);border-bottom:1px solid var(--g2);}
.header-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;}
.logo { font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 700; color: var(--navy); text-decoration: none; }
.logo span { color: var(--navy); }

.steps{background:var(--white);border-bottom:1px solid var(--g2);padding:16px 0;}
.steps-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;}
.step{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;position:relative;}
.step::after{content:'';position:absolute;top:14px;left:60%;right:-40%;height:2px;background:var(--g2);}
.step:last-child::after{display:none;}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;z-index:1;background:var(--navy);color:var(--white);}
.step-label{font-size:11px;color:var(--navy);font-weight:700;}

.main{max-width:560px;margin:60px auto;padding:0 24px;text-align:center;}
.result-icon{font-size:64px;margin-bottom:16px;}
.result-icon.check{width:64px;height:64px;border-radius:50%;background:var(--sky-lt);color:var(--sky);font-size:32px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.result-title{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:8px;}
.result-sub{font-size:14px;color:var(--g3);margin-bottom:32px;}

.card{background:var(--white);border-radius:12px;padding:28px;text-align:left;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:20px;}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--g1);font-size:13px;}
.info-row:last-child{border-bottom:none;}
.info-row .lbl{color:var(--g4);}
.info-row .val{font-weight:600;color:var(--black);}
.info-row .val.price{font-family:'Inter',sans-serif;font-size:18px;font-weight:800;color:var(--sky);}

.btn-group{display:flex;gap:10px;}
.btn{flex:1;padding:14px;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:all 0.2s;}
.btn-primary{background:var(--sky);color:var(--white);}
.btn-primary:hover{background:var(--sky-dk);}
.btn-ghost{background:var(--white);color:var(--navy);border:1.5px solid var(--g2);}
.btn-ghost:hover{border-color:var(--navy);}

.loading-box{text-align:center;padding:80px 20px;color:var(--g3);}
.spinner{width:32px;height:32px;border:3px solid var(--g2);border-top-color:var(--sky);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

i[class^='ic-']{display:inline-block;width:1em;height:1em;vertical-align:-0.15em;background-color:currentColor;
-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;

    <div class="step"><div class="step-circle">✓</div><div class="step-label">주문/결제</div></div>
    <div class="step"><div class="step-circle">✓</div><div class="step-label">주문완료</div></div>
  </div>
</div>

<div class="main">
  <div id="loadingArea" class="loading-box">
    <div class="spinner"></div>결제 결과를 확인하는 중...
  </div>

  <div id="resultArea" style="display:none;">
    <div class="result-icon check">✓</div>
    <div class="result-title">주문이 완료되었습니다!</div>
    <div class="result-sub">빠른 배송으로 준비할게요. 감사합니다 <i class=ic-smile></i></div>

    <div class="card">
      <div class="info-row"><span class="lbl">주문번호</span><span class="val" id="rOrderId">-</span></div>
      <div class="info-row"><span class="lbl">주문상품</span><span class="val" id="rOrderName">-</span></div>
      <div class="info-row"><span class="lbl">결제금액</span><span class="val price" id="rAmount">-</span></div>
      <div class="info-row"><span class="lbl">결제상태</span><span class="val" style="color:var(--green);">결제창 통과 (승인 대기)</span></div>
    </div>

    <div class="btn-group">
      <button class="btn btn-ghost" onclick="location.href='mypage.html'">주문내역 보기</button>
      <button class="btn btn-primary" onclick="location.href='list.html'">계속 쇼핑하기</button>
    </div>
  </div>

  <div id="errorArea" style="display:none;">
    <div class="result-icon"><i class=ic-alert></i>️</div>
    <div class="result-title">주문 확인 중 문제가 발생했습니다</div>
    <div class="result-sub" id="errorMsg">잠시 후 다시 시도해주세요.</div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="location.href='mypage.html'">마이페이지로 이동</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCZh95M18vqxwJGkXj2JkM9J4NfW_s0f1w",
  authDomain: "opticmall.firebaseapp.com",
  projectId: "opticmall",
  storageBucket: "opticmall.firebasestorage.app",
  messagingSenderId: "649171316547",
  appId: "1:649171316547:web:778de09e4fe6a43df109f6"
};
firebase.initializeApp(firebaseConfig);
const _auth = firebase.auth();
const _db = firebase.firestore();

// ===================== 구매등급 체계 (공용) =====================
const PURCHASE_LEVELS = [
  { level: 1, name: '화이트', nameEn: 'White', min: 0 },
  { level: 2, name: '실버', nameEn: 'Silver', min: 1000000 },
  { level: 3, name: '골드', nameEn: 'Gold', min: 3000000 },
  { level: 4, name: '플래티넘', nameEn: 'Platinum', min: 5000000 },
  { level: 5, name: '옵틱 마스터', nameEn: 'Optic Master', min: 10000000 }
];

function calcPurchaseLevel(totalAmount) {
  let result = PURCHASE_LEVELS[0];
  for (const lv of PURCHASE_LEVELS) {
    if (totalAmount >= lv.min) result = lv;
  }
  return result;
}

async function updateUserPurchaseLevel(userId, orderAmount) {
  const userRef = _db.collection('users').doc(userId);
  try {
    const userSnap = await userRef.get();
    const userData = userSnap.exists ? userSnap.data() : {};
    const newTotal = Number(userData.total_purchase_amount || 0) + Number(orderAmount || 0);
    const newLevelInfo = calcPurchaseLevel(newTotal);
    await userRef.update({
      total_purchase_amount: newTotal,
      purchase_level: newLevelInfo.level,
      purchase_level_name: newLevelInfo.name
    });
  } catch(e) {
    console.error('구매등급 갱신 실패:', e);
  }
}

function renderOrderNameFromOrder(order) {
  if(Array.isArray(order.items) && order.items.length > 0) {
    const first = order.items[0].productName || '상품';
    return order.items.length > 1 ? `${first} 외 ${order.items.length - 1}건` : first;
  }
  // 이전 단건 구조 호환
  return (order.productName || '상품') + (order.qty > 1 ? ` 외 ${order.qty-1}개` : '');
}

async function handleSuccess() {
  const params = new URLSearchParams(location.search);
  const orderId = params.get('orderId');
  const amount = params.get('amount');
  const paymentKey = params.get('paymentKey');

  if(!orderId) {
    showError('주문 정보를 찾을 수 없습니다.');
    return;
  }

  try {
    const orderRef = _db.collection('orders').doc(orderId);
    const orderSnap = await orderRef.get();

    if(!orderSnap.exists) {
      showError('주문 내역을 찾을 수 없습니다.');
      return;
    }

    const order = orderSnap.data();

    // 금액 위변조 체크 (클라이언트 단계 기초 검증)
    if(Number(amount) !== Number(order.totalAmount)) {
      showError('결제 금액이 주문 금액과 일치하지 않습니다. 고객센터로 문의해주세요.');
      return;
    }

    // 주문 상태 업데이트: 결제창 통과 (실제 승인은 다음 단계 서버 연동에서 처리)
    // 브랜드별 배송묶음(shipments) 상태도 함께 갱신
    const updatedShipments = Array.isArray(order.shipments)
      ? order.shipments.map(s => ({ ...s, status: 'payment_window_passed' }))
      : [];

    await orderRef.update({
      status: 'payment_window_passed',
      shipments: updatedShipments,
      paymentKey: paymentKey || '',
      paidAmount: Number(amount),
      paymentPassedAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    // 결제 완료된 상품을 장바구니에서 제거 (장바구니에서 주문한 경우)
    await removeOrderedItemsFromCart(order);

    // 누적 구매금액 갱신 및 구매등급 재계산
    await updateUserPurchaseLevel(order.userId, Number(amount));

    document.getElementById('rOrderId').textContent = orderId;
    document.getElementById('rOrderName').textContent = renderOrderNameFromOrder(order);
    document.getElementById('rAmount').textContent = '₩' + Number(amount).toLocaleString();

    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';

  } catch(e) {
    console.error(e);
    showError('오류가 발생했습니다: ' + e.message);
  }
}

async function removeOrderedItemsFromCart(order) {
  const uid = _auth.currentUser?.uid;
  if(!uid || !Array.isArray(order.items)) return;
  try {
    const cartRef = _db.collection('carts').doc(uid).collection('items');
    const cartSnap = await cartRef.get();
    const batch = _db.batch();
    // 주문한 상품 ID 목록
    const orderedProductIds = new Set(order.items.map(i => i.productId));
    cartSnap.forEach(doc => {
      const data = doc.data();
      // productId가 주문한 상품이면 삭제 (색상별로 담긴 아이템 모두 포함)
      if(orderedProductIds.has(data.productId)) {
        batch.delete(doc.ref);
      }
    });
    await batch.commit();
  } catch(e) {
    console.error('장바구니 정리 중 오류:', e);
  }
}

function showError(msg) {
  document.getElementById('loadingArea').style.display = 'none';
  document.getElementById('errorArea').style.display = 'block';
  document.getElementById('errorMsg').textContent = msg;
}

let _handled = false;
_auth.onAuthStateChanged(() => {
  if(_handled) return;
  _handled = true;
  handleSuccess();
});
</script>
</body>
</html>
