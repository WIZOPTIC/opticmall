<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTICMALL | 주문/결제</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--sky:#1B9FD8;--sky-lt:#E6F5FB;--sky-dk:#1480B0;--navy:#1A2D4A;--white:#FFFFFF;--g1:#F2F4F6;--g2:#E0E4E8;--g3:#9BA5B0;--g4:#5A6472;--black:#111318;--red:#FF4444;--green:#2ECC71;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--g1);color:var(--black);padding-bottom:40px;}
.header{background:var(--white);border-bottom:1px solid var(--g2);position:sticky;top:0;z-index:100;}
.header-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;}
.logo{font-family:'Inter',sans-serif;font-size:24px;font-weight:800;color:var(--navy);text-decoration:none;}
.logo span{color:var(--sky);}
.page-title{font-size:16px;font-weight:700;color:var(--navy);margin-left:24px;}

/* 진행 단계 */
.steps{background:var(--white);border-bottom:1px solid var(--g2);padding:16px 0;}
.steps-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;}
.step{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;position:relative;}
.step::after{content:'';position:absolute;top:14px;left:60%;right:-40%;height:2px;background:var(--g2);}
.step:last-child::after{display:none;}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;z-index:1;background:var(--g2);color:var(--g3);}
.step.done .step-circle{background:var(--navy);color:var(--white);}
.step.done::after{background:var(--navy);}
.step.active .step-circle{background:var(--sky);color:var(--white);}
.step-label{font-size:11px;color:var(--g3);}
.step.active .step-label{color:var(--sky);font-weight:700;}
.step.done .step-label{color:var(--navy);}

.main{max-width:1100px;margin:24px auto;padding:0 24px;display:flex;gap:20px;align-items:flex-start;}
.order-form{flex:1;}
.card{background:var(--white);border-radius:10px;padding:24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.card-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--g2);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{margin-bottom:12px;}
.form-group:last-child{margin-bottom:0;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--g4);margin-bottom:5px;}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--g2);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--sky);}
.form-input::placeholder{color:var(--g3);}
.form-input[readonly]{background:var(--g1);color:var(--g4);}
.addr-row{display:flex;gap:8px;margin-bottom:8px;}
.addr-select-card{border:1.5px solid var(--g2);border-radius:8px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all 0.15s;}
.addr-select-card:hover{border-color:var(--sky);}
.addr-select-card.selected{border-color:var(--sky);background:var(--sky-lt);}
.addr-select-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.addr-select-label{font-size:13px;font-weight:700;color:var(--navy);}
.addr-select-default{font-size:10px;font-weight:700;background:var(--sky);color:var(--white);padding:1px 8px;border-radius:100px;}
.addr-select-info{font-size:12px;color:var(--g4);line-height:1.6;}
.btn-addr{padding:11px 16px;background:var(--navy);color:var(--white);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
.form-textarea{width:100%;padding:11px 14px;border:1.5px solid var(--g2);border-radius:8px;font-size:14px;font-family:inherit;outline:none;resize:vertical;min-height:80px;}
.form-textarea:focus{border-color:var(--sky);}

/* 결제 안내 */
.pay-info-box{background:var(--sky-lt);border:1px solid #B3E0F5;border-radius:8px;padding:16px;display:flex;align-items:center;gap:12px;}
.pay-info-box .icon{font-size:24px;}
.pay-info-box .txt{font-size:12px;color:var(--sky-dk);line-height:1.6;}

/* 주문 상품 */
.order-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--g1);}
.order-item:last-child{border-bottom:none;}
.order-img{width:60px;height:60px;background:var(--g1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden;}
.order-img.no-img{opacity:0.15;}
.order-img img{width:100%;height:100%;object-fit:cover;}
.order-item-info{flex:1;}
.order-item-name{font-size:13px;font-weight:600;color:var(--navy);}
.order-item-opt{font-size:11px;color:var(--g3);margin-top:2px;}
.order-item-price{font-family:'Inter',sans-serif;font-size:14px;font-weight:800;color:var(--navy);}

/* 요약 */
.summary-box{width:300px;flex-shrink:0;position:sticky;top:88px;}
.summary-card{background:var(--white);border-radius:10px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.summary-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px;}
.sum-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:10px;}
.sum-row .lbl{color:var(--g4);}
.sum-row .val{font-weight:600;}
.sum-divider{border:none;border-top:1px solid var(--g2);margin:14px 0;}
.sum-total{display:flex;justify-content:space-between;font-size:15px;font-weight:700;}
.sum-total .price{font-family:'Inter',sans-serif;font-size:24px;font-weight:800;color:var(--sky);}
.agree-box{margin-top:16px;padding:12px;background:var(--g1);border-radius:8px;}
.agree-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--g4);margin-bottom:6px;cursor:pointer;}
.agree-item:last-child{margin-bottom:0;}
.agree-item input{accent-color:var(--sky);cursor:pointer;}
.btn-pay{width:100%;padding:16px;background:var(--sky);color:var(--white);border:none;border-radius:10px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.2s;margin-top:12px;}
.btn-pay:hover{background:var(--sky-dk);transform:translateY(-1px);}
.btn-pay:disabled{background:var(--g2);color:var(--g3);cursor:not-allowed;transform:none;}

.loading-box{text-align:center;padding:60px;color:var(--g3);}
.spinner{width:32px;height:32px;border:3px solid var(--g2);border-top-color:var(--sky);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCZh95M18vqxwJGkXj2JkM9J4NfW_s0f1w",
  authDomain: "opticmall.firebaseapp.com",
  projectId: "opticmall",
  storageBucket: "opticmall.firebasestorage.app",
  messagingSenderId: "649171316547",
  appId: "1:649171316547:web:778de09e4fe6a43df109f6"
};
firebase.initializeApp(firebaseConfig);
const _auth = firebase.auth();
const _db = firebase.firestore();

// 토스페이먼츠 테스트 클라이언트 키
const TOSS_CLIENT_KEY = "test_ck_P9BRQmyarYDRQ9WY4jj2VJ07KzLN";

let currentUser = null;
let currentUserData = null;
let orderItems = []; // [{product, qty}]
let totalAmount = 0;

// ===================== 로그인 체크 =====================
_auth.onAuthStateChanged(async (user) => {
  if (!user) {
    alert('로그인 후 이용 가능합니다.');
    location.href = 'index.html';
    return;
  }
  currentUser = user;
  try {
    const userDoc = await _db.collection('users').doc(user.uid).get();
    currentUserData = userDoc.exists ? userDoc.data() : {};
    if ((currentUserData.member_level || 0) < 2) {
      alert('안경사 인증 승인 후 주문이 가능합니다.');
      location.href = 'mypage.html';
      return;
    }
    fillOrdererInfo();
    await loadAddressesForOrder();
    await loadOrderProduct();
  } catch(e) {
    console.error(e);
    alert('회원 정보를 불러오지 못했습니다.');
  }
});

function fillOrdererInfo() {
  document.getElementById('ordererName').value = currentUserData.name || '-';
  document.getElementById('ordererPhone').value = currentUserData.phone || '-';
  document.getElementById('ordererEmail').value = currentUser.email || '-';
  document.getElementById('ordererStore').value = currentUserData.storeName || currentUserData.brandName || '-';
}

// ===================== 배송지 선택 (다중 배송지) =====================
let myAddresses = [];
let selectedAddressId = null;

async function loadAddressesForOrder() {
  const area = document.getElementById('addressSelectArea');
  try {
    const snap = await _db.collection('users').doc(currentUser.uid).collection('addresses').get();
    myAddresses = [];
    snap.forEach(d => myAddresses.push({ id: d.id, ...d.data() }));
    myAddresses.sort((a,b) => (b.isDefault?1:0) - (a.isDefault?1:0));

    if(myAddresses.length === 0) {
      area.innerHTML = `<div style="font-size:13px;color:var(--g3);padding:10px 0;">등록된 배송지가 없습니다. "+ 새 배송지 추가"로 첫 배송지를 등록해주세요.</div>`;
      return;
    }

    // 기본 배송지(또는 첫번째)를 자동 선택
    const defaultAddr = myAddresses.find(a => a.isDefault) || myAddresses[0];
    selectedAddressId = defaultAddr.id;

    renderAddressSelectArea();
    updateShippingAndTotal(); // 주소 기준 배송비 재계산
  } catch(e) {
    console.error(e);
    area.innerHTML = `<div style="font-size:13px;color:var(--red);">배송지를 불러오지 못했습니다.</div>`;
  }
}

function renderAddressSelectArea() {
  const area = document.getElementById('addressSelectArea');
  area.innerHTML = myAddresses.map(a => `
    <div class="addr-select-card ${a.id===selectedAddressId?'selected':''}" onclick="selectAddress('${a.id}')">
      <div class="addr-select-top">
        <span class="addr-select-label">${a.label||'배송지'}</span>
        ${a.isDefault ? `<span class="addr-select-default">기본</span>` : ''}
      </div>
      <div class="addr-select-info">${a.recipientName||'-'} · ${a.recipientPhone||'-'}<br>${a.addr1||''} ${a.addr2||''}</div>
    </div>
  `).join('');
}

function selectAddress(addressId) {
  selectedAddressId = addressId;
  renderAddressSelectArea();
  updateShippingAndTotal();
}

function getSelectedAddress() {
  return myAddresses.find(a => a.id === selectedAddressId) || null;
}

function openNewAddressForm() {
  document.getElementById('newAddressForm').style.display = 'block';
  document.getElementById('addNewAddressBtn').style.display = 'none';
  document.getElementById('newAddrName').value = currentUserData.name || '';
  document.getElementById('newAddrPhone').value = currentUserData.phone || '';
}

function closeNewAddressForm() {
  document.getElementById('newAddressForm').style.display = 'none';
  document.getElementById('addNewAddressBtn').style.display = 'block';
}

// 다음(카카오) 우편번호 서비스로 주소 검색
function openNewAddressSearch() {
  new daum.Postcode({
    oncomplete: function(data) {
      const fullAddr = data.roadAddress || data.jibunAddress;
      document.getElementById('newAddrZip').value = data.zonecode;
      document.getElementById('newAddrAddr1').value = fullAddr;
      document.getElementById('newAddrAddr2').focus();
    }
  }).open();
}

async function saveNewAddressAndSelect() {
  const label = document.getElementById('newAddrLabel').value.trim() || '배송지';
  const recipientName = document.getElementById('newAddrName').value.trim();
  const recipientPhone = document.getElementById('newAddrPhone').value.trim();
  const zipcode = document.getElementById('newAddrZip').value.trim();
  const addr1 = document.getElementById('newAddrAddr1').value.trim();
  const addr2 = document.getElementById('newAddrAddr2').value.trim();
  const isDefault = document.getElementById('newAddrIsDefault').checked;

  if(!recipientName) { alert('수령인을 입력해주세요.'); return; }
  if(!addr1) { alert('기본 주소를 입력해주세요.'); return; }

  try {
    const colRef = _db.collection('users').doc(currentUser.uid).collection('addresses');
    if(isDefault) {
      await Promise.all(myAddresses.filter(a => a.isDefault).map(a => colRef.doc(a.id).update({ isDefault: false })));
    }
    const docRef = await colRef.add({
      label, recipientName, recipientPhone, zipcode, addr1, addr2, isDefault,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    await loadAddressesForOrder();
    selectedAddressId = docRef.id;
    renderAddressSelectArea();
    updateShippingAndTotal();
    closeNewAddressForm();
  } catch(e) {
    console.error(e);
    alert('배송지 저장 중 오류가 발생했습니다: ' + e.message);
  }
}

// ===================== 주문 상품 로드 (단건/다건 모두 지원) =====================
async function loadOrderProduct() {
  const params = new URLSearchParams(location.search);
  const itemsParam = params.get('items'); // 장바구니: "id1:qty1:colorIdx1,id2:qty2:colorIdx2"
  const pid = params.get('pid'); // 단건: 바로주문

  let pidQtyList = [];
  if(itemsParam) {
    pidQtyList = itemsParam.split(',').map(pair => {
      const [id, qty, colorIdx] = pair.split(':');
      return { id, qty: parseInt(qty) || 1, colorIdx: colorIdx !== undefined ? parseInt(colorIdx) || 0 : 0 };
    });
  } else if(pid) {
    pidQtyList = [{ id: pid, qty: parseInt(params.get('qty')) || 1, colorIdx: parseInt(params.get('colorIdx')) || 0 }];
  }

  if(pidQtyList.length === 0) {
    alert('주문할 상품 정보가 없습니다.');
    location.href = 'list.html';
    return;
  }

  try {
    const productDocs = await Promise.all(
      pidQtyList.map(({id}) => _db.collection('products').doc(id).get())
    );

    orderItems = pidQtyList.map(({id, qty, colorIdx}, i) => {
      const docSnap = productDocs[i];
      if(!docSnap.exists) return null;
      const product = { id: docSnap.id, ...docSnap.data() };
      const selectedColorData = Array.isArray(product.colors) ? product.colors[colorIdx] : null;
      return {
        product,
        qty,
        selectedColorIdx: colorIdx,
        selectedColor: selectedColorData?.colorName || ''
      };
    }).filter(Boolean);

    if(orderItems.length === 0) {
      alert('주문할 상품 정보를 찾을 수 없습니다.');
      location.href = 'list.html';
      return;
    }

    // 진행중 이벤트 할인가 매칭 (서버측 가격 재확인 - 위변조 방지)
    try {
      const promoSnap = await _db.collection('promotions').where('status', '==', 'approved').get();
      const today = new Date().toISOString().slice(0,10);
      const discountMap = {};
      promoSnap.forEach(doc => {
        const promo = doc.data();
        if(promo.startDate > today || promo.endDate < today) return;
        (promo.targetProductIds || []).forEach(pid => {
          if(!discountMap[pid] || promo.discountRate > discountMap[pid]) discountMap[pid] = promo.discountRate;
        });
      });
      orderItems.forEach(item => {
        const p = item.product;
        const eventRate = discountMap[p.id] || 0;
        const productRate = Number(p.discountRate) || 0;
        const finalRate = Math.max(eventRate, productRate);
        // 선택된 색상에 별도 가격이 있으면 그 가격을, 없으면 상품 기본가를 기준으로 계산
        const selectedColorData = Array.isArray(p.colors) ? p.colors[item.selectedColorIdx] : null;
        const hasColorPrice = selectedColorData && selectedColorData.price != null && selectedColorData.price !== '';
        const basePrice = hasColorPrice ? Number(selectedColorData.price) : Number(p.price || 0);

        if(finalRate > 0) {
          item.product.discountRate = finalRate;
          item.product.originalPrice = basePrice;
          // salePrice가 있고 상품 자체 할인율이 최종 할인율과 같으면 salePrice 사용 (단, 색상별 가격 override가 없을 때만)
          if(!hasColorPrice && productRate > 0 && productRate === finalRate && Number(p.salePrice) > 0) {
            item.product.effectivePrice = Number(p.salePrice);
          } else {
            item.product.effectivePrice = Math.round(basePrice * (1 - finalRate / 100));
          }
        } else {
          item.product.effectivePrice = basePrice;
        }
      });
    } catch(e) {
      console.error('이벤트 조회 실패:', e);
      orderItems.forEach(item => {
        const p = item.product;
        const productRate = Number(p.discountRate) || 0;
        const selectedColorData = Array.isArray(p.colors) ? p.colors[item.selectedColorIdx] : null;
        const hasColorPrice = selectedColorData && selectedColorData.price != null && selectedColorData.price !== '';
        const basePrice = hasColorPrice ? Number(selectedColorData.price) : Number(p.price || 0);

        if(!hasColorPrice && productRate > 0 && p.salePrice) {
          item.product.effectivePrice = Number(p.salePrice);
        } else if(productRate > 0) {
          item.product.effectivePrice = Math.round(basePrice * (1 - productRate/100));
        } else {
          item.product.effectivePrice = basePrice;
        }
      });
    }

    renderOrderItems();
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('orderMain').style.display = 'flex';
  } catch(e) {
    console.error(e);
    alert('상품 정보를 불러오지 못했습니다.');
  }
}

function renderOrderItems() {
  totalAmount = orderItems.reduce((sum, item) => sum + Number(item.product.effectivePrice||item.product.price||0) * item.qty, 0);

  document.getElementById('itemCount').textContent = orderItems.length;
  document.getElementById('orderItemsList').innerHTML = orderItems.map(item => {
    const p = item.product;
    const colorIdx = Number(item.selectedColorIdx) || 0;
    const colorData = Array.isArray(p.colors) ? p.colors[colorIdx] : null;
    const unitPrice = Number(p.effectivePrice || p.price || 0);
    const subtotal = unitPrice * item.qty;
    const thumbUrl = colorData?.mainImageUrl || p.mainImageUrl;
    const hasImg = !!thumbUrl;
    const imgHtml = hasImg ? `<img src="${thumbUrl}">` : `<i class=ic-glasses></i>`;
    const colorLabel = item.selectedColor || colorData?.colorName || p.color || '';
    const colorCode = colorData?.colorCode || '';
    const colorLabelWithCode = colorLabel + (colorCode ? ` (${colorCode})` : '');
    const barcode = colorData?.barcode || p.barcode || '';
    const discountTag = p.discountRate ? `<span style="font-size:11px;color:var(--red);font-weight:700;margin-left:4px;">${p.discountRate}% 할인적용</span>` : '';
    return `
      <div class="order-item">
        <div class="order-img${hasImg ? '' : ' no-img'}">${imgHtml}</div>
        <div class="order-item-info">
          <div class="order-item-name">${p.modelName||'-'}${colorLabelWithCode ? ' · '+colorLabelWithCode : ''}${discountTag}</div>
          <div class="order-item-opt">${barcode} · ${item.qty}개</div>
        </div>
        <div class="order-item-price">₩${subtotal.toLocaleString()}</div>
      </div>`;
  }).join('');

  document.getElementById('sumProducts').textContent = '₩' + totalAmount.toLocaleString();
  updateShippingAndTotal();
}

// ===================== 배송비 계산 =====================
const FREE_SHIPPING_THRESHOLD = 100000; // 10만원 이상 무료
const BASE_SHIPPING_FEE = 3500;
const JEJU_EXTRA_FEE = 3000; // 제주/도서산간 추가비

let currentShippingFee = 0;

function isJejuAddress(addr) {
  if(!addr) return false;
  const remoteKeywords = ['제주', '울릉', '독도', '가거도', '거문도', '고흥', '신안', '완도', '진도', '홍도'];
  return remoteKeywords.some(kw => addr.includes(kw));
}

function calcShippingFee() {
  const selected = getSelectedAddress();
  const addr1 = selected?.addr1 || '';
  let fee = totalAmount >= FREE_SHIPPING_THRESHOLD ? 0 : BASE_SHIPPING_FEE;
  if(isJejuAddress(addr1)) fee += JEJU_EXTRA_FEE;
  return fee;
}

function updateShippingAndTotal() {
  currentShippingFee = calcShippingFee();
  const feeDisplay = document.getElementById('shippingFeeDisplay');
  const selected = getSelectedAddress();
  const addr1 = selected?.addr1 || '';

  if(currentShippingFee === 0) {
    feeDisplay.textContent = '무료';
    feeDisplay.style.color = 'var(--green)';
  } else {
    let label = '₩' + currentShippingFee.toLocaleString();
    if(isJejuAddress(addr1)) label += ' (도서산간 포함)';
    feeDisplay.textContent = label;
    feeDisplay.style.color = 'var(--black)';
  }

  const finalTotal = totalAmount + currentShippingFee;
  document.getElementById('sumTotal').textContent = '₩' + finalTotal.toLocaleString();
}


// ===================== 결제 시작 =====================
function generateOrderId() {
  return 'OM' + Date.now() + Math.random().toString(36).substring(2, 8).toUpperCase();
}

async function startPayment() {
  // 필수값 검증
  const selectedAddr = getSelectedAddress();
  if(!selectedAddr) { alert('배송지를 선택하거나 새 배송지를 추가해주세요.'); return; }
  if(!selectedAddr.recipientName) { alert('선택한 배송지에 수령인 정보가 없습니다. 배송지를 수정해주세요.'); return; }
  if(!document.getElementById('agree1').checked || !document.getElementById('agree2').checked) {
    alert('필수 약관에 동의해주세요.'); return;
  }

  const orderId = generateOrderId();
  const firstName = orderItems[0].product.modelName || '상품';
  const totalItemCount = orderItems.reduce((sum,i) => sum + i.qty, 0);
  const orderName = orderItems.length > 1
    ? `${firstName} 외 ${orderItems.length - 1}건`
    : firstName;
  const finalPayAmount = totalAmount + currentShippingFee;

  // 브랜드사별로 배송을 따로 처리할 수 있도록, 상품을 브랜드별로 묶어 shipments 생성
  const shipmentsMap = {};
  orderItems.forEach(item => {
    const p = item.product;
    // 배송은 브랜드(brandId)가 아니라 "판매자 계정(brandOwnerUid)" 단위로 묶음 - 한 회사가 여러 브랜드를 운영해도 한 번에 포장/발송하기 때문
    const ownerKey = p.brandOwnerUid || ('__nobrand_' + (p.brandId || 'unknown'));
    if(!shipmentsMap[ownerKey]) {
      shipmentsMap[ownerKey] = {
        brandOwnerUid: p.brandOwnerUid || '',
        brandNameSet: new Set(),
        status: 'payment_pending',
        trackingCompany: '',
        trackingCompanyCode: '',
        trackingNumber: ''
      };
    }
    shipmentsMap[ownerKey].brandNameSet.add(p.brandName || '기타');
  });
  const shipments = Object.values(shipmentsMap).map(s => {
    const brandName = [...s.brandNameSet].join(', ');
    const { brandNameSet, ...rest } = s;
    return { ...rest, brandName };
  });
  const shipmentBrandOwnerUids = [...new Set(shipments.map(s => s.brandOwnerUid).filter(Boolean))];

  // 주문 정보를 Firestore에 임시 저장 (결제 시도 단계, 상태: payment_pending)
  try {
    await _db.collection('orders').doc(orderId).set({
      orderId,
      userId: currentUser.uid,
      userName: currentUserData.name || '',
      items: orderItems.map(item => {
        // 색상별 이미지 처리 (새 구조 우선)
        const p = item.product;
        const colorIdx = Number(item.selectedColorIdx) || 0;
        const colorData = p.colors && p.colors.length > colorIdx ? p.colors[colorIdx] : null;
        const thumbUrl = colorData?.mainImageUrl || p.mainImageUrl || '';

        return {
          productId: p.id,
          productName: p.modelName || '',
          brandId: p.brandId || '',
          brandName: p.brandName || '',
          brandOwnerUid: p.brandOwnerUid || '',
          mainImageUrl: thumbUrl,
          selectedColor: item.selectedColor || '',
          selectedColorIdx: colorIdx,
          colorCode: colorData?.colorCode || '',
          barcode: colorData?.barcode || p.barcode || '',
          qty: item.qty,
          unitPrice: Number(p.effectivePrice || p.price || 0),
          originalUnitPrice: Number(p.price || 0),
          discountRate: p.discountRate || 0,
          subtotal: Number(p.effectivePrice || p.price || 0) * item.qty
        };
      }),
      shipments,
      shipmentBrandOwnerUids,
      itemCount: totalItemCount,
      productAmount: totalAmount,
      shippingFee: currentShippingFee,
      totalAmount: finalPayAmount,
      receiver: {
        name: selectedAddr.recipientName || '',
        phone: selectedAddr.recipientPhone || '',
        zipcode: selectedAddr.zipcode || '',
        addr1: selectedAddr.addr1 || '',
        addr2: selectedAddr.addr2 || '',
        memo: document.getElementById('receiverMemo').value.trim()
      },
      status: 'payment_pending', // 결제창 진입 단계. 승인 완료 전.
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) {
    console.error(e);
    alert('주문 생성 중 오류가 발생했습니다: ' + e.message);
    return;
  }

  // 토스페이먼츠 결제창 호출
  try {
    const tossPayments = TossPayments(TOSS_CLIENT_KEY);
    const payment = tossPayments.payment({ customerKey: currentUser.uid });

    await payment.requestPayment({
      method: "CARD",
      amount: { currency: "KRW", value: finalPayAmount },
      orderId: orderId,
      orderName: orderName,
      customerName: currentUserData.name || '',
      customerEmail: currentUser.email || '',
      successUrl: location.origin + '/order-success.html',
      failUrl: location.origin + '/order-fail.html',
      card: { useEscrow: false, flowMode: "DEFAULT" }
    });
  } catch(e) {
    console.error(e);
    if(e.code !== 'USER_CANCEL') {
      alert('결제 요청 중 오류가 발생했습니다: ' + (e.message || e.code));
    }
  }
}
