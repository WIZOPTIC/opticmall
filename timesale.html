<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTICMALL | 타임세일</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@600;700;800&family=Montserrat:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{overflow-y:scroll;}
:root{--sky:#002366;--sky-lt:#EEF1F5;--sky-dk:#001A4D;--navy:#002366;--white:#FFFFFF;--g1:#F2F4F6;--g2:#E0E4E8;--g3:#9BA5B0;--g4:#5A6472;--black:#111318;--red:#FF4444;--green:#2ECC71;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--white);color:var(--black);}

/* 헤더 */
.header{background:var(--white);border-bottom:1px solid var(--g2);}
.header-inner{max-width:1280px;margin:0 auto;padding:100px 24px 28px;display:flex;align-items:center;gap:44px;}
.logo { font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 800; color: var(--navy); text-decoration: none; letter-spacing: 0.03em; }
.logo span { color: #C5A059; }
.header-search{flex:1;max-width:480px;display:flex;border:1.5px solid var(--g2);border-radius:6px;overflow:hidden;}
.header-search input{flex:1;padding:10px 16px;border:none;outline:none;font-size:14px;font-family:inherit;}
.search-btn{padding:0 14px;background:var(--white);border:none;cursor:pointer;color:var(--g4);border-left:1.5px solid var(--g2);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.h-btn {
  padding: 7px 12px; border: none; background: none;
  font-size:12px; font-weight: 500; color: var(--g4);
  font-family: inherit; cursor: pointer; border-radius: 4px;
  transition: color 0.15s; white-space: nowrap;
}
.h-sep { color: var(--g2); font-size:12px; }
.h-join {
  padding: 7px 12px; border: none;
  color: var(--sky); background: none;
  font-size:12px; font-weight: 700;
  font-family: inherit; cursor: pointer;
  white-space: nowrap;
}
.h-join:hover { color: var(--sky-dk); }
.icon-btn {
  width: 36px; height: 36px; border: none; background: none;
  cursor: pointer; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--g4); transition: all 0.15s; position: relative;
}
.cart-count{position:absolute;top:2px;right:2px;background:var(--sky);color:#fff;font-size:9px;font-weight:700;border-radius:100px;padding:1px 4px;min-width:15px;text-align:center;display:flex;align-items:center;justify-content:center;}

/* GNB */
.gnb-inner{display:flex;}
.gnb-item {
  padding: 8px 16px; font-size:14px; font-weight: 500;
  color: var(--black); cursor: pointer; border: none; background: none;
  font-family: inherit; position: relative; transition: color 0.15s; white-space: nowrap;
}
.gnb-item:hover { color: var(--sky); }
.gnb-item.active { color: var(--navy); font-weight: 700; }
.gnb-item:hover::after, .gnb-item.active::after {
  content: ''; position: absolute; left: 16px; right: 16px; bottom: -2px;
  height: 2px; background: var(--gold);
}

/* 히어로 + 카운트다운 */
.ts-hero{max-width:1280px;margin:0 auto;padding:40px 24px 28px;text-align:center;}
.ts-hero h1{font-size:24px;font-weight:800;color:var(--navy);margin-bottom:8px;}
.ts-hero p{font-size:14px;color:var(--g3);margin-bottom:18px;}
.ts-countdown-label{font-size:12px;color:var(--g3);margin-bottom:8px;}
.ts-countdown{display:flex;gap:6px;align-items:center;justify-content:center;}
.ts-countdown .box{background:var(--red);color:#fff;border-radius:8px;padding:8px 14px;font-family:'Inter',sans-serif;font-size:24px;font-weight:800;min-width:52px;text-align:center;}
.ts-countdown .sep{font-weight:900;color:var(--red);font-size:24px;}

.ts-wrap{max-width:1280px;margin:0 auto;padding:0 24px;}

/* 상품 그리드 (홈페이지 카드와 동일 스타일) */
.product-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
.product-card{background:var(--white);border-radius:8px;overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;border:1px solid var(--g2);}
.product-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.1);border-color:var(--sky);}
.product-img-wrap{position:relative;background:var(--g1);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.img-ph{display:flex;align-items:center;justify-content:center;}
.img-ph svg{opacity:0.15;}
.p-badge{position:absolute;top:10px;left:10px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:4px;background:var(--red);color:var(--white);}
.wish-btn{position:absolute;bottom:10px;right:10px;width:34px;height:34px;background:rgba(255,255,255,0.9);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all 0.15s;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.wish-btn:hover{transform:scale(1.1);}
.product-info{padding:8px 12px 14px;}
.product-code{font-size:11px;color:var(--g3);font-family:'Inter',sans-serif;margin-bottom:3px;}
.product-name{font-size:14px;font-weight:600;color:var(--black);margin-bottom:4px;line-height:1.3;}
.product-size{font-size:11px;color:var(--g3);margin-bottom:8px;}
.p-colors{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.p-color-chip{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.15);flex-shrink:0;}
.p-color-more{font-size:10px;color:var(--g3);align-self:center;}
.product-price{font-size:16px;font-weight:800;color:var(--navy);font-family:'Inter',sans-serif;}
.product-price .won{font-size:13px;font-weight:500;}
.price-locked{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--g3);}
.price-locked svg{width:14px;height:14px;}

.loading-box{grid-column:1/-1;text-align:center;padding:80px;color:var(--g3);}
.spinner{width:32px;height:32px;border:3px solid var(--g2);border-top-color:var(--sky);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-box{grid-column:1/-1;text-align:center;padding:100px 20px;color:var(--g3);}

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCZh95M18vqxwJGkXj2JkM9J4NfW_s0f1w",
  authDomain: "opticmall.firebaseapp.com",
  projectId: "opticmall",
  storageBucket: "opticmall.firebasestorage.app",
  messagingSenderId: "649171316547",
  appId: "1:649171316547:web:778de09e4fe6a43df109f6"
};
firebase.initializeApp(firebaseConfig);
const _auth = firebase.auth();
const _db = firebase.firestore();

let memberLevel = 0;
let wishlistIds = new Set();

_auth.onAuthStateChanged(async (user) => {
  if(user) {
    document.getElementById('loginBtn').style.display = 'none';
    document.getElementById('joinBtn').style.display = 'none';
    updateCartCount(user.uid);
    try {
      const userDoc = await _db.collection('users').doc(user.uid).get();
      const userData = userDoc.exists ? userDoc.data() : {};
      memberLevel = userData.member_level || 0;
      updateHeaderLoggedIn(userData.name || user.email.split('@')[0], memberLevel, userData.role);

      const wishSnap = await _db.collection('wishlists').doc(user.uid).collection('items').get();
      wishSnap.forEach(d => wishlistIds.add(d.id));
    } catch(e) {
      updateHeaderLoggedIn(user.email.split('@')[0], 0, null);
    }
  } else {
    document.getElementById('loginBtn').style.display = '';
    document.getElementById('joinBtn').style.display = '';
    const welcomeMsg = document.getElementById('welcomeMsg');
    if(welcomeMsg) welcomeMsg.remove();
  }
  loadTimesaleProducts();
});

function updateHeaderLoggedIn(name, level, role) {
  const headerRight = document.querySelector('.header-right');
  if(headerRight && !document.getElementById('welcomeMsg')) {
    const levelBadge = level >= 2
      ? '<span style="font-size:10px;background:#E8FBF0;color:#27AE60;padding:2px 8px;border-radius:100px;margin-left:6px;font-weight:700;">B2B</span>'
      : '<span style="font-size:10px;background:#FEF9E7;color:#F39C12;padding:2px 8px;border-radius:100px;margin-left:6px;font-weight:700;">승인대기</span>';
    const welcomeEl = document.createElement('div');
    welcomeEl.id = 'welcomeMsg';
    welcomeEl.style.cssText = 'font-size:13px;font-weight:600;color:var(--navy);display:flex;align-items:center;margin-right:8px;';
    welcomeEl.innerHTML = name + '님 환영합니다!' + levelBadge;
    headerRight.insertBefore(welcomeEl, headerRight.firstChild);
  }
  let adminLinkHtml = '';
  if(role === 'brand') {
    adminLinkHtml = `<a href="brand.html" style="display:block;padding:13px 20px;font-size:13px;font-weight:700;color:#002366;text-decoration:none;border-bottom:1px solid #F2F4F6;">관리자 모드</a>`;
  } else if(role === 'master' || role === 'submaster') {
    adminLinkHtml = `<a href="admin.html" style="display:block;padding:13px 20px;font-size:13px;font-weight:700;color:#002366;text-decoration:none;border-bottom:1px solid #F2F4F6;"><i class=ic-settings></i>️ 관리자 모드</a>`;
  }
  const dropdown = document.getElementById('userDropdown');
  if(dropdown) {
    dropdown.innerHTML = `
      <div style="padding:12px 20px;border-bottom:1px solid #F2F4F6;">
        <div style="font-size:13px;font-weight:700;color:#002366;">${name}님</div>
        <div style="font-size:11px;color:#9BA5B0;margin-top:2px;">${level >= 2 ? 'B2B 승인회원' : '승인 대기중'}</div>
      </div>
      ${adminLinkHtml}
      <a href="mypage.html" style="display:block;padding:13px 20px;font-size:13px;color:#5A6472;text-decoration:none;">마이페이지</a>
      <a href="mypage.html" style="display:block;padding:13px 20px;font-size:13px;color:#5A6472;text-decoration:none;">주문/배송조회</a>
      <a href="mypage.html?tab=wish" style="display:block;padding:13px 20px;font-size:13px;color:#5A6472;text-decoration:none;">관심상품</a>
      <a href="mypage.html?tab=recent" style="display:block;padding:13px 20px;font-size:13px;color:#5A6472;text-decoration:none;">최근 본 상품</a>
      <a href="#" onclick="_auth.signOut();location.reload();" style="display:block;padding:13px 20px;font-size:13px;color:#FF4444;text-decoration:none;border-top:1px solid #F2F4F6;">로그아웃</a>`;
  }
}

document.getElementById('userMenuBtn')?.addEventListener('click', () => {
  const dd = document.getElementById('userDropdown');
  dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
});
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('userMenuWrap');
  if(wrap && !wrap.contains(e.target)) document.getElementById('userDropdown').style.display = 'none';
});

async function updateCartCount(uid) {
  try {
    const snap = await _db.collection('carts').doc(uid).collection('items').get();
    const badge = document.getElementById('cartCountBadge');
    if(snap.size > 0) { badge.textContent = snap.size; badge.style.display = 'flex'; }
  } catch(e) { console.error(e); }
}

let allTimesaleProducts = [];
let currentTsKeyword = '';

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toggleSearchOverlay() {
  const overlay = document.getElementById('searchOverlay');
  const backdrop = document.getElementById('searchBackdrop');
  const searchIcon = document.getElementById('searchIcon');
  const closeIcon = document.getElementById('closeIcon');
  const isOpen = overlay.style.display === 'block';
  if (isOpen) {
    overlay.style.display = 'none';
    backdrop.style.display = 'none';
    searchIcon.style.display = '';
    closeIcon.style.display = 'none';
  } else {
    overlay.style.display = 'block';
    backdrop.style.display = 'block';
    searchIcon.style.display = 'none';
    closeIcon.style.display = '';
    setTimeout(() => document.getElementById('searchInput').focus(), 50);
  }
}

function doSearch() {
  currentTsKeyword = document.getElementById('searchInput').value.trim();
  renderTimesaleGrid(applyTsSearch(allTimesaleProducts, currentTsKeyword));
}

// 타임세일 상품 목록 안에서만 검색 (모델명/브랜드명/대표바코드/색상별 바코드)
function applyTsSearch(products, keyword) {
  const kw = (keyword || '').trim().toLowerCase();
  if(!kw) return products;
  return products.filter(p => {
    const modelMatch = (p.modelName||'').toLowerCase().includes(kw);
    const brandMatch = (p.brandName||'').toLowerCase().includes(kw);
    const topBarcodeMatch = (p.barcode||'').toLowerCase().includes(kw);
    const colorBarcodeMatch = Array.isArray(p.colors) && p.colors.some(c => (c.barcode||'').toLowerCase().includes(kw));
    return modelMatch || brandMatch || topBarcodeMatch || colorBarcodeMatch;
  });
}

// 카운트다운 (자정까지 남은 시간)
function updateTimer() {
  const now = new Date();
  const end = new Date();
  end.setHours(24, 0, 0, 0);
  const diff = Math.floor((end - now) / 1000);
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('timer-h').textContent = pad(h);
  document.getElementById('timer-m').textContent = pad(m);
  document.getElementById('timer-s').textContent = pad(s);
}
updateTimer();
setInterval(updateTimer, 1000);

function getColorDot(name) {
  const map = { '블랙':'#111','화이트':'#fff','그레이':'#999','실버':'#c0c0c0','골드':'#d4af37','브라운':'#5a3825','베이지':'#e8dcc8','레드':'#e74c3c','블루':'#2980b9','네이비':'#002366','그린':'#27ae60','옐로우':'#f1c40f','핑크':'#ff8fab','퍼플':'#8e44ad','아이보리':'#f5f0e6' };
  for(const key in map) if(name.includes(key)) return map[key];
  return '#ccc';
}

async function toggleWish(event, productId, wishId, colorName) {
  event.stopPropagation();
  if(memberLevel < 2) { alert('로그인 후 이용 가능합니다.'); location.href = 'index.html?openLogin=1'; return; }
  const btn = event.currentTarget;
  const uid = _auth.currentUser.uid;
  wishId = wishId || productId;
  const wishRef = _db.collection('wishlists').doc(uid).collection('items').doc(wishId);
  try {
    if(wishlistIds.has(wishId)) {
      await wishRef.delete();
      wishlistIds.delete(wishId);
      btn.innerHTML = '<i class=ic-heart></i>';
      btn.classList.remove('active');
    } else {
      await wishRef.set({
        productId, colorIdx: wishId !== productId ? 0 : null,
        colorName: colorName || '', addedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      wishlistIds.add(wishId);
      btn.innerHTML = '<i class=ic-heart-filled></i>';
      btn.classList.add('active');
    }
  } catch(e) { console.error(e); }
}

function renderProductCard(p) {
  const imgHtml = p.mainImageUrl
    ? `<img src="${p.mainImageUrl}" alt="${p.modelName||''}" style="width:100%;height:100%;object-fit:cover;">`
    : `<div class="img-ph" style="width:100%;height:100%;"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/></svg></div>`;
  const discountRate = Number(p.discountRate) || 0;
  const basePrice = Number(p.price || 0);
  const salePrice = p.salePrice ? Number(p.salePrice) : (discountRate > 0 ? Math.round(basePrice * (1 - discountRate/100)) : 0);
  const priceHtml = memberLevel >= 2
    ? (discountRate > 0 && basePrice > 0
        ? `<div class="product-price">
            <span style="font-size:11px;color:#9BA5B0;text-decoration:line-through;margin-right:4px;">₩${basePrice.toLocaleString()}</span>
            <span class="won">₩</span>${salePrice.toLocaleString()}
            <span style="font-size:11px;color:#FF4444;font-weight:700;margin-left:2px;">${discountRate}%</span>
           </div>`
        : `<div class="product-price"><span class="won">₩</span>${basePrice.toLocaleString()}</div>`)
    : `<div class="price-locked"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>판매가 회원공개</div>`;
  const codeLabel = p.brandName ? `[${p.brandName}]` : '';
  const wishId = (Array.isArray(p.colors) && p.colors.length > 0) ? `${p.id}_c0` : p.id;
  const isWished = wishlistIds.has(wishId);
  const colorNames = p.colorNames || (p.color ? [p.color] : []);
  const colorsHtml = colorNames.length > 0 ? `<div class="p-colors">${colorNames.slice(0,6).map(c =>
    `<div class="p-color-chip" title="${c}" style="background:${getColorDot(c)};"></div>`
  ).join('')}${colorNames.length > 6 ? `<span class="p-color-more">+${colorNames.length-6}</span>` : ''}</div>` : '';

  return `
    <div class="product-card" onclick="location.href='product.html?id=${p.id}'">
      <div class="product-img-wrap">
        ${imgHtml}
        <span class="p-badge">SALE</span>
        <button class="wish-btn${isWished ? ' active' : ''}" onclick="toggleWish(event,'${p.id}','${wishId}',${(p.colors&&p.colors[0])?`'${(p.colors[0].colorName||'').replace(/'/g,"\\'")}'`:'null'})">${isWished ? '<i class=ic-heart-filled></i>' : '<i class=ic-heart></i>'}</button>
      </div>
      <div class="product-info">
        <div class="product-code">${codeLabel}</div>
        <div class="product-name">${p.modelName||'-'}</div>
        <div class="product-size">${p.size ? p.size + ' · ' : ''}${p.barcode||''}</div>
        ${colorsHtml}
        ${priceHtml}
      </div>
    </div>`;
}

async function loadTimesaleProducts() {
  const grid = document.getElementById('timesaleGrid');
  try {
    const snap = await _db.collection('products').where('status', '==', 'approved').get();
    const products = [];
    snap.forEach(doc => products.push({ id: doc.id, ...doc.data() }));

    if(products.length === 0) {
      allTimesaleProducts = [];
      grid.innerHTML = `<div class="empty-box">아직 등록된 상품이 없습니다.</div>`;
      return;
    }

    // 가격 낮은순 (실제 할인 시스템 도입 전 임시 기준, 홈페이지와 동일)
    allTimesaleProducts = [...products].sort((a,b) => (a.price||0)-(b.price||0)).slice(0, 20);
    // 로그인 상태가 바뀌어 다시 불러올 때도 기존 검색어(currentTsKeyword)를 유지한 채로 다시 그림
    renderTimesaleGrid(applyTsSearch(allTimesaleProducts, currentTsKeyword));
  } catch(e) {
    console.error(e);
    grid.innerHTML = `<div class="empty-box" style="color:var(--red);">상품을 불러오지 못했습니다.</div>`;
  }
}

function renderTimesaleGrid(products) {
  const grid = document.getElementById('timesaleGrid');
  if(products.length === 0) {
    grid.innerHTML = currentTsKeyword
      ? `<div class="empty-box">'${escapeHtml(currentTsKeyword)}'에 해당하는 타임세일 상품이 없습니다.</div>`
      : `<div class="empty-box">아직 등록된 상품이 없습니다.</div>`;
    return;
  }
  grid.innerHTML = products.map(p => renderProductCard(p)).join('');
}
</script>
