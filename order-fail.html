<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTICMALL | 결제 실패</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--sky:#1B9FD8;--sky-lt:#E6F5FB;--sky-dk:#1480B0;--navy:#1A2D4A;--white:#FFFFFF;--g1:#F2F4F6;--g2:#E0E4E8;--g3:#9BA5B0;--g4:#5A6472;--black:#111318;--red:#FF4444;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--g1);color:var(--black);min-height:100vh;}
.header{background:var(--white);border-bottom:1px solid var(--g2);}
.header-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;}
.logo{font-family:'Inter',sans-serif;font-size:24px;font-weight:800;color:var(--navy);text-decoration:none;}
.logo span{color:var(--sky);}

.main{max-width:480px;margin:100px auto;padding:0 24px;text-align:center;}
.result-icon{font-size:64px;margin-bottom:16px;}
.result-title{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:8px;}
.result-sub{font-size:14px;color:var(--g3);margin-bottom:8px;}

.card{background:var(--white);border-radius:12px;padding:20px;text-align:left;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin:24px 0;}
.info-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;}
.info-row .lbl{color:var(--g4);}
.info-row .val{font-weight:600;color:var(--red);text-align:right;}

.btn-group{display:flex;gap:10px;}
.btn{flex:1;padding:14px;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:all 0.2s;}
.btn-primary{background:var(--sky);color:var(--white);}
.btn-primary:hover{background:var(--sky-dk);}
.btn-ghost{background:var(--white);color:var(--navy);border:1.5px solid var(--g2);}
.btn-ghost:hover{border-color:var(--navy);}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">OPTIC<span>MALL</span></a>
  </div>
</header>

<div class="main">
  <div class="result-icon">😥</div>
  <div class="result-title">결제에 실패했습니다</div>
  <div class="result-sub">결제가 정상적으로 처리되지 않았어요.</div>

  <div class="card">
    <div class="info-row"><span class="lbl">에러 코드</span><span class="val" id="errCode">-</span></div>
    <div class="info-row"><span class="lbl">에러 메시지</span><span class="val" id="errMsg">-</span></div>
  </div>

  <div class="btn-group">
    <button class="btn btn-ghost" onclick="location.href='list.html'">목록으로</button>
    <button class="btn btn-primary" onclick="history.back()">다시 시도하기</button>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
document.getElementById('errCode').textContent = params.get('code') || '알 수 없음';
document.getElementById('errMsg').textContent = params.get('message') || '결제가 취소되었거나 오류가 발생했습니다.';
</script>
</body>
</html>
