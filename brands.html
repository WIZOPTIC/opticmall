<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTICMALL | 브랜드관</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--sky:#1B9FD8;--sky-lt:#E6F5FB;--sky-dk:#1480B0;--navy:#1A2D4A;--white:#FFFFFF;--g1:#F2F4F6;--g2:#E0E4E8;--g3:#9BA5B0;--g4:#5A6472;--black:#111318;--red:#FF4444;--green:#2ECC71;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--white);color:var(--black);padding-bottom:80px;}

/* 헤더 */
.header{background:var(--white);border-bottom:1px solid var(--g2);position:sticky;top:0;z-index:100;}
.header-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;gap:24px;}
.logo{font-family:'Inter',sans-serif;font-size:24px;font-weight:800;color:var(--navy);text-decoration:none;}
.logo span{color:var(--sky);}
.header-search{flex:1;max-width:480px;display:flex;border:1.5px solid var(--g2);border-radius:6px;overflow:hidden;}
.header-search input{flex:1;padding:10px 16px;border:none;outline:none;font-size:14px;font-family:inherit;}
.search-btn{padding:0 14px;background:var(--white);border:none;cursor:pointer;color:var(--g4);border-left:1.5px solid var(--g2);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.h-btn{padding:7px 14px;border:none;background:none;font-size:13px;font-weight:500;color:var(--g4);font-family:inherit;cursor:pointer;border-radius:4px;}
.h-join{padding:7px 14px;border:none;background:var(--sky);color:var(--white);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border-radius:4px;}
.icon-btn{width:36px;height:36px;border:none;background:none;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--g4);position:relative;}
.cart-count{position:absolute;top:2px;right:2px;background:var(--sky);color:#fff;font-size:9px;font-weight:700;border-radius:100px;padding:1px 4px;min-width:15px;text-align:center;display:flex;align-items:center;justify-content:center;}

/* GNB */
.gnb{background:var(--white);border-bottom:2px solid var(--sky);position:sticky;top:64px;z-index:99;}
.gnb-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;}
.gnb-item{padding:13px 18px;font-size:14px;font-weight:500;color:var(--navy);cursor:pointer;border:none;background:none;font-family:inherit;transition:color 0.15s;white-space:nowrap;}
.gnb-item:hover{color:var(--sky);}
.gnb-item.active{color:var(--sky);font-weight:700;}

/* 히어로 */
.brands-hero{max-width:1280px;margin:0 auto;padding:40px 24px 24px;text-align:center;}
.brands-hero h1{font-size:24px;font-weight:800;color:var(--navy);margin-bottom:8px;}
.brands-hero p{font-size:14px;color:var(--g3);}

/* 검색 */
.brand-search-wrap{max-width:480px;margin:0 auto 32px;padding:0 24px;}
.brand-search{display:flex;border:1.5px solid var(--g2);border-radius:8px;overflow:hidden;}
.brand-search input{flex:1;padding:12px 16px;border:none;outline:none;font-size:14px;font-family:inherit;}

/* 브랜드 그리드 */
.brands-wrap{max-width:1280px;margin:0 auto;padding:0 24px;}
.brands-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.brand-card{border:1px solid var(--g2);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.2s;background:var(--white);}
.brand-card:hover{border-color:var(--sky);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.08);}
.brand-logo-display{height:120px;background:var(--white);display:flex;align-items:center;justify-content:center;overflow:hidden;padding:16px;border-bottom:1px solid var(--g1);}
.brand-logo-display img{max-width:100%;max-height:100%;object-fit:contain;}
.brand-logo-display .ph{font-size:40px;opacity:0.15;}
.brand-thumb-row{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--g1);height:120px;}
.brand-thumb{height:100%;background:var(--g1);display:flex;align-items:center;justify-content:center;font-size:24px;opacity:0.15;overflow:hidden;}
.brand-thumb img{width:100%;height:100%;object-fit:cover;}
.brand-card-info{padding:16px;}
.brand-card-name{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.brand-card-count{font-size:12px;color:var(--g3);}

.loading-box{text-align:center;padding:80px;color:var(--g3);}
.spinner{width:32px;height:32px;border:3px solid var(--g2);border-top-color:var(--sky);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-box{text-align:center;padding:80px 20px;color:var(--g3);}

/* 하단 네비 */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--white);border-top:1px solid var(--g2);display:flex;z-index:300;box-shadow:0 -4px 20px rgba(0,0,0,0.08);}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;font-size:10px;font-weight:600;color:var(--g3);cursor:pointer;font-family:inherit;}
.bnav-item.active{color:var(--sky);}
.bnav-item svg{width:22px;height:22px;}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">OPTIC<span>MALL</span></a>
    <div class="header-search">
      <input type="text" id="searchInput" placeholder="브랜드명 검색" onkeydown="if(event.key==='Enter') doSearch()">
      <button class="search-btn" onclick="doSearch()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
    </div>
    <div class="header-right">
      <button class="h-btn" onclick="location.href='mypage.html'">주문조회</button>
      <button class="h-btn" id="loginBtn" onclick="location.href='index.html'">로그인</button>
      <button class="h-join" id="joinBtn" onclick="location.href='join.html'">회원가입</button>
      <button class="icon-btn" onclick="location.href='mypage.html'"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
      <button class="icon-btn" onclick="location.href='cart.html'"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg><span class="cart-count" id="cartCountBadge" style="display:none;">0</span></button>
    </div>
  </div>
</header>

<nav class="gnb">
  <div class="gnb-inner">
    <button class="gnb-item" onclick="location.href='list.html'">전체상품</button>
    <button class="gnb-item" onclick="location.href='list.html'">하금테</button>
    <button class="gnb-item" onclick="location.href='list.html'">뿔테</button>
    <button class="gnb-item" onclick="location.href='list.html'">메탈</button>
    <button class="gnb-item" onclick="location.href='list.html'">선글라스</button>
    <button class="gnb-item active">브랜드관</button>
  </div>
</nav>

<div class="brands-hero">
  <h1>브랜드관</h1>
  <p>옵틱몰에 입점한 브랜드를 모아봤어요</p>
</div>

<div class="brand-search-wrap">
  <div class="brand-search">
    <input type="text" id="brandSearchInput" placeholder="브랜드명으로 찾기" oninput="filterBrands()">
  </div>
</div>

<div class="brands-wrap">
  <div id="brandsArea"><div class="loading-box"><div class="spinner"></div>브랜드 목록을 불러오는 중...</div></div>
</div>

<!-- 하단 네비 -->
<nav class="bottom-nav">
  <button class="bnav-item" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>HOME
  </button>
  <button class="bnav-item active" onclick="location.href='list.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>CATE
  </button>
  <button class="bnav-item" onclick="location.href='cart.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>ORDER
  </button>
  <button class="bnav-item" onclick="location.href='mypage.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>MY
  </button>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCZh95M18vqxwJGkXj2JkM9J4NfW_s0f1w",
  authDomain: "opticmall.firebaseapp.com",
  projectId: "opticmall",
  storageBucket: "opticmall.firebasestorage.app",
  messagingSenderId: "649171316547",
  appId: "1:649171316547:web:778de09e4fe6a43df109f6"
};
firebase.initializeApp(firebaseConfig);
const _auth = firebase.auth();
const _db = firebase.firestore();

let allBrands = []; // [{brandId, brandName, count, thumbs:[url,url,url]}]

_auth.onAuthStateChanged(async (user) => {
  if(user) {
    document.getElementById('loginBtn').style.display = 'none';
    document.getElementById('joinBtn').style.display = 'none';
    updateCartCount(user.uid);
  }
});

async function updateCartCount(uid) {
  try {
    const snap = await _db.collection('carts').doc(uid).collection('items').get();
    const badge = document.getElementById('cartCountBadge');
    if(snap.size > 0) { badge.textContent = snap.size; badge.style.display = 'flex'; }
  } catch(e) { console.error(e); }
}

function doSearch() {
  const keyword = document.getElementById('searchInput').value.trim();
  location.href = 'list.html' + (keyword ? `?q=${encodeURIComponent(keyword)}` : '');
}

async function loadBrands() {
  const area = document.getElementById('brandsArea');
  try {
    const snap = await _db.collection('products').where('status', '==', 'approved').get();
    const brandMap = {}; // brandId -> {brandName, count, thumbs}

    snap.forEach(doc => {
      const p = doc.data();
      const bid = p.brandId;
      if(!bid) return;
      if(!brandMap[bid]) brandMap[bid] = { brandId: bid, brandName: p.brandName || '브랜드', count: 0, thumbs: [] };
      brandMap[bid].count++;
      if(p.mainImageUrl && brandMap[bid].thumbs.length < 3) brandMap[bid].thumbs.push(p.mainImageUrl);
    });

    const brandIds = Object.keys(brandMap);

    // 각 브랜드사 계정의 로고 이미지 조회
    try {
      const userDocs = await Promise.all(brandIds.map(bid => _db.collection('users').doc(bid).get()));
      userDocs.forEach((docSnap, i) => {
        const bid = brandIds[i];
        if(docSnap.exists) brandMap[bid].logoUrl = docSnap.data().brandLogoUrl || null;
      });
    } catch(e) {
      console.error('로고 조회 실패:', e);
    }

    allBrands = Object.values(brandMap).sort((a,b) => b.count - a.count);

    if(allBrands.length === 0) {
      area.innerHTML = `<div class="empty-box">아직 입점한 브랜드가 없습니다.</div>`;
      return;
    }

    renderBrands(allBrands);
  } catch(e) {
    console.error(e);
    area.innerHTML = `<div class="empty-box" style="color:var(--red);">브랜드 목록을 불러오지 못했습니다.</div>`;
  }
}

function renderBrands(brands) {
  const area = document.getElementById('brandsArea');
  if(brands.length === 0) {
    area.innerHTML = `<div class="empty-box">검색 결과가 없습니다.</div>`;
    return;
  }
  area.innerHTML = `<div class="brands-grid">${brands.map(b => {
    let visualHtml;
    if(b.logoUrl) {
      // 로고가 있으면 카드 전체에 로고 이미지 크게 표시
      visualHtml = `<div class="brand-logo-display"><img src="${b.logoUrl}" alt="${b.brandName} 로고"></div>`;
    } else {
      // 로고가 없으면 대표 상품 썸네일 격자로 대체
      const thumbsHtml = [0,1,2].map(i => {
        const url = b.thumbs[i];
        return `<div class="brand-thumb">${url ? `<img src="${url}">` : '👓'}</div>`;
      }).join('');
      visualHtml = `<div class="brand-thumb-row">${thumbsHtml}</div>`;
    }
    return `
      <div class="brand-card" onclick="location.href='list.html?brand=${b.brandId}'">
        ${visualHtml}
        <div class="brand-card-info">
          <div class="brand-card-name">${b.brandName}</div>
          <div class="brand-card-count">상품 ${b.count}개</div>
        </div>
      </div>`;
  }).join('')}</div>`;
}

function filterBrands() {
  const keyword = document.getElementById('brandSearchInput').value.trim().toLowerCase();
  if(!keyword) { renderBrands(allBrands); return; }
  const filtered = allBrands.filter(b => b.brandName.toLowerCase().includes(keyword));
  renderBrands(filtered);
}

loadBrands();
</script>
</body>
</html>
