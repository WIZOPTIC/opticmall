<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTICMALL | 고객센터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@600;700;800&family=Montserrat:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{overflow-y:scroll;}
:root{--sky:#7C3AED;--sky-lt:#F3EFF7;--sky-dk:#6D28D9;--navy:#1A1225;--white:#FFFFFF;--g1:#F2F4F6;--g2:#E0E4E8;--g3:#9BA5B0;--g4:#5A6472;--black:#111318;--red:#FF4444;--green:#2ECC71;--orange:#F39C12;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--white);color:var(--black);}

/* 헤더 */
.header{background:var(--white);border-bottom:1px solid var(--g2);}
.header-inner{max-width:1280px;margin:0 auto;padding:28px 24px;display:flex;align-items:center;gap:36px;}
.logo { font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 800; color: var(--navy); text-decoration: none; }
.logo span { background: linear-gradient(90deg, var(--sky), #EC4899); -webkit-background-clip: text; background-clip: text; color: transparent; }
.header-search{flex:1;max-width:480px;display:flex;border:1.5px solid var(--g2);border-radius:6px;overflow:hidden;}
.header-search input{flex:1;padding:10px 16px;border:none;outline:none;font-size:14px;font-family:inherit;}
.search-btn{padding:0 14px;background:var(--white);border:none;cursor:pointer;color:var(--g4);border-left:1.5px solid var(--g2);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.h-btn{padding:7px 14px;border:none;background:none;font-size:13px;font-weight:500;color:var(--g4);font-family:inherit;cursor:pointer;border-radius:4px;}
.h-join { padding: 7px 12px; border: none; background: none; color: var(--sky); font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }
.h-join:hover { color: var(--sky-dk); }
.icon-btn{width:36px;height:36px;border:none;background:none;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--g4);position:relative;}
.cart-count{position:absolute;top:2px;right:2px;background:var(--sky);color:#fff;font-size:9px;font-weight:700;border-radius:100px;padding:1px 4px;min-width:15px;text-align:center;display:flex;align-items:center;justify-content:center;}

/* GNB */
.gnb-inner{display:flex;}
.gnb-item{padding:13px 18px;font-size:14px;font-weight:500;color:var(--black);cursor:pointer;border:none;background:none;font-family:inherit;transition:color 0.15s;white-space:nowrap;}
.gnb-item:hover{color:var(--sky);}
.gnb-item.active{color:var(--sky);font-weight:700;}

/* 히어로 */
.cs-hero{max-width:1280px;margin:0 auto;padding:40px 24px 24px;text-align:center;}
.cs-hero h1{font-size:24px;font-weight:800;color:var(--navy);margin-bottom:8px;}
.cs-hero p{font-size:14px;color:var(--g3);}

/* 탭 */
.cs-tabs{max-width:1280px;margin:0 auto 28px;padding:0 24px;display:flex;justify-content:center;gap:8px;}
.cs-tab{padding:12px 26px;border-radius:100px;border:1.5px solid var(--g2);background:var(--white);color:var(--g4);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.cs-tab:hover{border-color:var(--sky);color:var(--sky);}
.cs-tab.active{background:var(--navy);border-color:var(--navy);color:var(--white);}

.cs-wrap{max-width:1000px;margin:0 auto;padding:0 24px;}

/* 툴바 (글쓰기 버튼 등) */
.cs-toolbar{display:flex;justify-content:flex-end;align-items:center;margin-bottom:12px;min-height:36px;}
.cs-write-btn{padding:9px 20px;background:var(--sky);color:var(--white);border:none;border-radius:6px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:background 0.15s;}
.cs-write-btn:hover{background:var(--sky-dk);}

/* FAQ 카테고리 칩 */
.cs-cat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.cs-cat-chip{padding:8px 16px;border-radius:100px;border:1.5px solid var(--g2);background:var(--white);color:var(--g4);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.cs-cat-chip:hover{border-color:var(--sky);color:var(--sky);}
.cs-cat-chip.active{background:var(--sky);border-color:var(--sky);color:var(--white);}

/* 게시판 테이블 */
.board-table{width:100%;border-collapse:collapse;border-top:2px solid var(--navy);}
.board-table thead th{padding:13px 10px;font-size:12.5px;font-weight:700;color:var(--g4);background:var(--g1);border-bottom:1px solid var(--g2);text-align:center;}
.board-table thead th.col-title{text-align:left;padding-left:16px;}
.board-row{cursor:pointer;transition:background 0.12s;}
.board-row:hover{background:var(--sky-lt);}
.board-row td{padding:14px 10px;font-size:13.5px;color:var(--black);border-bottom:1px solid var(--g1);text-align:center;}
.board-row td.col-title{text-align:left;padding-left:16px;color:var(--navy);font-weight:500;}
.board-row.pinned{background:var(--g1);}
.board-row.pinned:hover{background:var(--sky-lt);}
.pin-badge{display:inline-block;font-size:10.5px;font-weight:800;color:var(--white);background:var(--sky);padding:2px 8px;border-radius:4px;margin-right:8px;vertical-align:middle;}
.lock-ic{color:var(--g3);margin-right:4px;vertical-align:middle;}
.status-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;}
.status-badge.waiting{background:#FEF6E7;color:var(--orange);}
.status-badge.answered{background:#EAF9EE;color:var(--green);}
.board-detail{background:var(--g1);}
.board-detail td{padding:0;border-bottom:1px solid var(--g2);}
.board-detail-inner{padding:24px 20px;font-size:13.5px;color:var(--g4);line-height:1.8;white-space:pre-wrap;}
.board-detail-meta{font-size:12px;color:var(--g3);margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--g2);}
.answer-box{margin-top:18px;background:var(--white);border:1.5px solid var(--sky-lt);border-radius:8px;padding:16px 18px;}
.answer-box-title{font-size:12.5px;font-weight:800;color:var(--sky-dk);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.answer-write{margin-top:14px;}
.answer-write textarea{width:100%;padding:10px 12px;border:1.5px solid var(--g2);border-radius:6px;font-family:inherit;font-size:13px;resize:vertical;min-height:70px;outline:none;}
.answer-write textarea:focus{border-color:var(--sky);}
.answer-submit-btn{margin-top:8px;padding:8px 16px;background:var(--navy);color:var(--white);border:none;border-radius:6px;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer;}

/* FAQ 아코디언 */
.faq-list{border-top:2px solid var(--navy);}
.faq-item{border-bottom:1px solid var(--g2);}
.faq-q{display:flex;align-items:center;gap:12px;padding:18px 16px;cursor:pointer;font-size:14px;font-weight:600;color:var(--navy);transition:background 0.12s;}
.faq-q:hover{background:var(--sky-lt);}
.faq-q-mark{width:26px;height:26px;flex-shrink:0;border-radius:50%;background:var(--sky-lt);color:var(--sky);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;}
.faq-cat-tag{font-size:11px;font-weight:700;color:var(--sky);background:var(--sky-lt);padding:2px 9px;border-radius:100px;flex-shrink:0;}
.faq-q-arrow{margin-left:auto;color:var(--g3);transition:transform 0.2s;flex-shrink:0;}
.faq-item.open .faq-q-arrow{transform:rotate(180deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height 0.25s ease;background:var(--g1);}
.faq-item.open .faq-a{max-height:600px;}
.faq-a-inner{display:flex;gap:12px;padding:18px 16px 22px 16px;font-size:13.5px;color:var(--g4);line-height:1.8;white-space:pre-wrap;}
.faq-a-mark{width:26px;height:26px;flex-shrink:0;border-radius:50%;background:var(--navy);color:var(--white);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;}

.empty-box{text-align:center;padding:80px 20px;color:var(--g3);font-size:13.5px;}
.loading-box{text-align:center;padding:80px;color:var(--g3);}
.spinner{width:32px;height:32px;border:3px solid var(--g2);border-top-color:var(--sky);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.login-required-box{text-align:center;padding:70px 20px;color:var(--g4);}
.login-required-box p{font-size:13.5px;margin-bottom:16px;}
.login-required-box button{padding:11px 26px;background:var(--navy);color:var(--white);border:none;border-radius:6px;font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer;}

/* 글쓰기 모달 */
.wm-overlay{display:none;position:fixed;inset:0;z-index:1000;}
.wm-bg{position:absolute;inset:0;background:rgba(0,0,0,0.5);}
.wm-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;width:520px;max-width:90vw;border-radius:10px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.25);max-height:86vh;display:flex;flex-direction:column;}
.wm-head{padding:20px 24px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;}
.wm-head h3{font-size:16px;font-weight:800;color:var(--navy);}
.wm-close{width:32px;height:32px;border:none;background:none;font-size:18px;cursor:pointer;color:var(--g3);}
.wm-body{padding:22px 24px;overflow-y:auto;}
.wm-field{margin-bottom:14px;}
.wm-field label{font-size:12.5px;font-weight:700;color:var(--g4);display:block;margin-bottom:6px;}
.wm-field input[type=text],.wm-field select,.wm-field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--g2);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.wm-field input[type=text]:focus,.wm-field select:focus,.wm-field textarea:focus{border-color:var(--sky);}
.wm-field textarea{resize:vertical;min-height:140px;}
.wm-secret-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--g4);margin-top:10px;}
.wm-foot{padding:16px 24px 22px;}
.wm-submit{width:100%;padding:13px;background:var(--sky);color:var(--white);border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background 0.15s;}
.wm-submit:hover{background:var(--sky-dk);}
.wm-err{font-size:12px;color:var(--red);margin-top:8px;display:none;}

/* 하단 네비 */
i[class^='ic-']{display:inline-block;width:1em;height:1em;vertical-align:-0.15em;background-color:currentColor;
-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;
-webkit-mask-size:contain;mask-size:contain;flex-shrink:0;}

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCZh95M18vqxwJGkXj2JkM9J4NfW_s0f1w",
  authDomain: "opticmall.firebaseapp.com",
  projectId: "opticmall",
  storageBucket: "opticmall.firebasestorage.app",
  messagingSenderId: "649171316547",
  appId: "1:649171316547:web:778de09e4fe6a43df109f6"
};
firebase.initializeApp(firebaseConfig);
const _auth = firebase.auth();
const _db = firebase.firestore();

let currentUser = null;
let currentUserData = null;
let currentTab = new URLSearchParams(location.search).get('tab') || 'notice';
let currentFaqCat = '전체';
let openedRowId = null; // 현재 펼쳐진 게시글 id (테이블용)

const TAB_LABELS = { notice:'공지사항', qna:'상품문의', faq:'자주 묻는 질문', inquiry:'1:1 상담' };
const FAQ_CATS = ['전체','배송','주문/결제','반품/교환','회원','기타'];

_auth.onAuthStateChanged(async (user) => {
  currentUser = user;
  if(user) {
    document.getElementById('loginBtn').style.display = 'none';
    document.getElementById('joinBtn').style.display = 'none';
    updateCartCount(user.uid);
    try {
      const userDoc = await _db.collection('users').doc(user.uid).get();
      currentUserData = userDoc.exists ? userDoc.data() : {};
      updateHeaderLoggedIn(currentUserData.name || user.email.split('@')[0], currentUserData.member_level || 0, currentUserData.role);
    } catch(e) {
      currentUserData = {};
      updateHeaderLoggedIn(user.email.split('@')[0], 0, null);
    }
  } else {
    currentUserData = null;
    document.getElementById('loginBtn').style.display = '';
    document.getElementById('joinBtn').style.display = '';
    const welcomeMsg = document.getElementById('welcomeMsg');
    if(welcomeMsg) welcomeMsg.remove();
  }
  initTabs();
});

function isMaster() {
  return currentUserData && (currentUserData.role === 'master' || currentUserData.role === 'submaster');
}

function updateHeaderLoggedIn(name, level, role) {
  const headerRight = document.querySelector('.header-right');
  if(headerRight && !document.getElementById('welcomeMsg')) {
    const levelBadge = level >= 2
      ? '<span style="font-size:10px;background:#E8FBF0;color:#27AE60;padding:2px 8px;border-radius:100px;margin-left:6px;font-weight:700;">B2B</span>'
      : '<span style="font-size:10px;background:#FEF9E7;color:#F39C12;padding:2px 8px;border-radius:100px;margin-left:6px;font-weight:700;">승인대기</span>';
    const welcomeEl = document.createElement('div');
    welcomeEl.id = 'welcomeMsg';
    welcomeEl.style.cssText = 'font-size:13px;font-weight:600;color:var(--navy);display:flex;align-items:center;margin-right:8px;';
    welcomeEl.innerHTML = name + '님 환영합니다!' + levelBadge;
    headerRight.insertBefore(welcomeEl, headerRight.firstChild);
  }

      </div>
      ${adminLinkHtml}
      <a href="mypage.html" style="display:block;padding:13px 20px;font-size:13px;color:#5A6472;text-decoration:none;">마이페이지</a>
      <a href="mypage.html" style="display:block;padding:13px 20px;font-size:13px;color:#5A6472;text-decoration:none;">주문/배송조회</a>
      <a href="mypage.html?tab=wish" style="display:block;padding:13px 20px;font-size:13px;color:#5A6472;text-decoration:none;">관심상품</a>
      <a href="mypage.html?tab=recent" style="display:block;padding:13px 20px;font-size:13px;color:#5A6472;text-decoration:none;">최근 본 상품</a>

async function updateCartCount(uid) {
  try {
    const snap = await _db.collection('carts').doc(uid).collection('items').get();
    const badge = document.getElementById('cartCountBadge');
    if(snap.size > 0) { badge.textContent = snap.size; badge.style.display = 'flex'; }

let currentBoardKeyword = '';

function toggleSearchOverlay() {
  const overlay = document.getElementById('searchOverlay');
  const backdrop = document.getElementById('searchBackdrop');
  const searchIcon = document.getElementById('searchIcon');
  const closeIcon = document.getElementById('closeIcon');
  const isOpen = overlay.style.display === 'block';
  if (isOpen) {
    overlay.style.display = 'none';
    backdrop.style.display = 'none';
    searchIcon.style.display = '';
    closeIcon.style.display = 'none';
  } else {
    overlay.style.display = 'block';
    backdrop.style.display = 'block';
    searchIcon.style.display = 'none';
    closeIcon.style.display = '';
    setTimeout(() => document.getElementById('searchInput').focus(), 50);
  }
}

function doSearch() {
  currentBoardKeyword = document.getElementById('searchInput').value.trim();
  loadBoardList();
}

// ===================== 탭 =====================
function initTabs() {
  document.querySelectorAll('.cs-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === currentTab);
    btn.onclick = () => {
      currentTab = btn.dataset.tab;
      openedRowId = null;
      currentBoardKeyword = '';
      document.getElementById('searchInput').value = ''; // 탭 전환 시 이전 검색어가 몰래 남아있지 않도록 초기화
      history.replaceState(null, '', `board.html?tab=${currentTab}`);
      document.querySelectorAll('.cs-tab').forEach(b => b.classList.toggle('active', b === btn));
      renderToolbar();
      loadBoardList();
    };
  });
  renderToolbar();
  loadBoardList();
}

function renderToolbar() {
  const toolbar = document.getElementById('csToolbar');
  const catRow = document.getElementById('csCatRow');
  toolbar.innerHTML = '';
  catRow.innerHTML = '';

  if(currentTab === 'notice') {
    if(isMaster()) toolbar.innerHTML = `<button class="cs-write-btn" onclick="openWriteModal()">+ 공지 등록</button>`;
  } else if(currentTab === 'qna') {
    toolbar.innerHTML = `<button class="cs-write-btn" onclick="openWriteModal()">+ 상품문의 작성</button>`;
  } else if(currentTab === 'faq') {
    if(isMaster()) toolbar.innerHTML = `<button class="cs-write-btn" onclick="openWriteModal()">+ FAQ 등록</button>`;
    catRow.innerHTML = `<div class="cs-cat-row">${FAQ_CATS.map(c =>
      `<button class="cs-cat-chip${c===currentFaqCat?' active':''}" onclick="filterFaqCat('${c}')">${c}</button>`
    ).join('')}</div>`;
  } else if(currentTab === 'inquiry') {
    if(currentUser) toolbar.innerHTML = `<button class="cs-write-btn" onclick="openWriteModal()">+ 1:1 상담 작성</button>`;
  }
}

function filterFaqCat(cat) {
  currentFaqCat = cat;
  document.querySelectorAll('.cs-cat-chip').forEach(chip => chip.classList.toggle('active', chip.textContent === cat));
  loadBoardList();
}

// ===================== 목록 불러오기 =====================
async function loadBoardList() {
  const area = document.getElementById('csListArea');
  area.innerHTML = `<div class="loading-box"><div class="spinner"></div>불러오는 중...</div>`;

  // 1:1 상담은 로그인 필요
  if(currentTab === 'inquiry' && !currentUser) {
    area.innerHTML = `<div class="login-required-box"><p>1:1 상담은 로그인 후 이용하실 수 있습니다.</p><button onclick="location.href='index.html?openLogin=1'">로그인 하러가기</button></div>`;
    return;
  }

  try {
    let query = _db.collection('board').where('type', '==', currentTab);
    const snap = await query.get();
    let posts = [];
    snap.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));

    // 1:1상담: 본인 글 + 마스터는 전체
    if(currentTab === 'inquiry' && !isMaster()) {
      posts = posts.filter(p => p.authorUid === currentUser.uid);
    }
    // FAQ 카테고리 필터
    if(currentTab === 'faq' && currentFaqCat !== '전체') {
      posts = posts.filter(p => p.category === currentFaqCat);
    }

    // 검색어 필터 (제목/내용, FAQ는 카테고리명도 함께 확인)
    const kw = currentBoardKeyword.trim().toLowerCase();
    if(kw) {
      posts = posts.filter(p => {
        const titleMatch = (p.title||'').toLowerCase().includes(kw);
        const contentMatch = (p.content||'').toLowerCase().includes(kw);
        const catMatch = (p.category||'').toLowerCase().includes(kw);
        return titleMatch || contentMatch || catMatch;
      });
    }

    // 정렬: 공지 pinned 먼저, 그 다음 최신순
    posts.sort((a,b) => {
      if(currentTab === 'notice') {
        const pinA = a.pinned ? 1 : 0, pinB = b.pinned ? 1 : 0;
        if(pinA !== pinB) return pinB - pinA;
      }
      const da = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(0);
      const dbb = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(0);
      return dbb - da;
    });

    if(currentTab === 'faq') {
      renderFaqList(posts);
    } else {
      renderBoardTable(posts);
    }
  } catch(e) {
    console.error(e);
    area.innerHTML = `<div class="empty-box" style="color:var(--red);">목록을 불러오지 못했습니다.</div>`;
  }
}

function fmtDate(ts) {
  if(!ts?.toDate) return '-';
  const d = ts.toDate();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ===================== 테이블형 (공지/상품문의/1:1상담) =====================
function renderBoardTable(posts) {
  const area = document.getElementById('csListArea');
  if(posts.length === 0) {
    area.innerHTML = currentBoardKeyword
      ? `<div class="empty-box">'${escapeHtml(currentBoardKeyword)}'에 대한 검색결과가 없습니다.</div>`
      : `<div class="empty-box">등록된 ${TAB_LABELS[currentTab]} 게시글이 없습니다.</div>`;
    return;
  }

  const showAuthorCol = currentTab !== 'notice';
  const showStatusCol = currentTab === 'qna' || currentTab === 'inquiry';

  const rowsHtml = posts.map((p, idx) => {
    const num = p.pinned ? '공지' : (posts.length - idx);
    const isSecretHidden = p.secret && !isMaster() && (!currentUser || p.authorUid !== currentUser.uid);
    const titleText = isSecretHidden ? '비공개 게시글입니다' : p.title;
    const lockIcon = p.secret ? `<span class="lock-ic"><i class=ic-lock></i></span>` : '';
    const statusHtml = showStatusCol ? `<td>${p.status === 'answered' ? '<span class="status-badge answered">답변완료</span>' : '<span class="status-badge waiting">답변대기</span>'}</td>` : '';
    const authorHtml = showAuthorCol ? `<td>${p.authorName || '-'}</td>` : '';

    return `
    <tr class="board-row${p.pinned?' pinned':''}" onclick="toggleDetail('${p.id}')">
      <td>${p.pinned?'<span class="pin-badge">공지</span>':num}</td>
      <td class="col-title">${lockIcon}${titleText}</td>
      ${authorHtml}
      <td>${fmtDate(p.createdAt)}</td>
      ${showStatusCol ? statusHtml : `<td>${p.viewCount || 0}</td>`}
    </tr>
    <tr class="board-detail" id="detail-${p.id}" style="display:none;"><td colspan="5"></td></tr>`;
  }).join('');

  area.innerHTML = `
    <table class="board-table">
      <thead><tr>
        <th style="width:70px;">번호</th>
        <th class="col-title">제목</th>
        ${showAuthorCol ? '<th style="width:110px;">작성자</th>' : ''}
        <th style="width:110px;">작성일</th>
        <th style="width:90px;">${showStatusCol ? '상태' : '조회'}</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;

  window._boardPosts = posts; // 캐시
}

async function toggleDetail(id) {
  const detailRow = document.getElementById(`detail-${id}`);
  if(!detailRow) return;

  // 이미 열려있으면 닫기
  if(openedRowId === id) {
    detailRow.style.display = 'none';
    openedRowId = null;
    return;
  }
  // 다른 열린 행 닫기
  if(openedRowId) {
    const prev = document.getElementById(`detail-${openedRowId}`);
    if(prev) prev.style.display = 'none';
  }
  openedRowId = id;
  detailRow.style.display = '';

  const post = (window._boardPosts || []).find(p => p.id === id);
  if(!post) return;

  const isSecretHidden = post.secret && !isMaster() && (!currentUser || post.authorUid !== currentUser.uid);
  const td = detailRow.querySelector('td');

  if(isSecretHidden) {
    td.innerHTML = `<div class="board-detail-inner" style="text-align:center;color:var(--g3);"><i class=ic-lock></i> 작성자와 관리자만 열람할 수 있는 비공개 글입니다.</div>`;
    return;
  }

  td.innerHTML = `<div class="board-detail-inner">
    <div class="board-detail-meta">작성자: ${post.authorName || 'OPTICMALL'} · ${fmtDate(post.createdAt)} ${post.viewCount!==undefined ? '· 조회 '+(post.viewCount||0) : ''}</div>
    <div>${escapeHtml(post.content || '')}</div>
    ${renderAnswerArea(post)}
  </div>`;

  // 조회수 증가 (공지/상품문의만, 트랜잭션으로 안전하게)
  if((currentTab === 'notice' || currentTab === 'qna') && !post._viewed) {
    post._viewed = true;
    try {
      await _db.runTransaction(async (tx) => {
        const ref = _db.collection('board').doc(id);
        const doc = await tx.get(ref);
        if(!doc.exists) return;
        tx.update(ref, { viewCount: (doc.data().viewCount || 0) + 1 });
      });
    } catch(e) { console.error(e); }
  }
}

function renderAnswerArea(post) {
  if(currentTab !== 'qna' && currentTab !== 'inquiry') return '';
  let html = '';
  if(post.answer) {
    html += `<div class="answer-box">
      <div class="answer-box-title"><i class=ic-chat></i> OPTICMALL 답변</div>
      <div>${escapeHtml(post.answer)}</div>
    </div>`;
  }
  // 마스터는 답변 등록/수정 가능
  if(isMaster()) {
    html += `<div class="answer-write">
      <textarea id="answerInput-${post.id}" placeholder="답변을 입력해주세요">${post.answer || ''}</textarea>
      <button class="answer-submit-btn" onclick="submitAnswer('${post.id}')">${post.answer ? '답변 수정' : '답변 등록'}</button>
    </div>`;
  }
  return html;
}

async function submitAnswer(id) {
  const input = document.getElementById(`answerInput-${id}`);
  const answer = input.value.trim();
  if(!answer) { alert('답변 내용을 입력해주세요.'); return; }
  try {
    await _db.collection('board').doc(id).update({
      answer, status: 'answered', answeredAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    alert('답변이 등록되었습니다.');
    loadBoardList();
  } catch(e) {
    console.error(e);
    alert('답변 등록에 실패했습니다.');
  }
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ===================== FAQ 아코디언 =====================
function renderFaqList(posts) {
  const area = document.getElementById('csListArea');
  if(posts.length === 0) {
    area.innerHTML = currentBoardKeyword
      ? `<div class="empty-box">'${escapeHtml(currentBoardKeyword)}'에 대한 검색결과가 없습니다.</div>`
      : `<div class="empty-box">등록된 질문이 없습니다.</div>`;
    return;
  }
  area.innerHTML = `<div class="faq-list">${posts.map((p, idx) => `
    <div class="faq-item" id="faq-${p.id}">
      <div class="faq-q" onclick="toggleFaq('${p.id}')">
        <div class="faq-q-mark">Q</div>
        ${p.category ? `<span class="faq-cat-tag">${p.category}</span>` : ''}
        <div>${escapeHtml(p.title)}</div>
        <div class="faq-q-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="faq-a">
        <div class="faq-a-inner">
          <div class="faq-a-mark">A</div>
          <div>${escapeHtml(p.content)}</div>
        </div>
      </div>
    </div>`).join('')}</div>`;
}

function toggleFaq(id) {
  const item = document.getElementById(`faq-${id}`);
  const wasOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(el => el.classList.remove('open'));
  if(!wasOpen) item.classList.add('open');
}

// ===================== 글쓰기 =====================
function openWriteModal() {
  if((currentTab === 'notice' || currentTab === 'faq') && !isMaster()) {
    alert('공지사항/FAQ 등록은 관리자만 가능합니다.');
    return;
  }
  if(currentTab === 'qna' && !currentUser) {
    alert('로그인 후 이용해주세요.');
    location.href = 'index.html?openLogin=1';
    return;
  }
  if(currentTab === 'inquiry' && !currentUser) {
    alert('로그인 후 이용해주세요.');
    location.href = 'index.html?openLogin=1';
    return;
  }
  document.getElementById('wmTitle').textContent =
    currentTab === 'notice' ? '공지사항 등록' :
    currentTab === 'faq' ? 'FAQ 등록' :
    currentTab === 'inquiry' ? '1:1 상담 작성' : '상품문의 작성';
  document.getElementById('wmCatField').style.display = currentTab === 'faq' ? '' : 'none';
  document.getElementById('wmContentLabel').textContent = currentTab === 'faq' ? '답변 (A)' : '내용';
  document.getElementById('wmContentInput').placeholder = currentTab === 'faq' ? '답변 내용을 입력해주세요' : '내용을 입력해주세요';
  document.getElementById('wmSecretRow').style.display = (currentTab === 'qna' || currentTab === 'inquiry') ? '' : 'none';
  document.getElementById('wmSecretChk').checked = currentTab === 'inquiry';
  document.getElementById('wmTitleInput').value = '';
  document.getElementById('wmContentInput').value = '';
  document.getElementById('wmErr').style.display = 'none';
  document.getElementById('wmOverlay').style.display = 'block';
}
function closeWriteModal() {
  document.getElementById('wmOverlay').style.display = 'none';
}

async function submitBoardPost() {
  const title = document.getElementById('wmTitleInput').value.trim();
  const content = document.getElementById('wmContentInput').value.trim();
  const err = document.getElementById('wmErr');
  err.style.display = 'none';

  if((currentTab === 'notice' || currentTab === 'faq') && !isMaster()) {
    err.textContent = '공지사항/FAQ 등록 권한이 없습니다.';
    err.style.display = 'block';
    return;
  }

  if(!title || !content) {
    err.textContent = '제목과 내용을 모두 입력해주세요.';
    err.style.display = 'block';
    return;
  }

  const btn = document.getElementById('wmSubmitBtn');
  btn.disabled = true;
  btn.textContent = '등록 중...';

  try {
    const data = {
      type: currentTab,
      title, content,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      viewCount: 0
    };
    if(currentTab === 'faq') {
      data.category = document.getElementById('wmCategory').value;
    } else {
      data.authorUid = currentUser.uid;
      data.authorName = currentUserData?.name || currentUser.email.split('@')[0];
      data.secret = document.getElementById('wmSecretChk').checked;
      data.status = 'waiting';
    }
    await _db.collection('board').add(data);
    closeWriteModal();
    loadBoardList();
  } catch(e) {
    console.error(e);
    err.textContent = '등록 중 오류가 발생했습니다. 다시 시도해주세요.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '등록하기';
  }
}
</script>
